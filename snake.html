<!DOCTYPE html>
<html>
<head>
    <title>Wonder Boy: The Vegan Crusade</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Arial', sans-serif; }
        canvas { display: block; background: #87CEEB; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; text-shadow: 2px 2px black; font-size: 24px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">VEGAN CRUSADE: Get to the Pipe!</div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.onresize = resize;
resize();

// --- Game Settings ---
const gravity = 0.8;
const player = {
    x: 100, y: 0, width: 40, height: 60,
    velY: 0, speed: 8, jumped: false,
    color: '#32CD32' // Leafy Green
};

let scrollX = 0;
const levelLength = 5000;
const enemies = [];
const goalPipe = { x: levelLength - 400, width: 80, height: 150 };

// Create "Dairy Demons" (Orange Blocks)
for(let i = 0; i < 20; i++) {
    enemies.push({
        x: 800 + (i * 350) + Math.random() * 150,
        width: 50, height: 60
    });
}

function update() {
    const groundY = canvas.height - 50;
    
    // Movement
    if (keys['ArrowRight']) player.x += player.speed;
    if (keys['ArrowLeft']) player.x -= player.speed;
    if ((keys[' '] || keys['ArrowUp']) && !player.jumped) {
        player.velY = -18;
        player.jumped = true;
    }

    // Gravity
    player.velY += gravity;
    player.y += player.velY;

    if (player.y + player.height > groundY) {
        player.y = groundY - player.height;
        player.velY = 0;
        player.jumped = false;
    }

    // Camera follow
    if (player.x > canvas.width / 2) {
        scrollX = player.x - canvas.width / 2;
    }

    // Check Collisions
    enemies.forEach(enemy => {
        let ey = groundY - enemy.height;
        if (player.x < enemy.x + enemy.width && player.x + player.width > enemy.x &&
            player.y < ey + enemy.height && player.y + player.height > ey) {
            player.x = 100; // Sent back for touching cheese!
        }
    });

    // Check Win
    let py = groundY - goalPipe.height;
    if (player.x + player.width > goalPipe.x && player.x < goalPipe.x + goalPipe.width && player.y + player.height > py) {
        victory();
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const groundY = canvas.height - 50;

    // Draw Ground
    ctx.fillStyle = '#228B22';
    ctx.fillRect(0, groundY, canvas.width, 50);

    ctx.save();
    ctx.translate(-scrollX, 0);

    // Draw Pipe
    ctx.fillStyle = '#696969';
    ctx.fillRect(goalPipe.x, groundY - goalPipe.height, goalPipe.width, goalPipe.height);
    ctx.fillStyle = 'white';
    ctx.font = "bold 20px Arial";
    ctx.fillText("FUDGE ROOM", goalPipe.x - 20, groundY - goalPipe.height - 20);

    // Draw Dairy Demons
    ctx.fillStyle = '#FFA500';
    enemies.forEach(e => {
        ctx.fillRect(e.x, groundY - e.height, e.width, e.height);
    });

    // Draw Player
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.width, player.height);

    ctx.restore();
}

function victory() {
    alert("BING BONG! DEAN IS IN THE PIPE!\n\nMelania was right, he's going straight to the Fudge Room. Quite frankly, a total disaster.");
    player.x = 100;
}

const keys = {};
window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup', e => keys[e.key] = false);

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
</body>
</html>
