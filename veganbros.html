<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #5c94fc; font-family: 'Courier New', Courier, monospace; transition: background 1s; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; color: #FFF; text-shadow: 2px 2px #000; font-size: 20px; pointer-events: none; z-index: 10; }
        #msg { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            text-align: center; color: #ffeb3b; text-shadow: 4px 4px #e91e63; 
            font-size: 40px; font-weight: bold; width: 100%; z-index: 20;
        }
    </style>
</head>
<body>
    <div id="ui">WORLD: <span id="worldNum">1</span> | ENERGY: <span id="score">100</span> | DIST: <span id="dist">0</span>/1000000</div>
    <div id="msg">GO DEAN!<br>
        <small style="font-size: 22px; color: white; text-shadow: 2px 2px #000;">
            TAP TO JUMP | ENTER PIPES TO WARP<br>
            STAY VEGAN! REACH 1,000,000m!
        </small>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, type, duration, vol, slide = 0) {
    try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        if (slide) osc.frequency.exponentialRampToValueAtTime(freq + slide, audioCtx.currentTime + duration);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    } catch(e) {}
}

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const distEl = document.getElementById('dist');
const msgEl = document.getElementById('msg');
const worldEl = document.getElementById('worldNum');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gameActive = false, energy = 100, distance = 0, currentWorld = 1, worldDistance = 0; 
let powerUpTimer = 0, rainbowTimer = 0, jumpCount = 0, bgRainbowX = 0;
let canRestart = false; 

let hiddenSeaTimer = 0;
let bigShark = { active: false, x: -400, y: 0 };

const player = { x: 100, y: 0, w: 40, h: 90, dy: 0, grounded: false, head: "👦", frame: 0 };

const worldSettings = {
    1: { bg: "#5c94fc", ground: "#9acd32", floor: "#e07b39", items: ["🍎", "🍐", "🥦"], hazards: ["🥩", "🍖"], deco: "☁️" },
    2: { bg: "#ff9ff3", ground: "#feca57", floor: "#ff9f43", items: ["🍓", "🍊", "🥥"], hazards: ["🍔", "🥓"], deco: "🌈" },
    3: { bg: "#48dbfb", ground: "#1dd1a1", floor: "#10ac84", items: ["🌽", "🥑", "🥥"], hazards: ["🌭", "🍕"], deco: "⛅" },
    4: { bg: "#000000", ground: "#576574", floor: "#222f3e", items: ["🥥"], hazards: ["🔥", "🥩", "🍖"], deco: "☄️" },
    5: { bg: "#0077be", ground: "transparent", floor: "transparent", items: ["🌿"], hazards: ["🐟", "🐡"], deco: "🫧" }
};

let obstacles = [], items = [], decor = [], pipes = [], pitfalls = [];

function handleInput() {
    if (!gameActive) {
        if (!canRestart) { canRestart = true; return; }
        resetGame(); return; 
    }
    if (currentWorld === 5) {
        player.dy = -10;
        player.grounded = false;
        playSound(150, 'sine', 0.2, 0.05, 100);
    } else {
        const maxJumps = powerUpTimer > 0 ? 2 : 1;
        if (player.grounded || jumpCount < maxJumps) {
            player.dy = powerUpTimer > 0 ? -18 : -14;
            player.grounded = false;
            jumpCount++;
            playSound(200 + (jumpCount * 100), 'square', 0.15, 0.1, 400);
        }
    }
}

window.addEventListener('mousedown', handleInput);
window.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(); }, {passive: false});

function resetGame() {
    energy = 100; distance = 0; currentWorld = 1; worldDistance = 0; 
    hiddenSeaTimer = 0; bigShark.active = false; bigShark.x = -400;
    powerUpTimer = 0; rainbowTimer = 0; canRestart = false;
    obstacles = []; items = []; decor = []; pipes = []; pitfalls = [];
    gameActive = true;
    msgEl.style.display = 'none';
    document.body.style.background = worldSettings[currentWorld].bg;
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function update() {
    if (!gameActive) return;

    distance += 2; worldDistance += 2;
    energy -= 0.035;
    if (powerUpTimer > 0) powerUpTimer--;
    if (rainbowTimer > 0) rainbowTimer--;
    bgRainbowX -= 1; 

    scoreEl.innerText = Math.ceil(energy);
    distEl.innerText = Math.floor(distance);
    worldEl.innerText = (currentWorld === 5) ? "SECRET" : currentWorld;

    if (distance >= 1000000) {
        gameActive = false;
        msgEl.style.display = 'block';
        msgEl.innerHTML = "🏆 1,000,000m REACHED! 🏆<br>DEAN THE VEGAN GOD-KING";
        return;
    }

    player.dy += (currentWorld === 5) ? 0.35 : 0.8;
    player.y += player.dy;
    if (player.y < 0) { player.y = 0; player.dy = 0; }

    const groundLevel = canvas.height - 80;
    let isFalling = pitfalls.some(p => player.x + 10 < p.x + p.w && player.x + 30 > p.x);

    if (currentWorld === 5) {
        hiddenSeaTimer += 2;
        if (hiddenSeaTimer > 8000 && hiddenSeaTimer < 10000) {
            ctx.fillStyle = "rgba(255,0,0,0.1)";
            ctx.fillRect(0,0,canvas.width,canvas.height);
        }
        if (hiddenSeaTimer >= 10000) {
            bigShark.active = true;
            bigShark.x += 6;
            bigShark.y = player.y - 100;
            if (bigShark.x + 280 > player.x && bigShark.x < player.x + 40) {
                if (player.y < bigShark.y + 240 && player.y + player.h > bigShark.y) {
                    playSound(100, 'sawtooth', 0.5, 0.3);
                    die("SHARK");
                }
            }
        }
        if (player.y > canvas.height) {
            currentWorld = 4; hiddenSeaTimer = 0; bigShark.active = false; bigShark.x = -400;
            obstacles = []; items = []; pitfalls = []; pipes = []; player.y = -50;
            document.body.style.background = worldSettings[4].bg;
            playSound(100, 'sine', 0.5, 0.1);
        }
    } else if (player.y + player.h > groundLevel) {
        if (isFalling) {
            if (player.y > canvas.height) {
                if (currentWorld === 4) {
                    currentWorld = 5; obstacles = []; items = []; pitfalls = []; pipes = []; player.y = -50;
                    document.body.style.background = worldSettings[5].bg;
                    playSound(400, 'sine', 0.5, 0.1, -200);
                } else die("FALL");
            }
        } else {
            player.y = groundLevel - player.h; player.dy = 0; player.grounded = true; jumpCount = 0;
        }
    }

    if (Math.random() < 0.025) {
        let obsType = worldSettings[currentWorld].hazards[Math.floor(Math.random()*worldSettings[currentWorld].hazards.length)];
        let obsX, obsY, dx, dy;
        if (obsType === "🔥") { 
            let isSniper = Math.random() < 0.20;
            obsX = isSniper ? player.x + 10 : Math.random() * canvas.width;
            obsY = -50; dy = 9; dx = -1; 
        } else if (currentWorld === 5) {
            obsX = canvas.width; obsY = Math.random() * canvas.height; dx = -7; dy = 0;
        } else {
            obsX = canvas.width; obsY = groundLevel - 45; dx = -(8 + currentWorld); dy = 0;
        }
        obstacles.push({ x: obsX, y: obsY, char: obsType, dx: dx, dy: dy });
    }

    if (Math.random() < 0.015) items.push({ x: canvas.width, y: currentWorld === 5 ? Math.random()*(canvas.height-100) : groundLevel - 120, char: worldSettings[currentWorld].items[0], type: 'food' });
    if (Math.random() < 0.015) decor.push({ x: canvas.width, y: Math.random() * 200, char: worldSettings[currentWorld].deco, speed: Math.random() * 2 + 1 });
    if (worldDistance > 2500 && pipes.length === 0 && currentWorld < 4) pipes.push({ x: canvas.width + 100, y: canvas.height - 150, w: 70, h: 70 });
    if (Math.random() < 0.006 && currentWorld !== 5) pitfalls.push({ x: canvas.width, w: 120 });

    pipes.forEach(p => p.x -= 8);
    obstacles.forEach((obs, i) => {
        obs.x += obs.dx; obs.y += obs.dy;
        if (player.x < obs.x + 30 && player.x + 40 > obs.x && player.y + 30 < obs.y + 40 && player.y + player.h > obs.y) {
            if (rainbowTimer > 0) {
                obstacles.splice(i, 1);
                playSound(600, 'sine', 0.1, 0.1);
            } else { 
                energy -= (currentWorld >= 4) ? 25 : 40; 
                playSound(150, 'sawtooth', 0.2, 0.2, -50);
                obstacles.splice(i, 1); 
                if (energy <= 0) die("MEAT"); 
            }
        }
    });
    items.forEach((it, i) => { 
        it.x -= 8; 
        if (player.x < it.x + 35 && player.x + 35 > it.x && player.y < it.y + 35 && player.y + player.h > it.y) { 
            energy = Math.min(100, energy + 10); 
            playSound(800, 'sine', 0.1, 0.1);
            items.splice(i, 1); 
        } 
    });
    pitfalls.forEach(p => p.x -= 8);
    decor.forEach(d => d.x -= d.speed);
    if (energy <= 0) die("ENERGY");
}

function die(type) {
    if (!gameActive) return;
    gameActive = false; canRestart = false; 
    let msg = type === "SHARK" ? "EATEN BY THE BIG SHARK! 🦈" : type === "FALL" ? "YOU FELL TO YOUR DEATH" : type === "ENERGY" ? "OUT OF ENERGY!" : "MEAT DEATH ☠️";
    msgEl.style.display = 'block';
    msgEl.innerHTML = msg + "<br><small style='font-size:22px; color:white;'>DIST: " + Math.floor(distance) + "m</small><br>TAP TWICE TO RESTART";
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const s = worldSettings[currentWorld];
    ctx.font = "50px Arial";
    decor.forEach(d => ctx.fillText(d.char, d.x, d.y));
    
    if (currentWorld !== 5) {
        ctx.fillStyle = s.floor; ctx.fillRect(0, canvas.height - 80, canvas.width, 80);
        ctx.fillStyle = s.ground; ctx.fillRect(0, canvas.height - 80, canvas.width, 15);
        ctx.fillStyle = s.bg; pitfalls.forEach(p => ctx.fillRect(p.x, canvas.height - 81, p.w, 82));
    } else if (bigShark.active) {
        ctx.font = "300px Arial"; ctx.fillText("🦈", bigShark.x, bigShark.y + 200);
    }
    
    ctx.fillStyle = "#2ecc71";
    pipes.forEach(p => { ctx.fillRect(p.x, p.y, p.w, p.h); ctx.fillRect(p.x + 10, p.y + p.h, p.w - 20, canvas.height); });
    
    player.frame += 0.25;
    const px = player.x, py = player.y;

    // RESTORED LEGS ANIMATION
    if (currentWorld !== 5) {
        const runCycle = Math.sin(player.frame) * 15;
        ctx.strokeStyle = "#333"; ctx.lineWidth = 4; ctx.beginPath();
        if (!player.grounded) { 
            ctx.moveTo(px + 20, py + 65); ctx.lineTo(px + 10, py + 80); 
            ctx.moveTo(px + 20, py + 65); ctx.lineTo(px + 30, py + 80); 
        } else { 
            ctx.moveTo(px + 20, py + 65); ctx.lineTo(px + 20 + runCycle, py + 90); 
            ctx.moveTo(px + 20, py + 65); ctx.lineTo(px + 20 - runCycle, py + 90); 
        }
        ctx.stroke();
    }

    let bodyColor = (rainbowTimer > 0) ? `hsl(${Date.now() % 360}, 80%, 50%)` : "#27ae60";
    ctx.fillStyle = bodyColor; ctx.fillRect(px + 10, py + 40, 20, 30);
    ctx.font = "45px Arial"; ctx.fillText(player.head, px, py + 45);
    obstacles.forEach(o => ctx.fillText(o.char, o.x, o.y + 40));
    items.forEach(it => ctx.fillText(it.char, it.x, it.y + 40));
    update();
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
