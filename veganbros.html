<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #5c94fc; font-family: 'Courier New', Courier, monospace; transition: background 1s; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; color: #FFF; text-shadow: 2px 2px #000; font-size: 20px; pointer-events: none; z-index: 10; }
        #msg { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            text-align: center; color: #ffeb3b; text-shadow: 4px 4px #e91e63; 
            font-size: 40px; font-weight: bold; width: 100%; z-index: 20;
        }
    </style>
</head>
<body>
    <div id="ui">WORLD: <span id="worldNum">1</span> | ENERGY: <span id="score">100</span> | DIST: <span id="dist">0</span>/1000000 <span id="challengeZone" style="color:#ffeb3b; font-weight:bold; display:none;">| SURVIVE: <span id="challengeDist">5000</span>m</span></div>
    <div id="msg">GO DEAN!<br>
        <small style="font-size: 22px; color: white; text-shadow: 2px 2px #000;">
            TAP TO JUMP | ENTER PIPES TO WARP<br>
            <span style="color: #afff94;">EAT FRUITS & VEGGIES</span> | <span style="color: #ff9494;">SMASH MEAT WITH RAINBOWS</span><br>
            STAY VEGAN! REACH 1,000,000m!
        </small>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, type, duration, vol, slide = 0) {
    try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        if (slide) osc.frequency.exponentialRampToValueAtTime(freq + slide, audioCtx.currentTime + duration);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    } catch(e) {}
}

// Retro Arcade Pipe Warp Sound
function playYellowPipeSound() {
    try {
        let now = audioCtx.currentTime;
        let notes = [200, 400, 300, 600, 800];
        notes.forEach((freq, index) => {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(freq, now + (index * 0.06));
            gain.gain.setValueAtTime(0.15, now + (index * 0.06));
            gain.gain.exponentialRampToValueAtTime(0.01, now + (index * 0.06) + 0.05);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(now + (index * 0.06));
            osc.stop(now + (index * 0.06) + 0.06);
        });
    } catch(e) {}
}

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const distEl = document.getElementById('dist');
const msgEl = document.getElementById('msg');
const worldEl = document.getElementById('worldNum');
const challengeZoneEl = document.getElementById('challengeZone');
const challengeDistEl = document.getElementById('challengeDist');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gameActive = false, energy = 100, distance = 0, currentWorld = 1, worldDistance = 0; 
let powerUpTimer = 0, rainbowTimer = 0, jumpCount = 0, bgRainbowX = 0;
let megaJumpTimer = 0, flyTimer = 0;
let canRestart = false; 

// Yellow Pipe Challenge Trackers
let inYellowChallenge = false, yellowChallengeLeft = 5000;

const player = { x: 100, y: 0, w: 45, h: 90, dy: 0, grounded: false, head: "👦", frame: 0 };

// Base Worlds
const worldSettings = {
    1: { bg: "#5c94fc", ground: "#9acd32", floor: "#e07b39", items: ["🍎", "🍐", "🥦"], hazards: ["🥩", "🍖"], deco: "☁️" },
    2: { bg: "#ff9ff3", ground: "#feca57", floor: "#ff9f43", items: ["🍓", "🍊", "🥥"], hazards: ["🍔", "🥓"], deco: "🌈" },
    3: { bg: "#48dbfb", ground: "#1dd1a1", floor: "#10ac84", items: ["🌽", "🥑", "🥥"], hazards: ["🌭", "🍕"], deco: "⛅" },
    4: { bg: "#000000", ground: "#576574", floor: "#222f3e", items: ["🥥"], hazards: ["🔥", "🥩", "🍖"], deco: "☄️" },
    5: { bg: "#0077be", ground: "#c2b280", floor: "#e0cd95", items: ["🌿", "🥬", "🌱"], hazards: ["🐟", "🐡", "🦈"], deco: "🫧" },
    6: { bg: "#87CEEB", ground: "#2E8B57", floor: "#8B4513", items: ["🫐", "🍇", "🍓"], hazards: ["🍔", "🥩", "🍗"], deco: "🌴" },
    7: { bg: "#4a148c", ground: "#00ffcc", floor: "#1a0033", items: ["🌀", "✨", "⚡"], hazards: ["👾", "🪲", "🚫"], deco: "📺" },
    8: { bg: "#222", ground: "#fff", floor: "#333", items: ["🍎"], hazards: ["🥩"], deco: "🌙" } // Dynamic Slot for Yellow Pipe
};

// Tool Arrays to draw random assets from
const randomBgs = ["#ff5252", "#341f97", "#222f3e", "#10ac84", "#ff9f43", "#01a3a4", "#b53471", "#2c3e50"];
const randomGrounds = ["#ffda79", "#cd84f1", "#ffb8b8", "#32ff7e", "#7d5fff", "#18dcff", "#fff"];
const randomFloors = ["#ccae62", "#9b59b6", "#e74c3c", "#27ae60", "#d35400", "#2980b9", "#555"];
const randomDecos = ["☁️", "🌈", "⛅", "☄️", "🫧", "🌴", "📺", "🌙", "🛸", "⭐", "🪐", "🌵"];
const poolFood = ["🍎", "🍐", "🥦", "🍓", "🍊", "🥬", "🌽", "🥑", "🍇", "🍉", "🍒", "🥕"];
const poolHazards = ["🥩", "🍖", "🍔", "🥓", "🌭", "🍕", "🍗", "🔥", "👾", "🪲"];

let obstacles = [], items = [], decor = [], pipes = [], pitfalls = [];

function handleInput() {
    if (!gameActive) {
        if (!canRestart) { canRestart = true; return; }
        resetGame(); return; 
    }
    
    if (currentWorld === 5 || flyTimer > 0) {
        player.dy = (flyTimer > 0) ? -9 : -6;
        player.grounded = false;
        playSound(300, 'triangle', 0.1, 0.1, 100);
    } else {
        const maxJumps = powerUpTimer > 0 ? 2 : 1;
        if (player.grounded || jumpCount < maxJumps) {
            player.dy = megaJumpTimer > 0 ? -24 : (powerUpTimer > 0 ? -18 : -14);
            player.grounded = false;
            jumpCount++;
            playSound(200 + (jumpCount * 100), 'square', 0.15, 0.1, 400);
        }
    }
}

window.addEventListener('mousedown', handleInput);
window.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(); }, {passive: false});

function resetGame() {
    energy = 100; distance = 0; currentWorld = 1; worldDistance = 0; 
    powerUpTimer = 0; rainbowTimer = 0; megaJumpTimer = 0; flyTimer = 0; canRestart = false;
    inYellowChallenge = false; yellowChallengeLeft = 5000;
    challengeZoneEl.style.display = "none";
    obstacles = []; items = []; decor = []; pipes = []; pitfalls = [];
    gameActive = true;
    msgEl.style.display = 'none';
    document.body.style.background = worldSettings[currentWorld].bg;
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function generateYellowChaosWorld() {
    // Pick pairs randomly
    let bg = randomBgs[Math.floor(Math.random() * randomBgs.length)];
    let ground = randomGrounds[Math.floor(Math.random() * randomGrounds.length)];
    let floor = randomFloors[Math.floor(Math.random() * randomFloors.length)];
    let deco = randomDecos[Math.floor(Math.random() * randomDecos.length)];
    
    // Pick 3 random foods
    let shuffFood = [...poolFood].sort(() => 0.5 - Math.random()).slice(0, 3);
    // Pick 2 random hazards
    let shuffHazards = [...poolHazards].sort(() => 0.5 - Math.random()).slice(0, 2);

    // Lock it into World 8 slot
    worldSettings[8] = { bg: bg, ground: ground, floor: floor, items: shuffFood, hazards: shuffHazards, deco: deco };
}

function update() {
    if (!gameActive) return;

    distance += 2; worldDistance += 2;
    energy -= 0.035;
    if (powerUpTimer > 0) powerUpTimer--;
    if (rainbowTimer > 0) rainbowTimer--;
    if (megaJumpTimer > 0) megaJumpTimer--;
    if (flyTimer > 0) flyTimer--;
    bgRainbowX -= 1; 

    // Handle Yellow Challenge Progress Tracker
    if (inYellowChallenge) {
        yellowChallengeLeft -= 2;
        challengeDistEl.innerText = Math.max(0, yellowChallengeLeft);
        
        // Check for Challenge Victory condition
        if (yellowChallengeLeft <= 0) {
            inYellowChallenge = false;
            challengeZoneEl.style.display = "none";
            currentWorld = 1; worldDistance = 0; player.y = -100; player.dy = 0;
            obstacles = []; items = []; pitfalls = []; pipes = [];
            document.body.style.background = worldSettings[currentWorld].bg;
            playSound(500, 'sine', 0.6, 0.15, 300);
        }
    }

    scoreEl.innerText = Math.ceil(energy);
    distEl.innerText = Math.floor(distance);
    
    if (currentWorld === 7) worldEl.innerText = "7 [GLITCH]";
    else if (currentWorld === 8) worldEl.innerText = "💥 [MUTATED ZONE]";
    else worldEl.innerText = currentWorld;

    if (distance >= 1000000) {
        gameActive = false;
        msgEl.style.display = 'block';
        msgEl.innerHTML = "🏆 1,000,000m REACHED! 🏆<br>DEAN THE VEGAN GOD-KING";
        return;
    }

    // Dynamic color shifting in Glitch level
    if (currentWorld === 7 && Math.random() < 0.005) {
        worldSettings[7].bg = `hsl(${Math.random() * 360}, 60%, 20%)`;
        worldSettings[7].ground = `hsl(${Math.random() * 360}, 100%, 50%)`;
        document.body.style.background = worldSettings[7].bg;
    }

    let isUnderwater = (currentWorld === 5);
    let gravity = (isUnderwater || flyTimer > 0) ? 0.25 : 0.8;
    player.dy += gravity;
    if ((isUnderwater || flyTimer > 0) && player.dy > 4) player.dy = 4;
    
    player.y += player.dy;
    const groundLevel = canvas.height - 80;

    let pit = pitfalls.find(p => player.x + 10 < p.x + p.w && player.x + 35 > p.x);
    if (player.y + player.h > groundLevel) {
        if (pit) {
            if (player.y > canvas.height) {
                if (pit.isWater && currentWorld !== 5 && !inYellowChallenge) {
                    currentWorld = 5; worldDistance = 0; player.y = -50; player.dy = 0;
                    obstacles = []; items = []; pitfalls = []; pipes = [];
                    document.body.style.background = worldSettings[currentWorld].bg;
                    playSound(400, 'sine', 0.5, 0.1, -200);
                } else {
                    die("FALL");
                }
            }
        } else {
            player.y = groundLevel - player.h;
            player.dy = 0;
            player.grounded = true;
            jumpCount = 0;
        }
    }

    // SPAWNING
    if (Math.random() < 0.02) {
        let obsType = worldSettings[currentWorld].hazards[Math.floor(Math.random()*worldSettings[currentWorld].hazards.length)];
        let obsX, obsY, dx, dy, isGiant = false;

        if (currentWorld === 5 && Math.random() < 0.05) {
            obsType = "🦈"; isGiant = true; obsX = canvas.width; obsY = Math.random() * (canvas.height - 200);
            dx = -12; dy = 0;
        } else if (obsType === "🔥") { 
            let isSniper = Math.random() < 0.20; 
            obsX = isSniper ? player.x + 10 : Math.random() * canvas.width;
            obsY = -50; dy = 9; dx = -1; 
        } else {
            obsX = canvas.width;
            obsY = (currentWorld === 5) ? (Math.random() * (groundLevel - 100) + 50) : groundLevel - 45;
            dx = -(8 + (currentWorld > 4 ? 2 : currentWorld)); dy = 0;
        }
        obstacles.push({ x: obsX, y: obsY, char: obsType, dx: dx, dy: dy, isGiant: isGiant });
    }

    if (Math.random() < 0.015) {
        let spawnY = currentWorld === 5 ? Math.random() * (groundLevel - 100) + 50 : groundLevel - 120;
        items.push({ x: canvas.width, y: spawnY, char: worldSettings[currentWorld].items[Math.floor(Math.random()*worldSettings[currentWorld].items.length)], type: 'food' });
    }
    
    if (Math.random() < 0.015 && currentWorld !== 6) decor.push({ x: canvas.width, y: Math.random() * 200, char: worldSettings[currentWorld].deco, speed: Math.random() * 2 + 1 });
    if (Math.random() < 0.003) items.push({ x: canvas.width, y: groundLevel - 120, char: "🫐", type: 'powerup' });
    if (Math.random() < 0.002) items.push({ x: canvas.width, y: groundLevel - 120, char: "🌈", type: 'rainbow' });
    
    if (currentWorld === 6) {
        if (Math.random() < 0.005) items.push({ x: canvas.width, y: groundLevel - 150, char: "🍄", type: 'megajump' });
        if (Math.random() < 0.002) items.push({ x: canvas.width, y: groundLevel - 180, char: "🍃", type: 'fly' });
    }

    // PIPE ROUTER SYSTEM (With rare Purple & ultra-rare Yellow generation rules)
    // Locked out while playing inside a Yellow Challenge run!
    if (worldDistance > 1200 && pipes.length === 0 && !inYellowChallenge) {
        let randRoll = Math.random();
        let nextDest;
        let pipeColor = "#2ecc71"; // Default Green
        
        if (randRoll < 0.01) { 
            // 1% Ultra Rare Yellow Pipe roll
            pipeColor = "#ffeb3b";
            nextDest = 8; 
        } else if (randRoll < 0.06) { 
            // 5% Purple Pipe roll
            pipeColor = "#9c27b0";
            nextDest = 7; 
        } else {
            nextDest = Math.floor(Math.random() * 6) + 1;
            while(nextDest === currentWorld) { nextDest = Math.floor(Math.random() * 6) + 1; }
        }
        
        let pHeight = (currentWorld >= 5) ? 180 : 70;
        pipes.push({ x: canvas.width + 100, y: groundLevel - pHeight, w: 70, h: pHeight, dest: nextDest, color: pipeColor });
    }
    
    if (Math.random() < 0.006) pitfalls.push({ x: canvas.width, w: 120, isWater: Math.random() < 0.4 });

    pipes.forEach((p, i) => {
        p.x -= 8;
        let isFloating = (currentWorld === 5 || flyTimer > 0);
        let hitX = (player.x + player.w > p.x && player.x < p.x + p.w);
        let hitY = isFloating ? true : (player.y + player.h > p.y);

        if (hitX && hitY) {
            if (p.color === "#ffeb3b") {
                // Initialize Challenge Mode
                inYellowChallenge = true;
                yellowChallengeLeft = 5000;
                challengeZoneEl.style.display = "inline";
                generateYellowChaosWorld();
                playYellowPipeSound();
            } else {
                playSound(p.color === "#9c27b0" ? 700 : 400, 'sine', 0.5, 0.1, p.color === "#9c27b0" ? -300 : 400);
            }

            currentWorld = p.dest; worldDistance = 0; player.y = -100; player.dy = 0;
            obstacles = []; items = []; pitfalls = []; pipes = [];
            document.body.style.background = worldSettings[currentWorld].bg;
        }
        if (p.x < -100) pipes.splice(i, 1);
    });

    obstacles.forEach((obs, i) => {
        obs.x += obs.dx; obs.y += obs.dy;
        let ow = obs.isGiant ? 100 : 30; let oh = obs.isGiant ? 80 : 40;
        let hitX = (player.x < obs.x + ow && player.x + player.w > obs.x);
        let hitY = (player.y + 40 < obs.y + oh && player.y + player.h > obs.y);

        if (hitX && hitY) {
            if (rainbowTimer > 0 && !obs.isGiant) { 
                obstacles.splice(i, 1); playSound(800, 'sine', 0.1, 0.1, 200); 
            } else { 
                if (obs.isGiant) { die("SHARK"); return; }
                energy -= (currentWorld >= 4) ? 25 : 40;
                playSound(150, 'sawtooth', 0.2, 0.2, -50); 
                obstacles.splice(i, 1);
                if (energy <= 0) { die("MEAT"); return; }
            }
        }
        if (obs.x < -300 || obs.y > canvas.height + 100) obstacles.splice(i, 1);
    });

    items.forEach((item, i) => {
        item.x -= 8;
        let hitX = (player.x < item.x + 45 && player.x + player.w > item.x);
        let hitY = (player.y < item.y + 45 && player.y + player.h > item.y);
        
        if (hitX && hitY) {
            if (item.type === 'powerup') { powerUpTimer = 600; playSound(500, 'sine', 0.3, 0.1, 400); }
            else if (item.type === 'rainbow') { rainbowTimer = 400; playSound(600, 'sine', 0.5, 0.1, 500); }
            else if (item.type === 'megajump') { megaJumpTimer = 600; playSound(700, 'sine', 0.3, 0.1, 600); }
            else if (item.type === 'fly') { flyTimer = 600; playSound(800, 'square', 0.4, 0.1, 700); }
            else { energy = Math.min(100, energy + 12); playSound(800, 'sine', 0.1, 0.1); }
            items.splice(i, 1);
        }
        if (item.x < -50) items.splice(i, 1);
    });

    pitfalls.forEach((p, i) => { p.x -= 8; if (p.x < -200) pitfalls.splice(i, 1); });
    decor.forEach((d, i) => { d.x -= d.speed; if (d.x < -100) decor.splice(i, 1); });
    if (energy <= 0) die("ENERGY");
}

function die(type) {
    if (!gameActive) return;
    gameActive = false; canRestart = false; 
    let msg = (type === "FALL") ? "YOU FELL TO YOUR DEATH" : 
              (type === "SHARK") ? "EATEN BY A GIANT SHARK!" :
              (type === "ENERGY") ? "OUT OF ENERGY!" : 
              ["meat death ☠️", "victim of greed", "you meat lemming", "meat head"][Math.floor(Math.random() * 4)];

    msgEl.style.display = 'block';
    msgEl.innerHTML = msg + "<br><small style='font-size:22px; color:white;'>DIST: " + Math.floor(distance) + "m</small><br><span style='font-size:18px; color:#afff94;'>TAP TWICE TO RESTART</span>";
    playSound(50, 'sawtooth', 0.5, 0.2);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const s = worldSettings[currentWorld];

    // Background configurations
    if (currentWorld !== 4 && currentWorld !== 6 && currentWorld !== 7 && currentWorld !== 8) {
        ctx.save(); ctx.globalAlpha = 0.2; ctx.translate(bgRainbowX % 2000, 100);
        for(let i=0; i<6; i++) { ctx.strokeStyle = `hsl(${i * 40}, 100%, 50%)`; ctx.lineWidth = 15; ctx.beginPath(); ctx.arc(1000, 400, 500 + (i*15), Math.PI, 0); ctx.stroke(); }
        ctx.restore();
    }

    if (currentWorld === 6) {
        ctx.save(); ctx.globalAlpha = 0.25;
        let offset = (bgRainbowX * 0.8) % 800;
        ctx.font = "260px Arial";
        ctx.fillText("🌴", offset + 100, 400);
        ctx.fillText("🌴", offset + 500, 430);
        ctx.restore();
    }

    // Dynamic large background drawing if Yellow Custom Mode lands a huge moon/tree asset
    if (currentWorld === 8) {
        ctx.save(); ctx.globalAlpha = 0.15;
        let offset = (bgRainbowX * 0.5) % 1200;
        ctx.font = "280px Arial";
        ctx.fillText(s.deco, offset + 300, 380);
        ctx.restore();
    }

    ctx.font = "50px Arial";
    decor.forEach(d => ctx.fillText(d.char, d.x, d.y));
    
    ctx.fillStyle = s.floor; ctx.fillRect(0, canvas.height - 80, canvas.width, 80);
    ctx.fillStyle = s.ground; ctx.fillRect(0, canvas.height - 80, canvas.width, 15);
    
    pitfalls.forEach(p => {
        ctx.fillStyle = p.isWater ? "#0077be" : s.bg;
        ctx.fillRect(p.x, canvas.height - 81, p.w, 82);
    });
    
    pipes.forEach(p => { 
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, p.w, p.h); 
        ctx.fillRect(p.x + 10, p.y + p.h, p.w - 20, canvas.height); 
    });

    player.frame += 0.25;
    const runCycle = Math.sin(player.frame) * 15;
    const px = player.x, py = player.y;
    let bodyColor = (rainbowTimer > 0) ? `hsl(${Date.now() % 360}, 80%, 50%)` : "#27ae60";

    ctx.strokeStyle = "#333"; ctx.lineWidth = 4; ctx.beginPath();
    if (!player.grounded) { ctx.moveTo(px + 20, py + 65); ctx.lineTo(px + 10, py + 80); ctx.moveTo(px + 20, py + 65); ctx.lineTo(px + 30, py + 80); }
    else { ctx.moveTo(px + 20, py + 65); ctx.lineTo(px + 20 + runCycle, py + 90); ctx.moveTo(px + 20, py + 65); ctx.lineTo(px + 20 - runCycle, py + 90); }
    ctx.stroke();

    ctx.fillStyle = bodyColor; ctx.fillRect(px + 10, py + 40, 20, 30);
    ctx.font = (powerUpTimer > 0 || megaJumpTimer > 0) ? "60px Arial" : "45px Arial"; 
    ctx.fillText(player.head, px, py + 45);

    ctx.font = "45px Arial";
    obstacles.forEach(o => {
        if (o.isGiant) {
            ctx.font = "120px Arial"; ctx.fillText(o.char, o.x, o.y + 100); ctx.font = "45px Arial";
        } else { ctx.fillText(o.char, o.x, o.y + 40); }
    });
    items.forEach(it => ctx.fillText(it.char, it.x, it.y + 40));

    update();
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
