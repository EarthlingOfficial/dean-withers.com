<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #5c94fc; font-family: 'Courier New', Courier, monospace; transition: background 1s; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; color: #FFF; text-shadow: 2px 2px #000; font-size: 20px; pointer-events: none; z-index: 10; }
        #msg { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            text-align: center; color: #ffeb3b; text-shadow: 4px 4px #e91e63; 
            font-size: 40px; font-weight: bold; width: 100%; z-index: 20;
        }
    </style>
</head>
<body>
    <div id="ui">WORLD: <span id="worldNum">1</span> | ENERGY: <span id="score">100</span> | DIST: <span id="dist">0</span>/100000</div>
    <div id="msg">VEGAN BROS.<br>
        <small style="font-size: 22px; color: white; text-shadow: 2px 2px #000;">
            TAP TO JUMP | ENTER PIPES TO WARP<br>
            <span style="color: #afff94;">EAT FRUITS & VEGGIES</span> | <span style="color: #ff9494;">AVOID THE MEAT</span><br>
            STAY VEGAN! REACH 100,000m!
        </small>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
/** AUDIO **/
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, type, duration, vol, slide = 0) {
    try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        if (slide) osc.frequency.exponentialRampToValueAtTime(freq + slide, audioCtx.currentTime + duration);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    } catch(e) {}
}

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const distEl = document.getElementById('dist');
const msgEl = document.getElementById('msg');
const worldEl = document.getElementById('worldNum');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gameActive = false;
let energy = 100;
let distance = 0;
let currentWorld = 1;
let worldDistance = 0; 
let powerUpTimer = 0;
let jumpCount = 0;

const player = { 
    x: 100, y: 0, w: 50, h: 80, dy: 0, 
    grounded: false, head: "👦", frame: 0 
};

const worldSettings = {
    1: { bg: "#5c94fc", ground: "#9acd32", floor: "#e07b39", items: ["🍎", "🍐", "🥦"], hazards: ["🥩", "🍖"], deco: "☁️" },
    2: { bg: "#ff9ff3", ground: "#feca57", floor: "#ff9f43", items: ["🍓", "🍊", "🥥"], hazards: ["🍔", "🥓"], deco: "🌈" },
    3: { bg: "#48dbfb", ground: "#1dd1a1", floor: "#10ac84", items: ["🌽", "🥑", "🥥"], hazards: ["🌭", "🍕"], deco: "⛅" },
    4: { bg: "#000000", ground: "#576574", floor: "#222f3e", items: ["🥥"], hazards: ["🔥", "🥛"], deco: "☄️" }
};

let obstacles = [], items = [], effects = [], decor = [], pipes = [], pitfalls = [];

function handleInput() {
    if (!gameActive) { resetGame(); return; }
    const maxJumps = powerUpTimer > 0 ? 2 : 1;
    if (player.grounded || jumpCount < maxJumps) {
        player.dy = powerUpTimer > 0 ? -18 : -14;
        player.grounded = false;
        jumpCount++;
        playSound(200 + (jumpCount * 100), 'square', 0.15, 0.1, 400);
    }
}

window.addEventListener('mousedown', handleInput);
window.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(); }, {passive: false});

function resetGame() {
    energy = 100; distance = 0; currentWorld = 1; worldDistance = 0; powerUpTimer = 0;
    obstacles = []; items = []; decor = []; pipes = []; pitfalls = [];
    gameActive = true;
    msgEl.style.display = 'none';
    document.body.style.background = worldSettings[currentWorld].bg;
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function update() {
    if (!gameActive) return;

    distance += 2; 
    worldDistance += 2;
    energy -= 0.03;
    if (powerUpTimer > 0) powerUpTimer--;

    scoreEl.innerText = Math.ceil(energy);
    distEl.innerText = Math.floor(distance);
    worldEl.innerText = currentWorld;

    if (distance >= 100000) {
        gameActive = false;
        msgEl.style.display = 'block';
        msgEl.innerHTML = "🏆 100,000m REACHED! 🏆<br><small style='font-size:20px'>YOU ARE THE ULTIMATE VEGAN BARKEEP!</small>";
        return;
    }

    player.dy += 0.8;
    player.y += player.dy;
    const groundLevel = canvas.height - 80;

    let isFalling = pitfalls.some(p => player.x + 25 > p.x && player.x + 25 < p.x + p.w);
    
    if (player.y + player.h > groundLevel) {
        if (isFalling) {
            if (player.y > canvas.height) die("YOU FELL INTO A PIT!");
        } else {
            player.y = groundLevel - player.h;
            player.dy = 0;
            player.grounded = true;
            jumpCount = 0;
        }
    }

    if (Math.random() < 0.02) obstacles.push({ x: canvas.width, y: groundLevel - 40, char: worldSettings[currentWorld].hazards[Math.floor(Math.random()*2)] });
    if (Math.random() < 0.015) items.push({ x: canvas.width, y: groundLevel - 110, char: worldSettings[currentWorld].items[Math.floor(Math.random()*worldSettings[currentWorld].items.length)], type: 'food' });
    if (Math.random() < 0.005) decor.push({ x: canvas.width, y: Math.random() * 200, char: worldSettings[currentWorld].deco, speed: Math.random() * 2 + 1 });
    if (Math.random() < 0.003) items.push({ x: canvas.width, y: groundLevel - 110, char: "🫐", type: 'powerup' });
    if (worldDistance > 2500 && pipes.length === 0 && currentWorld < 4) pipes.push({ x: canvas.width + 100, y: canvas.height - 150, w: 70, h: 70 });
    if (Math.random() < 0.006) pitfalls.push({ x: canvas.width, w: 100 });

    pipes.forEach((p, i) => {
        p.x -= 8;
        if (player.x + player.w > p.x && player.x < p.x + p.w && player.y + player.h > p.y) {
            currentWorld++; worldDistance = 0; player.y = -100;
            obstacles = []; items = []; pitfalls = []; pipes = [];
            document.body.style.background = worldSettings[currentWorld].bg;
            playSound(400, 'sine', 0.4, 0.1, 400);
        }
        if (p.x < -100) pipes.splice(i, 1);
    });

    obstacles.forEach((obs, i) => {
        obs.x -= (8 + currentWorld);
        if (player.x < obs.x + 30 && player.x + 30 > obs.x && player.y < obs.y + 40 && player.y + 40 > obs.y) {
            energy -= 20; obstacles.splice(i, 1); playSound(100, 'sawtooth', 0.2, 0.1);
        }
        if (obs.x < -50) obstacles.splice(i, 1);
    });

    items.forEach((item, i) => {
        item.x -= 8;
        if (player.x < item.x + 35 && player.x + 35 > item.x && player.y < item.y + 35 && player.y + 35 > item.y) {
            if (item.type === 'powerup') { powerUpTimer = 600; playSound(500, 'sine', 0.3, 0.1, 400); }
            else { energy = Math.min(100, energy + 8); playSound(800, 'sine', 0.1, 0.1); }
            items.splice(i, 1);
        }
        if (item.x < -50) items.splice(i, 1);
    });

    pitfalls.forEach((p, i) => { p.x -= 8; if (p.x < -200) pitfalls.splice(i, 1); });
    decor.forEach((d, i) => { d.x -= d.speed; if (d.x < -100) decor.splice(i, 1); });
    if (energy <= 0) die("OUT OF ENERGY!");
}

function die(reason) {
    gameActive = false;
    msgEl.style.display = 'block';
    msgEl.innerHTML = reason + "<br><small style='font-size:20px'>STAY VEGAN! DIST: " + Math.floor(distance) + "m</small><br>TAP TO RESTART";
    playSound(50, 'sawtooth', 0.5, 0.2);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const s = worldSettings[currentWorld];
    ctx.font = "50px Arial";
    decor.forEach(d => ctx.fillText(d.char, d.x, d.y));
    ctx.fillStyle = s.floor; ctx.fillRect(0, canvas.height - 80, canvas.width, 80);
    ctx.fillStyle = s.ground; ctx.fillRect(0, canvas.height - 80, canvas.width, 15);
    ctx.fillStyle = s.bg; pitfalls.forEach(p => ctx.fillRect(p.x, canvas.height - 81, p.w, 82));
    
    ctx.fillStyle = "#2ecc71";
    pipes.forEach(p => {
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillRect(p.x + 10, p.y + p.h, p.w - 20, canvas.height);
    });

    // --- ANIMATED PLAYER ---
    player.frame += 0.25;
    const runCycle = Math.sin(player.frame) * 15;
    const px = player.x + 10;
    const py = player.y + 40;

    // Legs
    ctx.strokeStyle = "#333";
    ctx.lineWidth = 4;
    ctx.beginPath();
    if (!player.grounded) {
        ctx.moveTo(px + 15, py + 15); ctx.lineTo(px + 5, py + 25);
        ctx.moveTo(px + 15, py + 15); ctx.lineTo(px + 25, py + 25);
    } else {
        ctx.moveTo(px + 15, py + 15); ctx.lineTo(px + 15 + runCycle, py + 35);
        ctx.moveTo(px + 15, py + 15); ctx.lineTo(px + 15 - runCycle, py + 35);
    }
    ctx.stroke();

    // Body (Shirt)
    ctx.fillStyle = "#27ae60";
    ctx.fillRect(px + 5, py - 5, 20, 25);

    // Head
    ctx.font = powerUpTimer > 0 ? "60px Arial" : "45px Arial";
    ctx.fillText(player.head, px - 8, py + 5);

    ctx.font = "40px Arial";
    obstacles.forEach(o => ctx.fillText(o.char, o.x, o.y + 35));
    items.forEach(it => ctx.fillText(it.char, it.x, it.y + 35));

    update();
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
