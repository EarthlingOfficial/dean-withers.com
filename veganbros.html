<!DOCTYPE html>
<html>
<head>

    <style>

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq, type, duration, vol, slide = 0) {
    try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        if (slide) osc.frequency.exponentialRampToValueAtTime(freq + slide, audioCtx.currentTime + duration);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    } catch(e) {}
}

function playYellowPipeSound() {
    try {
        let now = audioCtx.currentTime;
        let notes = [200, 400, 300, 600, 800];
        notes.forEach((freq, index) => {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(freq, now + (index * 0.06));
            gain.gain.setValueAtTime(0.15, now + (index * 0.06));
            gain.gain.exponentialRampToValueAtTime(0.01, now + (index * 0.06) + 0.05);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(now + (index * 0.06));
            osc.stop(now + (index * 0.06) + 0.06);
        });
    } catch(e) {}
}

function playFlagSound() {
    try {
        let now = audioCtx.currentTime;
        let melody = [261, 329, 392, 523, 659, 784, 1046];
        melody.forEach((freq, i) => {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(freq, now + i * 0.1);
            gain.gain.setValueAtTime(0.15, now + i * 0.1);
            gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.12);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(now + i * 0.1);
            osc.stop(now + i * 0.1 + 0.15);
        });
    } catch(e) {}
}

function playStompSound() {
    try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(300, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.15);
    } catch(e) {}
}

function playBoxHitSound() {
    try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(440, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    } catch(e) {}
}

// Title Generation
const t1Prefixes = ["BACON_","SAUSAGE_","STEAK_","WAGYU_","MILKIES_","DEANUS_","BURGER_","FATTY_","MEAT_","CHOKING_","GLAZED_","WHINER_","MILK_","SLURPER_","CHEESE_","GREASY_","CLOGGED_","CARNIVORE_","WEAK_","CHUBBY_","BUTTER_","GELATIN_","BEEFY_","PORKY_","WHEY_"];
const t1Nouns = ["CHOKER_DEAN","DONATOR_DEAN","SIMP_DEAN","SLURPER_DEAN","BOY_DEAN","LEMMING_DEAN","DONUT_DEAN","MILK_SIMP","CHICKEN_DEAN","LEMMING","MEAT_BOY","DEAN_THE_SLURPER","WAGYU_DOMINATOR_9","NUGGET_DEAN","PORKCHOP","QUITTER","MEAT_PUPPET","SAUSAGE_FEST","SLOUCH_DEAN","FAIL_DEAN","BEEF_CAKE","LACTOSE_LEMMING"];
const t3Prefixes = ["SOY_","VEGAN_","PURE_","DEAN_","BROCCOLI_","AVOCADO_","GREEN_","ULTRA_","BRUTAL_","ALPHA_","GOD_","KALE_","TOFU_","SEITAN_","LEAFY_","CHLOROPHYLL_","PRANA_","ZEN_","SUPREME_","IRON_","EARTH_","FLORA_"];
const t3Nouns = ["COMMANDER_DEAN","GOD_DEAN","TITAN_DEAN","GOAT_DEAN","LEGEND_DEAN","WARRIOR_DEAN","KING_DEAN","MACHINE_DEAN","ALPHA_DEAN","SPROUT_GOD","BEAST_DEAN","MASTER_DEAN","GURU_DEAN","SAVIOR_DEAN","TEMPEH_TITAN","LEAF_LORD","PLANT_CHAD"];
const suffixes = ["_69","_420","_99","_777","_13","_100","_88","_1","_9","_007","_X","_9000","_247","_V2"];

function getRand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function generateTitle(dist) {
    let p, n, s = getRand(suffixes);
    if (dist < 50000) { p = getRand(t1Prefixes); n = getRand(t1Nouns); }
    else if (dist >= 100000) { p = getRand(t3Prefixes); n = getRand(t3Nouns); }
    else { p = getRand(t1Prefixes.concat(t3Prefixes)); n = getRand(t1Nouns.concat(t3Nouns)); }
    return p + n + s;
}

function handleInput() {
    if (!gameActive) {
        if (canRestart) resetGame();
        return;
    }
    if (currentStage === 2) {
        if (player.grounded || jumpCount < 1) {
            player.dy = powerUpTimer > 0 ? -18 : -15;
            player.grounded = false;
            jumpCount++;
            playSound(250 + (jumpCount * 80), 'square', 0.15, 0.1, 300);
        }
    } else {
        const maxJumps = powerUpTimer > 0 ? 2 : 1;
        if (player.grounded || jumpCount < maxJumps) {
            player.dy = megaJumpTimer > 0 ? -24 : (powerUpTimer > 0 ? -18 : -14);
            player.grounded = false;
            jumpCount++;
            playSound(200 + (jumpCount * 100), 'square', 0.15, 0.1, 400);
        }
    }
}

window.addEventListener('mousedown', handleInput);
window.addEventListener('touchstart', e => {
    if (e.target !== btnLeft && e.target !== btnRight) handleInput();
}, {passive: false});

}

function updateStage2() {
    if (!gameActive) return;
    const groundLevel = canvas.height - 80;
    const SPEED = 4;
    const GRAVITY = 0.7;

    player.dx = 0;
    if (leftPressed) player.dx = -SPEED;
    if (rightPressed) player.dx = SPEED;
    player.x += player.dx;

    let targetCam = player.x - canvas.width * 0.35;
    targetCam = Math.max(0, Math.min(targetCam, s2.levelWidth - canvas.width));
    s2.cameraX += (targetCam - s2.cameraX) * 0.15;

    player.dy += GRAVITY;
    player.y += player.dy;
    player.grounded = false;

    if (player.y + player.h >= groundLevel) {
        player.y = groundLevel - player.h;
        player.dy = 0;
        player.grounded = true;
        jumpCount = 0;
    }

    // Food collection (fixed)
    s2.foodItems.forEach(f => {
        if (f.collected) return;
        if (player.x + player.w > f.x && player.x < f.x + 30 && player.y + player.h > f.y && player.y < f.y + 30) {
            f.collected = true;
            energy = Math.min(100, energy + 8);
            playSound(700, 'sine', 0.1, 0.08);
        }
    });

    energy -= 0.02;
    distance += 1;
    if (energy <= 0) die("ENERGY");
}
