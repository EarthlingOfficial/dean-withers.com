<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #5c94fc; font-family: 'Courier New', Courier, monospace; transition: background 1s; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; color: #FFF; text-shadow: 2px 2px #000; font-size: 20px; pointer-events: none; z-index: 10; }
        #msg { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            text-align: center; color: #ffeb3b; text-shadow: 4px 4px #e91e63; 
            font-size: 40px; font-weight: bold; width: 100%; z-index: 20;
        }
    </style>
</head>
<body>
    <div id="ui">WORLD: <span id="worldNum">1</span> | ENERGY: <span id="score">100</span> | DIST: <span id="dist">0</span>/1000000</div>
    <div id="msg">GO DEAN!<br><small style="font-size: 22px; color: white; text-shadow: 2px 2px #000;">STAY VEGAN! REACH 1,000,000m!</small></div>
    <canvas id="gameCanvas"></canvas>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, type, duration, vol, slide = 0) {
    try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        if (slide) osc.frequency.exponentialRampToValueAtTime(freq + slide, audioCtx.currentTime + duration);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    } catch(e) {}
}

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const distEl = document.getElementById('dist');
const msgEl = document.getElementById('msg');
const worldEl = document.getElementById('worldNum');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gameActive = false, energy = 100, distance = 0, currentWorld = 1, worldDistance = 0; 
let jumpCount = 0, maxJumps = 1, canRestart = false;
let rainbowTimer = 0;
let obstacles = [], items = [], decor = [], pipes = [], pitfalls = [];
const player = { x: 100, y: 0, w: 40, h: 90, dy: 0, grounded: false, head: "👦", frame: 0 };

const worldSettings = {
    1: { bg: "#5c94fc", ground: "#9acd32", floor: "#e07b39", items: ["🍎", "🍐", "🥦", "🫐"], hazards: ["🥩", "🍖"], deco: "☁️" },
    2: { bg: "#ff9ff3", ground: "#feca57", floor: "#ff9f43", items: ["🍓", "🍊", "🥥", "🫐"], hazards: ["🍔", "🥓"], deco: "🌈" },
    3: { bg: "#48dbfb", ground: "#1dd1a1", floor: "#10ac84", items: ["🌽", "🥑", "🥥", "🫐"], hazards: ["🌭", "🍕"], deco: "⛅" },
    4: { bg: "#000000", ground: "#576574", floor: "#222f3e", items: ["🥥", "🫐"], hazards: ["🔥", "🥩", "🍖"], deco: "☄️" },
    5: { bg: "#0077be", ground: "transparent", floor: "transparent", items: ["🌿"], hazards: ["🐟", "🐡"], deco: "🫧" }
};

function handleInput() {
    if (!gameActive) { if (canRestart) resetGame(); return; }
    if (currentWorld === 5) {
        player.dy = -10; player.grounded = false;
        playSound(150, 'sine', 0.2, 0.05, 100);
    } else if (player.grounded || jumpCount < maxJumps) {
        player.dy = -14; player.grounded = false; jumpCount++;
        playSound(200 + (jumpCount * 100), 'square', 0.15, 0.1, 400);
    }
}

window.addEventListener('mousedown', handleInput);
window.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(); }, {passive: false});

function resetGame() {
    energy = 100; distance = 0; currentWorld = 1; worldDistance = 0; 
    rainbowTimer = 0; maxJumps = 1;
    obstacles = []; items = []; decor = []; pipes = []; pitfalls = [];
    gameActive = true; msgEl.style.display = 'none';
    document.body.style.background = worldSettings[currentWorld].bg;
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function update() {
    if (!gameActive) return;
    distance += 2; worldDistance += 2; energy -= 0.04;
    if (rainbowTimer > 0) rainbowTimer--;
    
    scoreEl.innerText = Math.ceil(energy); distEl.innerText = Math.floor(distance);
    worldEl.innerText = (currentWorld === 5) ? "SECRET" : currentWorld;

    player.dy += (currentWorld === 5) ? 0.35 : 0.8;
    player.y += player.dy;

    const groundLevel = canvas.height - 80;
    let isFalling = pitfalls.some(p => player.x + 10 < p.x + p.w && player.x + 30 > p.x);

    if (worldDistance > 5000 && pipes.length === 0 && currentWorld < 4) {
        pipes.push({ x: canvas.width + 100, y: canvas.height - 150, w: 70, h: 70 });
    }

    pipes.forEach((p, idx) => {
        p.x -= 8;
        if (player.x + player.w > p.x && player.x < p.x + p.w && player.y + player.h > p.y) {
            currentWorld++; worldDistance = 0; pipes.splice(idx, 1);
            document.body.style.background = worldSettings[currentWorld].bg;
            playSound(500, 'sine', 0.5, 0.1, 500);
        }
    });

    if (player.y + player.h > groundLevel && currentWorld !== 5) {
        if (isFalling) {
            if (player.y > canvas.height) die("FALL");
        } else { player.y = groundLevel - player.h; player.dy = 0; player.grounded = true; jumpCount = 0; }
    }

    if (Math.random() < 0.02) {
        let pool = worldSettings[currentWorld].hazards;
        obstacles.push({ x: canvas.width, y: groundLevel - 45, char: pool[Math.floor(Math.random()*pool.length)], dx: -(7 + currentWorld) });
    }

    if (Math.random() < 0.02) {
        let pool = worldSettings[currentWorld].items;
        items.push({ x: canvas.width, y: groundLevel - 120, char: pool[Math.floor(Math.random()*pool.length)] });
    }

    obstacles.forEach((obs, i) => {
        obs.x += obs.dx;
        if (player.x < obs.x + 30 && player.x + 40 > obs.x && player.y + player.h > obs.y) {
            if (rainbowTimer > 0) { obstacles.splice(i, 1); playSound(1000, 'sine', 0.1, 0.1, 500); }
            else { energy -= 40; playSound(150, 'sawtooth', 0.2, 0.2, -50); obstacles.splice(i, 1); if (energy <= 0) die("MEAT"); }
        }
    });

    items.forEach((it, i) => { 
        it.x -= 8; 
        if (player.x < it.x + 35 && player.x + 35 > it.x && player.y < it.y + 35 && player.y + player.h > it.y) { 
            energy = Math.min(100, energy + 15);
            if (it.char === "🫐") { maxJumps = 2; playSound(900, 'sine', 0.2, 0.1, 200); }
            if (Math.random() < 0.08) { rainbowTimer = 400; playSound(600, 'sine', 0.5, 0.1, 1000); }
            else { playSound(800, 'sine', 0.2, 0.1, 400); }
            items.splice(i, 1); 
        } 
    });

    pitfalls.forEach(p => p.x -= 8);
    if (Math.random() < 0.006 && currentWorld !== 5) pitfalls.push({ x: canvas.width, w: 120 });
    if (energy <= 0) die("ENERGY");
}

function die(type) {
    gameActive = false; canRestart = false; 
    setTimeout(() => { canRestart = true; }, 500);
    msgEl.style.display = 'block';
    msgEl.innerHTML = "GAME OVER<br><small style='font-size:22px; color:white;'>TAP TO RESTART</small>";
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const s = worldSettings[currentWorld];
    if (currentWorld !== 5) {
        ctx.fillStyle = s.floor; ctx.fillRect(0, canvas.height - 80, canvas.width, 80);
        ctx.fillStyle = s.ground; ctx.fillRect(0, canvas.height - 80, canvas.width, 15);
        ctx.fillStyle = s.bg; pitfalls.forEach(p => ctx.fillRect(p.x, canvas.height - 81, p.w, 82));
    }
    
    ctx.fillStyle = "#2ecc71";
    pipes.forEach(p => { ctx.fillRect(p.x, p.y, p.w, p.h); ctx.fillRect(p.x + 10, p.y + p.h, p.w - 20, canvas.height); });
    
    player.frame += 0.25;
    if (rainbowTimer > 0) ctx.filter = `hue-rotate(${distance % 360}deg) drop-shadow(0 0 10px white)`;

    const px = player.x, py = player.y;
    ctx.fillStyle = "#27ae60"; ctx.fillRect(px + 10, py + 40, 20, 30);
    ctx.font = "45px Arial"; ctx.fillText(player.head, px, py + 45);
    ctx.filter = "none";

    ctx.font = "40px Arial";
    obstacles.forEach(o => ctx.fillText(o.char, o.x, o.y + 40));
    items.forEach(it => ctx.fillText(it.char, it.x, it.y + 40));
    update(); requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
