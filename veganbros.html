<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #5c94fc; font-family: 'Courier New', Courier, monospace; transition: background 1s; touch-action: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; color: #FFF; text-shadow: 2px 2px #000; font-size: 20px; pointer-events: none; z-index: 10; }
        #msg { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            text-align: center; color: #ffeb3b; text-shadow: 4px 4px #e91e63; 
            font-size: 40px; font-weight: bold; width: 100%; z-index: 20; pointer-events: none;
        }
        #stageComplete {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; color: #fff; text-shadow: 3px 3px #000; font-size: 35px; font-weight: bold;
            display: none; z-index: 25; width: 100%; pointer-events: none; animation: pulse 1.5s infinite;
        }
        #controls {
            position: absolute; bottom: 30px; left: 0; width: 100%; justify-content: space-around; z-index: 15;
            display: none; /* Completely hidden until World 11 */
            transition: opacity 0.5s ease;
        }
        .btn {
            background: rgba(0, 0, 0, 0.4); border: 2px solid rgba(255, 255, 255, 0.6); color: white;
            font-size: 24px; font-weight: bold; padding: 15px 35px; border-radius: 12px;
            user-select: none; text-shadow: 1px 1px 2px #000; box-shadow: 0px 4px 0px rgba(0,0,0,0.5);
        }
        .btn:active { transform: translateY(4px); box-shadow: none; background: rgba(0, 0, 0, 0.6); }

        #scoreboard {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(20, 20, 20, 0.95); border: 4px solid #00ffcc; box-shadow: 0 0 20px #00ffcc;
            color: #fff; padding: 20px; border-radius: 10px; width: 90%; max-width: 550px;
            text-align: center; z-index: 30; display: none; font-family: 'Courier New', monospace;
        }
        #scoreboard h1 { color: #ffeb3b; text-shadow: 2px 2px #e91e63; margin: 0 0 10px 0; font-size: 28px; text-transform: uppercase; }
        #scoreboard .death-reason { font-size: 20px; color: #ff3333; margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        #scoreboard .judgment { font-size: 22px; font-weight: bold; margin-bottom: 15px; }
        #scoreboard table { width: 100%; border-collapse: collapse; margin-bottom: 15px; font-size: 16px; text-align: left; }
        #scoreboard th, #scoreboard td { padding: 5px; border-bottom: 1px solid #444; }
        #scoreboard .player-row { background: rgba(255, 235, 59, 0.2); color: #ffeb3b; font-weight: bold; }
        #scoreboard .player-row td { border-bottom: 2px solid #ffeb3b; }
        #restartText { font-size: 22px; color: #afff94; animation: flash 1s infinite; margin-top: 10px; cursor: pointer; }
        
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.05); } }
        
        @media (max-width: 600px) {
            #scoreboard h1 { font-size: 20px; }
            #scoreboard table { font-size: 12px; }
            #scoreboard .judgment { font-size: 16px; }
            #scoreboard .death-reason { font-size: 16px; }
            #restartText { font-size: 18px; }
            .btn { padding: 12px 25px; font-size: 20px; }
        }
    </style>
</head>
<body>
    <div id="ui">WORLD: <span id="worldNum">1</span> | ENERGY: <span id="score">100</span> | DIST: <span id="dist">0</span>/1000000 <span id="challengeZone" style="color:#ffeb3b; font-weight:bold; display:none;">| SURVIVE: <span id="challengeDist">5000</span>m</span></div>
    
    <div id="msg">GO DEAN!<br>
        <small style="font-size: 22px; color: white; text-shadow: 2px 2px #000;">
            TAP TO JUMP | ENTER PIPES TO WARP<br>
            <span style="color: #afff94;">EAT FRUITS</span> | <span style="color: #ff9494;">SMASH MEAT WITH RAINBOWS</span><br>
            STAY VEGAN! REACH 1,000,000m!
        </small>
    </div>

    <div id="stageComplete">STAGE COMPLETE!<br><small style="color:#ffeb3b; font-size: 24px;">TAP TO CONTINUE TO MARIO WORLD</small></div>

    <div id="scoreboard"></div>
    
    <div id="controls">
        <div class="btn" id="btnLeft">◀</div>
        <div class="btn" id="btnJump">JUMP</div>
        <div class="btn" id="btnRight">▶</div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, type, duration, vol, slide = 0) {
    try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        if (slide) osc.frequency.exponentialRampToValueAtTime(freq + slide, audioCtx.currentTime + duration);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    } catch(e) {}
}

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const distEl = document.getElementById('dist');
const msgEl = document.getElementById('msg');
const stageCompleteEl = document.getElementById('stageComplete');
const scoreboardEl = document.getElementById('scoreboard');
const worldEl = document.getElementById('worldNum');
const challengeZoneEl = document.getElementById('challengeZone');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Core Game Variables
let gameActive = false, stageTransition = false, energy = 100, distance = 0, currentWorld = 1, worldDistance = 0; 
let powerUpTimer = 0, rainbowTimer = 0, jumpCount = 0, bgRainbowX = 0;
let megaJumpTimer = 0, flyTimer = 0;
let canRestart = false; 

// Horizontal movement variables
let keys = { left: false, right: false };
let flagPole = { active: false, x: 0, y: 0, flagY: 0 };
const player = { x: 100, y: 0, w: 20, h: 30, dy: 0, grounded: false, head: "👦", frame: 0 };

const worldSettings = {
    1: { bg: "#5c94fc", ground: "#9acd32", floor: "#e07b39", items: ["🍎", "🍐", "🥦"], hazards: ["🥩", "🍖"], deco: "☁️" },
    2: { bg: "#ff9ff3", ground: "#feca57", floor: "#ff9f43", items: ["🍓", "🍊", "🥥"], hazards: ["🍔", "🥓"], deco: "🌈" },
    3: { bg: "#48dbfb", ground: "#1dd1a1", floor: "#10ac84", items: ["🌽", "🥑", "🥥"], hazards: ["🌭", "🍕"], deco: "⛅" },
    4: { bg: "#000000", ground: "#576574", floor: "#222f3e", items: ["🥥"], hazards: ["🔥", "🥩", "🍖"], deco: "☄️" },
    5: { bg: "#0077be", ground: "#c2b280", floor: "#e0cd95", items: ["🌿", "🥬", "🌱"], hazards: ["🐟", "🐡", "🦈"], deco: "🫧" },
    6: { bg: "#87CEEB", ground: "#2E8B57", floor: "#8B4513", items: ["🫐", "🍇", "🍓"], hazards: ["🍔", "🥩", "🍗"], deco: "🌴" },
    7: { bg: "#4a148c", ground: "#00ffcc", floor: "#1a0033", items: ["🌀", "✨", "⚡"], hazards: ["👾", "🪲", "🚫"], deco: "📺" }, 
    8: { bg: "#222", ground: "#fff", floor: "#333", items: ["🍎"], hazards: ["🥩"], deco: "🌙" }, 
    9: { bg: "#6ab0de", ground: "transparent", floor: "transparent", items: ["☀️", "🌞"], hazards: ["⛈️", "🐦", "🦅"], deco: "☁️" }, 
    10: { bg: "#f0f0f0", ground: "#cccccc", floor: "#aaaaaa", items: [], hazards: [], deco: "" },
    11: { bg: "#5c94fc", ground: "#c84c0c", floor: "#f8d820", items: ["🍎", "🍓"], hazards: ["🐢", "🍄"], deco: "☁️" } 
};

let obstacles = [], items = [], decor = [], pipes = [], pitfalls = [], blocks = [], particles = [];

// Input Handling
function doJump() {
    if (!gameActive && !stageTransition) {
        if (!canRestart) { 
            canRestart = true; 
            let rt = document.getElementById('restartText');
            if (rt) rt.innerText = "TAP AGAIN TO RESTART";
            return; 
        }
        resetGame(); return; 
    }
    
    if (stageTransition) {
        if (canRestart) startLevel11();
        return;
    }
    
    if (currentWorld === 5 || currentWorld === 9 || flyTimer > 0) {
        player.dy = (flyTimer > 0 || currentWorld === 9) ? -9 : -6;
        player.grounded = false;
        playSound(300, 'triangle', 0.1, 0.1, 100);
    } else {
        const maxJumps = powerUpTimer > 0 ? 2 : 1;
        if (player.grounded || jumpCount < maxJumps) {
            player.dy = megaJumpTimer > 0 ? -24 : (powerUpTimer > 0 ? -18 : -14);
            player.grounded = false;
            jumpCount++;
            playSound(200 + (jumpCount * 100), 'square', 0.15, 0.1, 400);
        }
    }
}

// Touch UI Listeners
function bindTouch(id, actionDown, actionUp) {
    const el = document.getElementById(id);
    ['touchstart', 'mousedown'].forEach(evt => el.addEventListener(evt, e => {
        e.preventDefault(); e.stopPropagation();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        actionDown();
    }, {passive: false}));
    ['touchend', 'mouseup'].forEach(evt => el.addEventListener(evt, e => {
        e.preventDefault(); e.stopPropagation();
        actionUp();
    }));
}

bindTouch('btnLeft', () => keys.left = true, () => keys.left = false);
bindTouch('btnRight', () => keys.right = true, () => keys.right = false);
bindTouch('btnJump', () => doJump(), () => {});

// Global tap fallback
window.addEventListener('mousedown', e => { if (e.target.className !== 'btn') { if (audioCtx.state === 'suspended') audioCtx.resume(); doJump(); }});
window.addEventListener('touchstart', e => { if (e.target.className !== 'btn') { if (audioCtx.state === 'suspended') audioCtx.resume(); doJump(); }}, {passive: false});

// Keyboard Listeners
window.addEventListener('keydown', e => {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (e.code === 'ArrowLeft') keys.left = true;
    if (e.code === 'ArrowRight') keys.right = true;
    if (e.code === 'Space' || e.code === 'ArrowUp') doJump();
});
window.addEventListener('keyup', e => {
    if (e.code === 'ArrowLeft') keys.left = false;
    if (e.code === 'ArrowRight') keys.right = false;
});

function resetGame() {
    energy = 100; distance = 0; currentWorld = 1; worldDistance = 0; 
    powerUpTimer = 0; rainbowTimer = 0; megaJumpTimer = 0; flyTimer = 0; canRestart = false;
    stageTransition = false;
    player.x = 100; keys.left = false; keys.right = false; flagPole.active = false;
    challengeZoneEl.style.display = "none";
    obstacles = []; items = []; decor = []; pipes = []; pitfalls = []; blocks = []; particles = [];
    gameActive = true;
    
    msgEl.style.display = 'none'; stageCompleteEl.style.display = 'none';
    scoreboardEl.style.display = 'none'; 
    
    // Hide all controls for standard worlds
    document.getElementById('controls').style.display = 'none';

    document.body.style.background = worldSettings[currentWorld].bg;
}

function startLevel11() {
    currentWorld = 11; worldDistance = 0; player.y = -100; player.x = 100; player.dy = 0;
    obstacles = []; items = []; pitfalls = []; pipes = []; blocks = []; particles = [];
    flagPole.active = false; stageTransition = false; gameActive = true; canRestart = false;
    
    stageCompleteEl.style.display = 'none'; 
    
    // Unveil ALL controls for World 11
    document.getElementById('controls').style.display = 'flex';

    document.body.style.background = worldSettings[currentWorld].bg;
    playSound(400, 'sine', 0.5, 0.2, 200);
}

// Precise AABB rectangle intersect
function rectIntersect(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

let lastTime = 0;

function gameLoop(timestamp) {
    if (!lastTime) lastTime = timestamp;
    let dt = (timestamp - lastTime) / 16.666; 
    lastTime = timestamp;
    if (dt > 3) dt = 3; 

    if (gameActive) update(dt);
    if (stageTransition) updateTransition(dt);
    
    draw();
    requestAnimationFrame(gameLoop);
}

function update(dt) {
    let groundLevel = canvas.height - 80;

    // Movement & Drains
    distance += 2 * dt; worldDistance += 2 * dt;
    energy -= 0.035 * dt;
    bgRainbowX -= 1 * dt; 

    if (powerUpTimer > 0) powerUpTimer -= dt;
    if (rainbowTimer > 0) rainbowTimer -= dt;
    if (megaJumpTimer > 0) megaJumpTimer -= dt;
    if (flyTimer > 0) flyTimer -= dt;

    // Left/Right Dodge Logic - ONLY in World 11
    if (currentWorld === 11) {
        if (keys.left) player.x -= 7 * dt;
        if (keys.right) player.x += 7 * dt;
        if (player.x < 0) player.x = 0;
        if (player.x > canvas.width - 40) player.x = canvas.width - 40;
    } else {
        player.x = 100; // Lock player in auto-runner mode
    }

    // World 4 Flagpole Sequence Trigger
    if (currentWorld === 4 && worldDistance > 10000 && !flagPole.active) {
        flagPole = { active: true, x: canvas.width + 100, y: groundLevel - 400, flagY: groundLevel - 50 };
    }

    if (flagPole.active && currentWorld === 4) {
        flagPole.x -= 8 * dt;
        let pBox = { x: player.x + 10, y: player.y + 40, w: 20, h: 30 };
        let poleBox = { x: flagPole.x + 10, y: flagPole.y, w: 10, h: 400 };
        
        if (rectIntersect(pBox, poleBox)) {
            gameActive = false; stageTransition = true;
            canRestart = false; 
            setTimeout(() => canRestart = true, 1500); 
            document.getElementById('controls').style.display = 'none';
            stageCompleteEl.style.display = 'block';
            playSound(400, 'square', 0.5, 0.2, 300);
            return;
        }
    }

    let displayEnergy = Math.max(0, Math.ceil(energy));
    scoreEl.innerText = displayEnergy;
    distEl.innerText = Math.floor(distance);
    worldEl.innerText = (currentWorld === 11) ? "11 [MARIO ZONE]" : currentWorld;

    if (distance >= 1000000) { die("WIN"); return; }

    // Physics
    let isUnderwater = (currentWorld === 5);
    let gravity = (isUnderwater || currentWorld === 9 || flyTimer > 0) ? 0.25 : 0.8;
    player.dy += gravity * dt;
    if ((isUnderwater || currentWorld === 9 || flyTimer > 0) && player.dy > 4) player.dy = 4;
    player.y += player.dy * dt;

    let pBox = { x: player.x + 10, y: player.y + 40, w: 20, h: 30 };

    if (currentWorld === 9) {
        if (player.y < -90) player.y = canvas.height;
        else if (player.y > canvas.height) player.y = -90;
    }

    let pit = pitfalls.find(p => pBox.x + pBox.w > p.x && pBox.x < p.x + p.w);
    if (player.y + 70 > groundLevel && currentWorld !== 9) {
        if (pit) {
            if (player.y > canvas.height) {
                if (pit.isWater && currentWorld !== 5) {
                    currentWorld = 5; worldDistance = 0; player.y = -50; player.dy = 0;
                    obstacles = []; items = []; pitfalls = []; pipes = [];
                    document.body.style.background = worldSettings[currentWorld].bg;
                    playSound(400, 'sine', 0.5, 0.1, -200);
                } else {
                    die("FALL"); return;
                }
            }
        } else {
            player.y = groundLevel - 70; player.dy = 0; player.grounded = true; jumpCount = 0;
        }
    }

    // World 11 Mario Blocks
    if (currentWorld === 11 && Math.random() < 0.01) {
        blocks.push({ x: canvas.width, y: groundLevel - 130, w: 50, h: 50, hit: false });
    }

    blocks.forEach((b, i) => {
        b.x -= 8 * dt;
        let bBox = { x: b.x, y: b.y, w: b.w, h: b.h };
        if (!b.hit && rectIntersect(pBox, bBox)) {
            if (player.dy < 0 && pBox.y > bBox.y + bBox.h - 15) { 
                // Hit from bottom
                b.hit = true; player.dy = Math.max(player.dy, 2); 
                playSound(600, 'square', 0.1, 0.1, 100);
                if (Math.random() < 0.3) {
                    items.push({ x: b.x, y: b.y - 45, char: "🌈", type: 'rainbow', boxW: 40, boxH: 40 });
                } else {
                    items.push({ x: b.x, y: b.y - 45, char: "🍎", type: 'food', boxW: 40, boxH: 40 });
                }
            }
        }
        if (b.x < -100) blocks.splice(i, 1);
    });

    // Spawners
    if (Math.random() < 0.02 && currentWorld !== 10) {
        let obsType = worldSettings[currentWorld].hazards[Math.floor(Math.random()*worldSettings[currentWorld].hazards.length)];
        let dx = -(8 + (currentWorld > 4 ? 2 : currentWorld));
        obstacles.push({ x: canvas.width, y: groundLevel - 45, char: obsType, dx: dx, dy: 0, boxW: 40, boxH: 40, isCritter: (currentWorld===11) });
    }

    if (Math.random() < 0.015 && currentWorld !== 10) {
        items.push({ x: canvas.width, y: groundLevel - 120, char: worldSettings[currentWorld].items[0], type: 'food', boxW: 40, boxH: 40 });
    }

    // Spawning Pipes
    if (worldDistance > 1200 && pipes.length === 0 && currentWorld !== 9 && currentWorld !== 4 && currentWorld !== 11) {
        let nextDest = Math.floor(Math.random() * 6) + 1;
        while(nextDest === currentWorld) nextDest = Math.floor(Math.random() * 6) + 1;
        pipes.push({ x: canvas.width + 100, y: groundLevel - 70, w: 70, h: 70, dest: nextDest, color: "#2ecc71" });
    }

    // Entities Collision Update
    obstacles.forEach((obs, i) => {
        obs.x += obs.dx * dt;
        let oBox = { x: obs.x, y: obs.y, w: obs.boxW, h: obs.boxH };
        
        if (rectIntersect(pBox, oBox)) {
            // Stomp logic for critters (World 11 only)
            if (obs.isCritter && player.dy > 0 && pBox.y + pBox.h - (player.dy*dt) <= oBox.y + 20) {
                player.dy = -12; // Bounce
                distance += 500;
                obstacles.splice(i, 1);
                playSound(700, 'square', 0.1, 0.1, -100);
            } else if (rainbowTimer > 0) {
                obstacles.splice(i, 1); playSound(800, 'sine', 0.1, 0.1, 200); 
            } else { 
                energy -= 25; playSound(150, 'sawtooth', 0.2, 0.2, -50); 
                obstacles.splice(i, 1);
                if (energy <= 0) { die("MEAT"); return; }
            }
        }
        if (obs.x < -100) obstacles.splice(i, 1);
    });

    items.forEach((item, i) => {
        item.x -= 8 * dt;
        let iBox = { x: item.x, y: item.y, w: item.boxW, h: item.boxH };
        if (rectIntersect(pBox, iBox)) {
            if (item.type === 'rainbow') { rainbowTimer = 400; playSound(600, 'sine', 0.5, 0.1, 500); }
            else { energy = Math.min(100, energy + 12); playSound(800, 'sine', 0.1, 0.1); }
            items.splice(i, 1);
        }
        if (item.x < -100) items.splice(i, 1);
    });

    pipes.forEach((p, i) => {
        p.x -= 8 * dt;
        let poleBox = { x: p.x, y: p.y, w: p.w, h: canvas.height };
        if (rectIntersect(pBox, poleBox)) {
            playSound(400, 'sine', 0.5, 0.1, 200);
            currentWorld = p.dest; worldDistance = 0; player.y = -100; player.dy = 0;
            obstacles = []; items = []; pitfalls = []; pipes = []; blocks = [];
            document.body.style.background = worldSettings[currentWorld].bg;
        }
        if (p.x < -200) pipes.splice(i, 1);
    });

    if (energy <= 0) die("ENERGY"); 
}

function updateTransition(dt) {
    let groundLevel = canvas.height - 80;
    
    // Flag sliding down
    if (flagPole.flagY > flagPole.y) {
        flagPole.flagY -= 5 * dt;
    } else {
        // Fireworks logic
        if (Math.random() < 0.05) {
            playSound(1000 + Math.random()*500, 'sine', 0.2, 0.1, -500);
            let fx = Math.random() * canvas.width;
            let fy = Math.random() * (canvas.height/2);
            for(let i=0; i<20; i++) {
                let ang = Math.random() * Math.PI * 2;
                let spd = Math.random() * 5 + 2;
                particles.push({
                    x: fx, y: fy, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd,
                    life: 60, color: `hsl(${Math.random()*360}, 100%, 50%)`
                });
            }
        }
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx * dt; p.y += p.vy * dt;
        p.vy += 0.05 * dt; p.life -= 1 * dt;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function die(type) {
    if (!gameActive) return;
    gameActive = false; canRestart = false; 
    let msg = type === "ENERGY" ? "YOU WITHERED AWAY!" : "VICTIM OF GREED";
    document.getElementById('controls').style.display = 'none'; // Ensure UI is hidden on death
    scoreEl.innerText = "0"; msgEl.style.display = 'none'; 
    let distFloor = Math.floor(distance);
    
    let sbHtml = `<h1>GO DEAN'S LEADERBOARD</h1><div class="death-reason">${msg}</div><div class="judgment">SCORE: ${distFloor}m</div><div id="restartText">TAP TO RESTART</div>`;
    scoreboardEl.innerHTML = sbHtml;
    scoreboardEl.style.display = 'block';
    playSound(50, 'sawtooth', 0.5, 0.2);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const s = worldSettings[currentWorld];
    let groundLevel = canvas.height - 80;

    // Environment
    ctx.fillStyle = s.floor; ctx.fillRect(0, groundLevel, canvas.width, 80);
    ctx.fillStyle = s.ground; ctx.fillRect(0, groundLevel, canvas.width, 15);

    // Decor & Pits
    pitfalls.forEach(p => {
        ctx.fillStyle = p.isLava ? "#ff3333" : (p.isWater ? "#0077be" : s.bg);
        ctx.fillRect(p.x, groundLevel - 1, p.w, 82);
    });

    pipes.forEach(p => { ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.w, canvas.height); });

    // Mario Blocks
    blocks.forEach(b => {
        ctx.fillStyle = b.hit ? "#c84c0c" : "#f8d820";
        ctx.fillRect(b.x, b.y, b.w, b.h);
        ctx.strokeStyle = "#000"; ctx.lineWidth = 2; ctx.strokeRect(b.x, b.y, b.w, b.h);
        if (!b.hit) { ctx.fillStyle = "#000"; ctx.font = "30px Arial"; ctx.fillText("?", b.x + 15, b.y + 35); }
    });

    // Player
    player.frame += 0.25;
    const runCycle = player.grounded ? Math.sin(player.frame) * 15 : 0;
    const px = player.x, py = player.y;
    
    ctx.strokeStyle = "#333"; ctx.lineWidth = 4; ctx.beginPath();
    if (!player.grounded) { ctx.moveTo(px + 20, py + 65); ctx.lineTo(px + 10, py + 80); ctx.moveTo(px + 20, py + 65); ctx.lineTo(px + 30, py + 80); }
    else { ctx.moveTo(px + 20, py + 65); ctx.lineTo(px + 20 + runCycle, py + 90); ctx.moveTo(px + 20, py + 65); ctx.lineTo(px + 20 - runCycle, py + 90); }
    ctx.stroke();

    ctx.fillStyle = (rainbowTimer > 0) ? `hsl(${Date.now() % 360}, 80%, 50%)` : "#27ae60"; 
    ctx.fillRect(px + 10, py + 40, 20, 30);
    
    ctx.font = (powerUpTimer > 0 || megaJumpTimer > 0) ? "55px Arial" : "40px Arial"; 
    ctx.fillText(player.head, px, py + 35);

    // Items and Obstacles 
    ctx.font = "40px Arial";
    obstacles.forEach(o => ctx.fillText(o.char, o.x, o.y + 35));
    items.forEach(it => ctx.fillText(it.char, it.x, it.y + 35));

    // Flagpole sequence drawing
    if (flagPole.active) {
        ctx.fillStyle = "#fff"; ctx.fillRect(flagPole.x + 10, flagPole.y, 10, 400); // Pole
        ctx.fillStyle = "#e91e63"; ctx.beginPath(); ctx.arc(flagPole.x + 15, flagPole.y, 15, 0, Math.PI*2); ctx.fill(); // Top ball
        ctx.fillStyle = "#32ff7e"; ctx.fillRect(flagPole.x - 40, flagPole.flagY, 50, 40); // Flag
    }

    particles.forEach(p => {
        ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
    });
}
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
