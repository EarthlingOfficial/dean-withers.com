<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GO DEAN: VEGAN ODYSSEY — STAGE 2 FIXED</title>
    <style>
        * {
            user-select: none;
            touch-action: manipulation;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #5c94fc;
            font-family: 'Courier New', Courier, monospace;
            transition: background 0.6s;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0,0,0,0.55);
            padding: 6px 14px;
            border-radius: 40px;
            backdrop-filter: blur(6px);
            color: #FFF;
            text-shadow: 1px 1px 0 #000;
            font-size: 18px;
            font-weight: bold;
            pointer-events: none;
            z-index: 10;
            font-family: monospace;
        }

        #msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #ffeb3b;
            text-shadow: 3px 3px #e91e63;
            font-size: 36px;
            font-weight: bold;
            width: 90%;
            pointer-events: none;
            z-index: 20;
            background: rgba(0,0,0,0.4);
            padding: 12px;
            border-radius: 60px;
            white-space: nowrap;
        }

        @media (max-width: 700px) {
            #msg { font-size: 20px; white-space: normal; top: 30%; }
            #msg small { font-size: 14px; }
        }

        #scoreboard {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 20, 0.98);
            border: 4px solid #00ffcc;
            box-shadow: 0 0 28px #00ffcc;
            color: #fff;
            padding: 20px;
            border-radius: 24px;
            width: 90%;
            max-width: 580px;
            text-align: center;
            z-index: 30;
            display: none;
            font-family: 'Courier New', monospace;
            backdrop-filter: blur(8px);
        }

        #scoreboard h1 { color: #ffeb3b; text-shadow: 2px 2px #e91e63; margin: 0 0 8px 0; font-size: 28px; }
        .death-reason { font-size: 18px; color: #ff8888; margin-bottom: 6px; font-weight: bold; text-transform: uppercase; }
        .judgment { font-size: 20px; font-weight: bold; margin-bottom: 12px; }
        #scoreboard table { width: 100%; border-collapse: collapse; margin-bottom: 12px; font-size: 14px; }
        th, td { padding: 5px; border-bottom: 1px solid #444; text-align: left; }
        .player-row { background: rgba(255, 235, 59, 0.25); color: #ffeb3b; font-weight: bold; }
        #restartText { font-size: 20px; color: #afff94; animation: pulse 1s infinite; margin-top: 8px; cursor: pointer; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        #stageOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            display: none;
            z-index: 50;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            backdrop-filter: blur(12px);
        }

        #stageOverlay.active { display: flex; }
        #stageOverlay h1 { color: #ffeb3b; text-shadow: 3px 3px #e91e63; font-size: 48px; margin: 0 0 20px; animation: pulse 0.9s infinite; }
        #stageOverlay p { color: #f0f0f0; font-size: 22px; margin: 8px 0; line-height: 1.4; max-width: 85%; }
        .tap-prompt { color: #afff94; font-size: 26px; margin-top: 32px; animation: pulse 1s infinite; font-weight: bold; }

        #mobileControls {
            position: absolute;
            bottom: 22px;
            left: 0;
            width: 100%;
            display: none;
            justify-content: space-between;
            padding: 0 24px;
            box-sizing: border-box;
            z-index: 25;
            pointer-events: none;
        }
        #mobileControls.active { display: flex; }
        .ctrl-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(30,30,40,0.8);
            border: 3px solid #ffeb3b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            font-weight: bold;
            color: #ffeb3b;
            pointer-events: all;
            touch-action: none;
            box-shadow: 0 6px 14px black;
            backdrop-filter: blur(10px);
        }
        @media (max-width: 600px) {
            .ctrl-btn { width: 65px; height: 65px; font-size: 36px; }
            #stageOverlay h1 { font-size: 32px; }
            #stageOverlay p { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div id="ui">🌱 WORLD: <span id="worldNum">1</span> | ⚡ ENERGY: <span id="score">100</span> | 📍 DIST: <span id="dist">0</span>/1M <span id="challengeZone" style="color:#ffaa33; display:none;">| 🟡 SURVIVE: <span id="challengeDist">5000</span>m</span></div>
    <div id="msg">🍃 GO DEAN! 🍃<br><small>TAP/CLICK TO JUMP • 🌈 EAT VEGGIES • 💥 SMASH MEAT<br>🏁 REACH 1,000,000m & BEAT STAGE 2!</small></div>
    <div id="stageOverlay"><h1 id="stageTitle">STAGE CLEAR!</h1><p id="stageMsg"></p><div class="tap-prompt" id="stageTapPrompt">⚡ TAP TO CONTINUE ⚡</div></div>
    <div id="scoreboard"></div>
    <div id="mobileControls"><div class="ctrl-btn" id="btnLeft">◀</div><div class="ctrl-btn" id="btnRight">▶</div></div>
    <canvas id="gameCanvas"></canvas>

<script>
    (function(){
        // ---------- AUDIO ----------
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, type, duration, vol, slide=0){
            try{
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                if(slide) osc.frequency.exponentialRampToValueAtTime(freq+slide, audioCtx.currentTime+duration);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime+duration);
            }catch(e){}
        }
        function playFlagSound(){ 
            let now=audioCtx.currentTime;
            [261,329,392,523,659,784].forEach((f,i)=>{ let osc=audioCtx.createOscillator(), gain=audioCtx.createGain(); osc.type='square'; osc.frequency.value=f; gain.gain.setValueAtTime(0.18,now+i*0.09); gain.gain.exponentialRampToValueAtTime(0.01,now+i*0.09+0.1); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(now+i*0.09); osc.stop(now+i*0.09+0.12); });
        }
        function playStomp(){ 
            let osc=audioCtx.createOscillator(), gain=audioCtx.createGain(); osc.type='square'; osc.frequency.setValueAtTime(300,audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(80,audioCtx.currentTime+0.12); gain.gain.setValueAtTime(0.2,audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.12); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime+0.12);
        }
        function playBoxHit(){ let osc=audioCtx.createOscillator(), gain=audioCtx.createGain(); osc.type='square'; osc.frequency.setValueAtTime(520,audioCtx.currentTime); gain.gain.setValueAtTime(0.18,audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.08); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime+0.08); }

        // canvas
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const distEl = document.getElementById('dist');
        const msgEl = document.getElementById('msg');
        const scoreboardEl = document.getElementById('scoreboard');
        const worldEl = document.getElementById('worldNum');
        const challengeZone = document.getElementById('challengeZone');
        const challengeDistSpan = document.getElementById('challengeDist');
        const stageOverlay = document.getElementById('stageOverlay');
        const stageTitle = document.getElementById('stageTitle');
        const stageMsg = document.getElementById('stageMsg');
        const mobileControls = document.getElementById('mobileControls');
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');

        function resizeCanvas(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', ()=>{ resizeCanvas(); if(currentStage===2 && s2.levelBuilt) buildStage2Level(); });
        resizeCanvas();

        // ------------- GLOBAL STATE -------------
        let gameActive = true;
        let energy = 100, distance = 0, worldDistance = 0, currentWorld = 1;
        let powerUpTimer = 0, rainbowTimer = 0, megaJumpTimer = 0, flyTimer = 0, starTimer = 0;
        let jumpCount = 0, canRestart = false;
        let currentStage = 1;    // 1 = runner, 2 = mario-style
        let inYellowChallenge = false, yellowChallengeLeft = 5000, yellowWorldSeed = 0;
        let bossTimer = 0, bossDino = { x: 0, dir: -1, state: 'spawning' };
        let obstacles = [], items = [], decor = [], pipes = [], pitfalls = [];
        let flagPoleX = -1, flagY = 0, flagRiseSpeed = 0, stageTransitionState = 'none'; // none, flag_approach, flag_rising, fireworks, waiting
        let fireworks = [];
        let stageOverlayPhase = 0;    // used for stage1->stage2 taps
        
        // stage 2 exclusive objects
        let s2 = {
            cameraX: 0, levelWidth: 8200,
            keys: { left: false, right: false },
            boxes: [], enemies: [], platforms: [], particles: [], foodItems: [],
            flagX: 7900, flagReached: false, flagRiseY: 0, flagRising: false, fireworks: [],
            levelBuilt: false
        };
        const player = { x: 100, y: 0, w: 44, h: 88, dy: 0, dx: 0, grounded: false, head: "👦", frame: 0 };

        // world settings (stage1)
        const worldSettings = {
            1:  { bg:"#5c94fc", ground:"#9acd32", floor:"#e07b39", items:["🍎","🍐","🥦"], hazards:["🥩","🍖"], deco:"☁️" },
            2:  { bg:"#ff9ff3", ground:"#feca57", floor:"#ff9f43", items:["🍓","🍊","🥥"], hazards:["🍔","🥓"], deco:"🌈" },
            3:  { bg:"#48dbfb", ground:"#1dd1a1", floor:"#10ac84", items:["🌽","🥑","🥥"], hazards:["🌭","🍕"], deco:"⛅" },
            4:  { bg:"#000000", ground:"#576574", floor:"#222f3e", items:["🥥"], hazards:["🔥","🥩","🍖"], deco:"☄️" },
            5:  { bg:"#0077be", ground:"#c2b280", floor:"#e0cd95", items:["🌿","🥬","🌱"], hazards:["🐟","🐡","🦈"], deco:"🫧" },
            6:  { bg:"#87CEEB", ground:"#2E8B57", floor:"#8B4513", items:["🫐","🍇","🍓"], hazards:["🍔","🥩","🍗"], deco:"🌴" },
            7:  { bg:"#4a148c", ground:"#00ffcc", floor:"#1a0033", items:["🌀","✨","⚡"], hazards:["👾","🪲","🚫"], deco:"📺" },
            8:  { bg:"#222",    ground:"#fff",    floor:"#333",    items:["🍎"], hazards:["🥩"], deco:"🌙" },
            9:  { bg:"#6ab0de", ground:"transparent", floor:"transparent", items:["☀️","🌞"], hazards:["⛈️","🐦","🦅"], deco:"☁️" },
            10: { bg:"#f0f0f0", ground:"#cccccc", floor:"#aaaaaa", items:[], hazards:[], deco:"" },
            11: { bg:"#1e3c2c", ground:"#a57c4c", floor:"#6b4c2c", items:["🍎","🥬","🌽"], hazards:["🥩","🍗"], deco:"🌿" }
        };
        const poolFood = ["🍎","🍐","🥦","🍓","🍊","🥬","🌽","🥑","🫐"];

        // ---------- HELPERS ----------
        function generateTitle(dist){ return "VEGAN_WARRIOR_"+Math.floor(dist/1000)+Math.floor(Math.random()*999); }
        function clearSurvival(){ inYellowChallenge=false; challengeZone.style.display="none"; }
        function die(reason){
            if(!gameActive) return;
            gameActive = false; canRestart = false;
            mobileControls.classList.remove('active');
            stageOverlay.classList.remove('active');
            let msg = "";
            if(reason==="WIN") msg="🏆 ULTIMATE VEGAN LEGEND! 🏆";
            else if(reason==="FALL") msg="YOU FELL INTO THE VOID";
            else if(reason==="SHARK") msg="DEVOURED BY MEGA SHARK";
            else if(reason==="DINO") msg="MEATASAURUS REX STRIKES";
            else if(reason==="ENERGY") msg="YOUR VITALITY CRUMBLED";
            else if(reason==="SAUSAGE") msg="ROLLED BY 🌭";
            else msg="DEFEATED BY MEAT";
            let distFloor = Math.floor(distance);
            let storedDist = parseInt(localStorage.getItem('veganBest')) || 0;
            let storedName = localStorage.getItem('veganName') || "SPROUT_DEAN";
            if(distFloor > storedDist){ localStorage.setItem('veganBest',distFloor); localStorage.setItem('veganName',generateTitle(distFloor)); storedDist=distFloor; storedName=generateTitle(distFloor); }
            let sbHtml = `<h1>🌱 VEGAN LEADERBOARD 🌱</h1><div class="death-reason">${msg}</div><div class="judgment">${storedName} | ${distFloor}m</div><table>`;
            for(let i=0;i<5;i++){ let fakeDist = Math.max(0,storedDist - (i*12000) + (i*3000)); sbHtml+=`<tr ${i===0?'class="player-row"':''}><td>#${i+1}</td><td>${i===0?storedName+" (YOU)":generateTitle(fakeDist)}</td><td>${i===0?distFloor:fakeDist}m</td></tr>`; }
            sbHtml+=`</table><div id="restartText">🔁 TAP ANYWHERE TO RESTART 🔁</div>`;
            scoreboardEl.innerHTML = sbHtml;
            scoreboardEl.style.display = 'block';
            playSound(60,'sawtooth',0.6,0.2);
        }

        function resetGame(){
            energy = 100; distance = 0; worldDistance = 0; currentWorld = 1; currentStage = 1;
            powerUpTimer=0; rainbowTimer=0; megaJumpTimer=0; flyTimer=0; starTimer=0;
            inYellowChallenge=false; yellowChallengeLeft=5000; bossTimer=0;
            obstacles=[]; items=[]; decor=[]; pipes=[]; pitfalls=[]; fireworks=[];
            flagPoleX=-1; stageTransitionState='none'; stageOverlayPhase=0;
            s2.flagReached=false; s2.flagRising=false; s2.levelBuilt=false; s2.fireworks=[];
            gameActive=true; canRestart=false;
            player.x=100; player.y=0; player.dy=0; player.dx=0; player.grounded=false; jumpCount=0;
            document.body.style.background = worldSettings[1].bg;
            scoreboardEl.style.display='none';
            msgEl.style.display='block';
            stageOverlay.classList.remove('active');
            mobileControls.classList.remove('active');
            challengeZone.style.display='none';
            if(audioCtx.state==='suspended') audioCtx.resume();
        }

        // ---------- STAGE 2 BUILDER ----------
        function buildStage2Level(){
            s2.levelBuilt = true;
            s2.boxes = []; s2.enemies = []; s2.platforms = []; s2.foodItems = [];
            const groundLevel = canvas.height - 85;
            const LW = s2.levelWidth;
            // platforms
            const platDefs = [
                {x:300,y:groundLevel-120,w:130,h:24,type:'brick'},{x:550,y:groundLevel-180,w:100,h:24,type:'grass'},{x:750,y:groundLevel-130,w:150,h:24,type:'brick'},
                {x:1050,y:groundLevel-210,w:120,h:24,type:'brick'},{x:1280,y:groundLevel-160,w:100,h:24,type:'grass'},{x:1550,y:groundLevel-240,w:90,h:24,type:'brick'},
                {x:1850,y:groundLevel-180,w:140,h:24,type:'grass'},{x:2150,y:groundLevel-250,w:80,h:24,type:'brick'},{x:2450,y:groundLevel-190,w:130,h:24,type:'brick'},
                {x:2800,y:groundLevel-220,w:110,h:24,type:'grass'},{x:3100,y:groundLevel-280,w:80,h:24,type:'brick'},{x:3400,y:groundLevel-210,w:130,h:24,type:'grass'},
                {x:3800,y:groundLevel-260,w:100,h:24,type:'brick'},{x:4150,y:groundLevel-190,w:140,h:24,type:'grass'},{x:4550,y:groundLevel-280,w:90,h:24,type:'brick'},
                {x:5000,y:groundLevel-210,w:130,h:24,type:'brick'},{x:5400,y:groundLevel-260,w:110,h:24,type:'grass'},{x:5800,y:groundLevel-180,w:120,h:24,type:'brick'},
                {x:6250,y:groundLevel-250,w:100,h:24,type:'brick'},{x:6700,y:groundLevel-150,w:140,h:24,type:'grass'},{x:7200,y:groundLevel-200,w:130,h:24,type:'brick'}
            ];
            s2.platforms = platDefs;
            // Question boxes
            const qboxPos = [[480,groundLevel-210],[660,groundLevel-270],[1100,groundLevel-320],[1470,groundLevel-340],[1900,groundLevel-290],[2500,groundLevel-330],[2860,groundLevel-370],[3250,groundLevel-290],[3880,groundLevel-370],[4230,groundLevel-310],[4620,groundLevel-390],[5070,groundLevel-340],[5480,groundLevel-370],[5880,groundLevel-300],[6350,groundLevel-360],[6780,groundLevel-280],[7280,groundLevel-320]];
            const rewards = ['blueberry','rainbow','heart','star','mushroom'];
            s2.boxes = qboxPos.map(([x,y])=>({x,y,w:42,h:42,hit:false,popped:false,bounceAnim:0,reward:rewards[Math.floor(Math.random()*rewards.length)]}));
            // enemies (steak, chicken, sausage)
            const groundY = groundLevel-45;
            const enemyPos = [[550,'steak'],[820,'chicken'],[1150,'sausage'],[1460,'steak'],[1900,'chicken'],[2320,'steak'],[2620,'sausage'],[2980,'steak'],[3320,'chicken'],[3650,'sausage'],[3980,'steak'],[4400,'chicken'],[4800,'steak'],[5200,'sausage'],[5600,'steak'],[6000,'chicken'],[6400,'steak'],[6800,'sausage'],[7150,'steak'],[7450,'chicken']];
            s2.enemies = enemyPos.map(([x,typ])=>{
                let speed = typ==='sausage'?3.2: (typ==='chicken'?1.7:2.3);
                return {x,y:groundY,w:42,h:42,type:typ,dy:0,dx:-speed,speed:speed,alive:true,dead:false,deadTimer:0,bounceTimer:0,baseY:groundY,frame:0};
            });
            // floating food
            for(let i=0;i<48;i++){ 
                let fx = 280 + i*150 + Math.random()*70;
                let fy = groundLevel-100 - Math.random()*140;
                s2.foodItems.push({x:fx,y:fy,char:poolFood[Math.floor(Math.random()*poolFood.length)],collected:false});
            }
            // fix camera & flag pos
            s2.flagX = 7900;
            s2.flagReached = false; s2.flagRising=false; s2.flagRiseY=0;
        }

        function startStage2(){
            currentStage = 2; currentWorld = 11;
            worldDistance = 0; energy = 100; powerUpTimer=0; rainbowTimer=0; megaJumpTimer=0; flyTimer=0; starTimer=0;
            player.x = 70; player.y = canvas.height-180; player.dy=0; player.dx=0; player.grounded=false;
            jumpCount=0; gameActive=true;
            s2.cameraX = 0; s2.flagReached=false; s2.flagRising=false; s2.flagRiseY=0; s2.fireworks=[];
            buildStage2Level();
            mobileControls.classList.add('active');
            document.body.style.background = worldSettings[11].bg;
        }

        // ---------- INPUT HANDLING ----------
        let leftPressed=false, rightPressed=false;
        btnLeft.addEventListener('touchstart',(e)=>{e.preventDefault(); leftPressed=true;},{passive:false});
        btnLeft.addEventListener('touchend',()=>{leftPressed=false;});
        btnLeft.addEventListener('mousedown',()=>leftPressed=true);
        btnLeft.addEventListener('mouseup',()=>leftPressed=false);
        btnRight.addEventListener('touchstart',(e)=>{e.preventDefault(); rightPressed=true;},{passive:false});
        btnRight.addEventListener('touchend',()=>rightPressed=false);
        btnRight.addEventListener('mousedown',()=>rightPressed=true);
        btnRight.addEventListener('mouseup',()=>rightPressed=false);
        document.addEventListener('keydown',(e)=>{if(e.key==='ArrowLeft'||e.key==='a')leftPressed=true; if(e.key==='ArrowRight'||e.key==='d')rightPressed=true;});
        document.addEventListener('keyup',(e)=>{if(e.key==='ArrowLeft'||e.key==='a')leftPressed=false; if(e.key==='ArrowRight'||e.key==='d')rightPressed=false;});

        function handleTap(e){
            if(e && (e.target===btnLeft||e.target===btnRight)) return;
            if(audioCtx.state==='suspended') audioCtx.resume();
            // Stage transition priority
            if(stageTransitionState === 'waiting'){
                stageOverlayPhase++;
                if(stageOverlayPhase === 1){
                    stageTitle.style.animation='none';
                    stageTitle.style.color='#afff94';
                    stageTitle.style.fontSize='36px';
                    stageTitle.innerText = "🌱 YOU'RE LEARNING TO VEGAN";
                    stageMsg.innerHTML = "KEEP GOING! STAGE 2 = PLATFORMER.<br>USE ◀  ▶ + TAP TO JUMP 🌈";
                    document.getElementById('stageTapPrompt').innerText = "▶ TAP TO ENTER STAGE 2 ◀";
                } else if(stageOverlayPhase >= 2){
                    stageOverlay.classList.remove('active');
                    stageTransitionState = 'none';
                    startStage2();
                }
                return;
            }
            if(!gameActive){
                if(!canRestart){ canRestart=true; return; }
                resetGame();
                return;
            }
            // JUMP logic (both stages)
            if(currentStage===2){
                if(player.grounded || jumpCount<1){
                    player.dy = (powerUpTimer>0 || megaJumpTimer>0) ? -18 : -14;
                    player.grounded=false; jumpCount++;
                    playSound(260,'square',0.13,0.12);
                }
            } else {
                if(stageTransitionState!=='none') return;
                let maxJumps = (powerUpTimer>0||megaJumpTimer>0) ? 2 : 1;
                if(player.grounded || jumpCount<maxJumps){
                    player.dy = megaJumpTimer>0 ? -24 : (powerUpTimer>0 ? -18 : -14);
                    player.grounded=false; jumpCount++;
                    playSound(220,'square',0.14,0.12);
                }
            }
        }
        window.addEventListener('mousedown', handleTap);
        window.addEventListener('touchstart', handleTap, {passive:false});

        // ------------- STAGE 1 UPDATE -------------
        function updateStage1(){
            if(!gameActive) return;
            distance += 2.2; worldDistance += 2.2;
            energy -= 0.034;
            if(powerUpTimer>0) powerUpTimer--;
            if(rainbowTimer>0) rainbowTimer--;
            if(megaJumpTimer>0) megaJumpTimer--;
            if(flyTimer>0) flyTimer--;
            if(energy<=0){ die("ENERGY"); return; }
            if(distance>=1000000){ die("WIN"); return; }

            const groundLevel = canvas.height-80;
            let gravity = (currentWorld===5 || currentWorld===9 || flyTimer>0) ? 0.26 : 0.78;
            player.dy+=gravity; 
            if((currentWorld===5||currentWorld===9||flyTimer>0) && player.dy>4.5) player.dy=4.5;
            player.y+=player.dy;
            if(currentWorld===9){ if(player.y<-player.h) player.y=canvas.height; else if(player.y>canvas.height) player.y=-player.h; }
            if(player.y+player.h>=groundLevel && currentWorld!==9){
                player.y=groundLevel-player.h; player.dy=0; player.grounded=true; jumpCount=0;
            }

            // pipes & warps
            for(let i=0;i<pipes.length;i++){
                let p=pipes[i]; p.x-=7;
                if(player.x+player.w>p.x && player.x<p.x+p.w && player.y+player.h>p.y){
                    if(p.color==="#ffeb3b"){ inYellowChallenge=true; yellowChallengeLeft=5000; challengeZone.style.display="inline"; challengeDistSpan.innerText="5000"; generateYellowChaosWorld(); playSound(400,'square',0.3,0.1);}
                    else{ currentWorld=p.dest; worldDistance=0; player.y=-100; player.dy=0; obstacles=[]; items=[]; pitfalls=[]; pipes=[]; document.body.style.background=worldSettings[currentWorld].bg; playSound(450,'sine',0.4,0.1); }
                    pipes.splice(i,1); break;
                }
                if(p.x<-200) pipes.splice(i,1);
            }
            // World 4 flag pole (change 10000 to 100 for quick test)
            if(currentWorld===4 && worldDistance>=10000 && flagPoleX<0 && stageTransitionState==='none'){ flagPoleX=canvas.width+80; stageTransitionState='flag_approach'; }
            if(stageTransitionState==='flag_approach' && flagPoleX>0){
                if(player.x+player.w > flagPoleX+5 && player.x<flagPoleX+40){
                    stageTransitionState='flag_rising'; flagY=groundLevel; gameActive=false; playFlagSound();
                }
            }
            if(stageTransitionState==='flag_rising'){ flagY-=5; if(flagY<=groundLevel-310){ flagY=groundLevel-310; stageTransitionState='fireworks'; for(let i=0;i<8;i++) setTimeout(()=>{ let fx=flagPoleX+Math.random()*100-30, fy=canvas.height/2+Math.random()*200; for(let j=0;j<18;j++){ let a=(j/18)*Math.PI*2; fireworks.push({x:fx,y:fy,vx:Math.cos(a)*(3+Math.random()*4),vy:Math.sin(a)*(3+Math.random()*4),color:`hsl(${Math.random()*360},80%,60%)`,life:70}); } playSound(500+i*70,'sine',0.2,0.1); }, i*300); setTimeout(()=>{ stageTransitionState='waiting'; stageOverlayPhase=0; stageTitle.style.animation='pulse 0.8s infinite'; stageTitle.style.color='#ffeb3b'; stageTitle.innerText='🏆 STAGE 1 COMPLETE! 🏆'; stageMsg.innerHTML='WORLD 4 SURVIVED!<br>YOU EARNED THE RIGHT TO STAGE 2'; document.getElementById('stageTapPrompt').innerHTML='🌱 TAP TO CONTINUE'; stageOverlay.classList.add('active'); },2800); } }
            // spawn mechanics simplified
            if(Math.random()<0.018 && stageTransitionState==='none' && currentWorld!==10){
                let haz = worldSettings[currentWorld].hazards[Math.floor(Math.random()*worldSettings[currentWorld].hazards.length)];
                obstacles.push({x:canvas.width, y:groundLevel-45, char:haz, dx:-7, dy:0, isGiant:false});
            }
            if(Math.random()<0.02 && currentWorld!==10){
                let foodChar = worldSettings[currentWorld].items.length? worldSettings[currentWorld].items[Math.floor(Math.random()*worldSettings[currentWorld].items.length)] : "🍎";
                items.push({x:canvas.width, y:groundLevel-110, char:foodChar, type:'food'});
            }
            // collisions
            for(let i=0;i<obstacles.length;i++){ let o=obstacles[i]; o.x+=o.dx; if(player.x+player.w>o.x && player.x<o.x+35 && player.y+player.h>o.y && player.y<o.y+45){ if(rainbowTimer>0 && !o.isGiant){ obstacles.splice(i,1); playSound(700,'sine',0.1,0.1); } else { energy-=28; playSound(150,'sawtooth',0.15,0.2); obstacles.splice(i,1); if(energy<=0){ die("MEAT"); return; } } } }
            for(let i=0;i<items.length;i++){ let it=items[i]; it.x-=7; if(player.x+player.w>it.x && player.x<it.x+40 && player.y+player.h>it.y && player.y<it.y+40){ energy=Math.min(100,energy+14); playSound(750,'sine',0.08,0.08); items.splice(i,1); } }
            scoreEl.innerText = Math.max(0,Math.ceil(energy));
            distEl.innerText = Math.floor(distance);
            worldEl.innerText = currentWorld;
            if(inYellowChallenge){ yellowChallengeLeft-=2; challengeDistSpan.innerText=Math.max(0,yellowChallengeLeft); if(yellowChallengeLeft<=0){ clearSurvival(); distance+=15000; currentWorld=1; worldDistance=0; player.y=-100; player.dy=0; obstacles=[]; pipes=[]; playSound(900,'sine',0.6,0.2); } }
        }

        // ---------- STAGE 2 UPDATE (robust) ----------
        function updateStage2(){
            if(!gameActive) return;
            const groundLevel = canvas.height-85;
            let SPEED=4.2, GRAVITY=0.68;
            player.dx = (rightPressed?SPEED:0) - (leftPressed?SPEED:0);
            player.x += player.dx;
            let targetCam = player.x - canvas.width*0.35;
            targetCam = Math.max(0, Math.min(targetCam, s2.levelWidth-canvas.width));
            s2.cameraX += (targetCam - s2.cameraX)*0.12;
            player.x = Math.min(Math.max(player.x, 15), s2.levelWidth-player.w-15);
            player.dy += GRAVITY;
            player.y += player.dy;
            player.grounded = false;
            // ground
            if(player.y+player.h >= groundLevel){ player.y = groundLevel-player.h; player.dy=0; player.grounded=true; jumpCount=0; }
            // platforms & boxes
            let solids = [...s2.platforms, ...s2.boxes.filter(b=>!b.popped)];
            solids.forEach(plat=>{
                if(plat.destroyed) return;
                let overlap = (player.x+player.w>plat.x && player.x<plat.x+plat.w);
                if(overlap && player.dy>=0 && player.y+player.h > plat.y && player.y+player.h <= plat.y+plat.h+8){
                    player.y = plat.y-player.h; player.dy=0; player.grounded=true; jumpCount=0;
                }
                if(overlap && player.dy<0 && player.y <= plat.y+plat.h && player.y+player.h>plat.y){
                    player.y = plat.y+plat.h; player.dy=2;
                    if(plat.reward && !plat.hit){ plat.hit=true; plat.bounceAnim=12; playBoxHit(); setTimeout(()=>{ plat.popped=true; },200); if(plat.reward==='blueberry') powerUpTimer=500; else if(plat.reward==='rainbow') rainbowTimer=380; else if(plat.reward==='heart') energy=Math.min(100,energy+35); else if(plat.reward==='star') starTimer=480; else if(plat.reward==='mushroom') megaJumpTimer=500; playSound(600,'sine',0.2,0.1); }
                }
            });
            // enemies
            s2.enemies.forEach(e=>{
                if(!e.alive) return;
                if(e.dead){ e.deadTimer--; if(e.deadTimer<=0) e.alive=false; return; }
                e.frame+=0.2;
                e.x+=e.dx;
                if(e.x<50 || e.x+e.w>s2.levelWidth-50) e.dx*=-1;
                if(player.x+player.w>e.x && player.x<e.x+e.w && player.y+player.h>e.y && player.y<e.y+e.h){
                    let stomping = (player.dy>0 && player.y+player.h - player.dy <= e.y+12);
                    if(stomping && e.type!=='sausage'){ e.dead=true; e.deadTimer=28; player.dy=-12; playStomp(); energy=Math.min(100,energy+5); }
                    else if(starTimer>0){ e.dead=true; e.deadTimer=20; playStomp();}
                    else{ energy-=22; playSound(130,'sawtooth',0.18,0.2); if(energy<=0){ die("SAUSAGE"); return; } player.x += (player.x<e.x)? -32:32; }
                }
            });
            // food
            s2.foodItems.forEach(f=>{ if(!f.collected && player.x+player.w>f.x && player.x<f.x+30 && player.y+player.h>f.y && player.y<f.y+30){ f.collected=true; energy=Math.min(100,energy+9); playSound(770,'sine',0.08,0.08); } });
            // timers & drain
            energy -= 0.025;
            distance += 1.6;
            if(energy<=0){ die("ENERGY"); return; }
            if(powerUpTimer>0) powerUpTimer--;
            if(rainbowTimer>0) rainbowTimer--;
            if(megaJumpTimer>0) megaJumpTimer--;
            if(starTimer>0) starTimer--;
            scoreEl.innerText = Math.max(0,Math.ceil(energy));
            distEl.innerText = Math.floor(distance);
            worldEl.innerText = "11 [STAGE 2]";
            // FLAG REACH (stage2 ending)
            if(!s2.flagReached && player.x+player.w >= s2.flagX && player.x <= s2.flagX+30){
                s2.flagReached=true; s2.flagRising=true; s2.flagRiseY=280; gameActive=false; playFlagSound();
                for(let i=0;i<5;i++) setTimeout(()=>{ for(let j=0;j<12;j++){ let ang=(j/12)*Math.PI*2; s2.fireworks.push({x:s2.flagX-s2.cameraX+15+Math.random()*80,y:canvas.height-300+Math.random()*200,vx:Math.cos(ang)*(2+Math.random()*5),vy:Math.sin(ang)*(2+Math.random()*5),color:`hsl(${Math.random()*360},80%,70%)`,life:70}); } playSound(480+i*70,'sine',0.25,0.12); }, i*350);
                setTimeout(()=>{ die("WIN"); }, 2800);
            }
            if(s2.flagRising){ s2.flagRiseY-=4; if(s2.flagRiseY<=18) s2.flagRising=false; }
            s2.fireworks.forEach(f=>{ f.x+=f.vx; f.y+=f.vy; f.life--; }); s2.fireworks=s2.fireworks.filter(f=>f.life>0);
        }

        function generateYellowChaosWorld(){ let bg=randomColor(); worldSettings[8]={ bg, ground:"#aa8c54", floor:"#7a5a3a", items:["🍎","🥬"], hazards:["🥩"], deco:"🌀" }; document.body.style.background=bg; }
        function randomColor(){ return "#"+Math.floor(Math.random()*0xffffff).toString(16); }
        // main draw loop
        function drawLoop(){
            ctx.clearRect(0,0,canvas.width,canvas.height);
            if(currentStage===2){
                drawStage2Background();
                drawStage2World();
                drawPlayerStage2();
                drawStage2UI();
                updateStage2();
            } else {
                drawStage1();
                updateStage1();
            }
            // fireworks global
            fireworks.forEach(f=>{ ctx.globalAlpha=f.life/80; ctx.fillStyle=f.color; ctx.beginPath(); ctx.arc(f.x,f.y,5,0,Math.PI*2); ctx.fill(); }); fireworks=fireworks.filter(f=>f.life>0); ctx.globalAlpha=1;
            requestAnimationFrame(drawLoop);
        }
        function drawStage1(){
            let s=worldSettings[currentWorld];
            ctx.fillStyle=s.bg; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle=s.floor; ctx.fillRect(0,canvas.height-80,canvas.width,80);
            ctx.fillStyle=s.ground; ctx.fillRect(0,canvas.height-80,canvas.width,15);
            decor.forEach(d=>{ ctx.font="40px Arial"; ctx.fillText(d.char,d.x,d.y); });
            pitfalls.forEach(p=>{ ctx.fillStyle=p.isLava?"#ff4422":"#0077aa"; ctx.fillRect(p.x,canvas.height-81,p.w,82); });
            pipes.forEach(p=>{ ctx.fillStyle=p.color||"#2ecc71"; ctx.fillRect(p.x,p.y,p.w,p.h); });
            if(flagPoleX>0 && stageTransitionState!=='none'){
                ctx.fillStyle="#aaa"; ctx.fillRect(flagPoleX+12,canvas.height-80-300,6,300);
                ctx.fillStyle="#ffeb3b"; ctx.beginPath(); ctx.arc(flagPoleX+15,canvas.height-80-300,10,0,Math.PI*2); ctx.fill();
                ctx.font="36px Arial"; ctx.fillText("🌱",flagPoleX+18,flagY);
            }
            drawPlayerGeneric();
            obstacles.forEach(o=>{ ctx.font=o.isGiant?"100px Arial":"48px Arial"; ctx.fillText(o.char,o.x,o.y+40); });
            items.forEach(it=>{ ctx.font="42px Arial"; ctx.fillText(it.char,it.x,it.y+40); });
        }
        function drawPlayerGeneric(){
            let px=player.x, py=player.y;
            ctx.fillStyle=starTimer>0?`hsl(${Date.now()%360},80%,65%)`:(rainbowTimer>0?`hsl(${Date.now()%360},75%,55%)`:"#2ecc71");
            ctx.fillRect(px+12,py+40,22,32);
            ctx.font= (powerUpTimer>0?"58px":"46px")+" Arial";
            ctx.fillText(player.head,px,py+48);
        }
        function drawStage2Background(){
            let grad=ctx.createLinearGradient(0,0,0,canvas.height);
            grad.addColorStop(0,"#1e4b3c"); grad.addColorStop(1,"#347a55");
            ctx.fillStyle=grad; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.globalAlpha=0.45; ctx.font="52px Arial";
            for(let i=0;i<12;i++) ctx.fillText("🌿", (i*190+Date.now()*0.1)%(canvas.width+300)-150, 70+ (i*70)%canvas.height);
            ctx.globalAlpha=1;
        }
        function drawStage2World(){
            let cam=Math.floor(s2.cameraX);
            ctx.fillStyle="#654321"; ctx.fillRect(0,canvas.height-85,canvas.width,85);
            s2.platforms.forEach(p=>{ let sx=p.x-cam; if(sx+50<0||sx>canvas.width+200) return; ctx.fillStyle=p.type==='grass'?"#7a5c2a":"#b87333"; ctx.fillRect(sx,p.y,p.w,p.h); ctx.fillStyle="#e0a878"; ctx.fillRect(sx+3,p.y-6,p.w-6,8); });
            s2.boxes.forEach(b=>{ if(b.popped)return; let sx=b.x-cam; let by=b.y-(b.bounceAnim>0?Math.sin(b.bounceAnim/10*Math.PI)*6:0); ctx.fillStyle="#f1c40f"; ctx.fillRect(sx,by,40,40); ctx.fillStyle="#333"; ctx.font="bold 28px monospace"; ctx.fillText("?",sx+12,by+30); });
            s2.foodItems.forEach(f=>{ if(!f.collected){ let sx=f.x-cam; ctx.font="34px Arial"; ctx.fillText(f.char,sx,f.y); } });
            s2.enemies.forEach(e=>{ if(!e.alive) return; let sx=e.x-cam; ctx.font="44px Arial"; ctx.fillText(e.type==='steak'?"🥩":e.type==='chicken'?"🍗":"🌭",sx,e.y+34); if(e.dead){ ctx.globalAlpha=0.5; ctx.fillText("💥",sx+8,e.y+20); ctx.globalAlpha=1;} });
            let fx=s2.flagX-cam; if(fx>-80 && fx<canvas.width+100){ ctx.fillStyle="#aaa"; ctx.fillRect(fx+15,canvas.height-85-320,8,320); ctx.fillStyle="#ffd966"; ctx.beginPath(); ctx.arc(fx+19,canvas.height-85-320,13,0,Math.PI*2); ctx.fill(); ctx.font="38px Arial"; ctx.fillText("🌱",fx+12,canvas.height-85-320+(s2.flagRising?280-s2.flagRiseY:8)); }
            s2.fireworks.forEach(f=>{ ctx.globalAlpha=f.life/70; ctx.fillStyle=f.color; ctx.beginPath(); ctx.arc(f.x,f.y,6,0,Math.PI*2); ctx.fill(); }); ctx.globalAlpha=1;
        }
        function drawPlayerStage2(){
            let px=player.x-s2.cameraX, py=player.y;
            ctx.fillStyle=starTimer>0?`hsl(${Date.now()%360},75%,65%)`:(rainbowTimer>0?`hsl(${Date.now()%360},70%,60%)`:"#38b000");
            ctx.fillRect(px+12,py+38,24,32);
            ctx.font=(powerUpTimer>0?"60px":"50px")+" Arial";
            ctx.fillText("👦",px,py+50);
        }
        function drawStage2UI(){
            let ind=[];
            if(powerUpTimer>0) ind.push("🫐 DOUBLE JUMP");
            if(rainbowTimer>0) ind.push("🌈 SHIELD");
            if(starTimer>0) ind.push("⭐ INVINCIBLE");
            if(megaJumpTimer>0) ind.push("🍄 MEGA JUMP");
            ind.forEach((txt,i)=>{ ctx.fillStyle="rgba(0,0,0,0.6)"; ctx.fillRect(canvas.width-200,10+i*32,190,28); ctx.fillStyle="#ffe484"; ctx.font="bold 15px monospace"; ctx.fillText(txt,canvas.width-196,30+i*32); });
        }
        resetGame();
        drawLoop();
    })();
</script>
</body>
