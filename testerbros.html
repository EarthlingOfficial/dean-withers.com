// ── AUDIO ───────────────────────────────────────────────
let AC=null,master=null,sfxGain=null,liminalGain=null;

function initAudio(){
  if(AC) return;
  try{ AC=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){ return; }
  master=AC.createGain(); master.gain.value=0.82; master.connect(AC.destination);
  sfxGain=AC.createGain(); sfxGain.gain.value=0.75; sfxGain.connect(master);
}
function unlockAudio(){ if(!AC) initAudio(); if(AC&&AC.state==='suspended') AC.resume(); }

function stopLiminalAudio(){
  if(!liminalGain) return;
  const g=liminalGain; liminalGain=null;
  try{
    g.gain.setValueAtTime(g.gain.value,AC.currentTime);
    g.gain.linearRampToValueAtTime(0,AC.currentTime+2.8);
    setTimeout(()=>{ try{g.disconnect();}catch(e){} },3200);
  }catch(e){}
}

function playLiminalTrack(vidIdx){
  if(!AC) initAudio(); if(!AC) return;
  stopLiminalAudio();
  const g=AC.createGain();
  g.gain.setValueAtTime(0,AC.currentTime);
  g.gain.linearRampToValueAtTime(0.6,AC.currentTime+4);
  g.connect(master);
  liminalGain=g;
  const builders=[buildTrack0,buildTrack1,buildTrack2,buildTrack3,buildTrack4];
  (builders[Math.min(vidIdx,builders.length-1)])(g);
}

// Track 0: "The Indexed" — sub bass + dark choir pad + breath noise
function buildTrack0(dest){
  const sub=AC.createOscillator(); sub.type='sine'; sub.frequency.value=29;
  const subG=AC.createGain(); subG.gain.value=0.20; sub.connect(subG); subG.connect(dest); sub.start();
  const pads=[[58,0.07,0.028],[87,0.045,0.019],[116,0.028,0.011],[174,0.018,0.007]];
  for(const[f,v,drift] of pads){
    const o=AC.createOscillator(); o.type='triangle'; o.frequency.value=f+(Math.random()-0.5)*1.2;
    const lfo=AC.createOscillator(); lfo.type='sine'; lfo.frequency.value=0.025+Math.random()*0.018; lfo.start();
    const lG=AC.createGain(); lG.gain.value=drift*60;
    lfo.connect(lG); lG.connect(o.frequency);
    const og=AC.createGain(); og.gain.value=v; o.connect(og); og.connect(dest); o.start();
  }
  // noise breath
  const len=Math.floor(AC.sampleRate*10);
  const buf=AC.createBuffer(1,len,AC.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*0.6;
  const ns=AC.createBufferSource(); ns.buffer=buf; ns.loop=true;
  const nf=AC.createBiquadFilter(); nf.type='bandpass'; nf.frequency.value=280; nf.Q.value=0.45;
  const ng=AC.createGain(); ng.gain.value=0.022;
  ns.connect(nf); nf.connect(ng); ng.connect(dest); ns.start();
  // slow tremolo on sub
  const trem=AC.createOscillator(); trem.type='sine'; trem.frequency.value=0.06; trem.start();
  const tG=AC.createGain(); tG.gain.value=0.06; trem.connect(tG); tG.connect(subG.gain);
}

// Track 1: "The Reflection" — detuned cluster + metallic ring pings + deep fundamental
function buildTrack1(dest){
  const freqs=[44,55,66,88,110,132];
  for(const f of freqs){
    const o=AC.createOscillator(); o.type='sawtooth'; o.frequency.value=f+(Math.random()-0.5)*2.4;
    const flt=AC.createBiquadFilter(); flt.type='lowpass'; flt.frequency.value=200+Math.random()*80;
    const g=AC.createGain(); g.gain.value=0.016;
    o.connect(flt); flt.connect(g); g.connect(dest); o.start();
  }
  const ring=AC.createOscillator(); ring.type='sine'; ring.frequency.value=1760;
  const ringG=AC.createGain(); ringG.gain.setValueAtTime(0,AC.currentTime);
  ring.connect(ringG); ringG.connect(dest); ring.start();
  function doPing(){
    if(!liminalGain) return;
    const now=AC.currentTime;
    ringG.gain.setValueAtTime(0.055,now);
    ringG.gain.exponentialRampToValueAtTime(0.001,now+4.2);
    setTimeout(doPing,4500+Math.random()*7000);
  }
  setTimeout(doPing,1800);
  const sub=AC.createOscillator(); sub.type='sine'; sub.frequency.value=33;
  const sg=AC.createGain(); sg.gain.value=0.14;
  sub.connect(sg); sg.connect(dest); sub.start();
  // unsettling detuned double
  const ghost=AC.createOscillator(); ghost.type='triangle'; ghost.frequency.value=87.5;
  const gf=AC.createBiquadFilter(); gf.type='allpass'; gf.frequency.value=700;
  const gg=AC.createGain(); gg.gain.value=0.04;
  ghost.connect(gf); gf.connect(gg); gg.connect(dest); ghost.start();
}

// Track 2: "The Field Recording" — wind noise + pure tones + slow filter sweep
function buildTrack2(dest){
  const len=Math.floor(AC.sampleRate*8);
  const buf=AC.createBuffer(2,len,AC.sampleRate);
  for(let ch=0;ch<2;ch++){
    const d=buf.getChannelData(ch);
    for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
  }
  const wind=AC.createBufferSource(); wind.buffer=buf; wind.loop=true;
  const wf=AC.createBiquadFilter(); wf.type='bandpass'; wf.frequency.value=750; wf.Q.value=0.28;
  const wg=AC.createGain(); wg.gain.value=0.038;
  wind.connect(wf); wf.connect(wg); wg.connect(dest); wind.start();
  const swlfo=AC.createOscillator(); swlfo.type='sine'; swlfo.frequency.value=0.035; swlfo.start();
  const swG=AC.createGain(); swG.gain.value=320; swlfo.connect(swG); swG.connect(wf.frequency);
  const tones=[[164,0.042,0.065],[246,0.031,0.05],[370,0.022,0.04]];
  for(const[f,v,drift] of tones){
    const o=AC.createOscillator(); o.type='sine'; o.frequency.value=f;
    const lfo=AC.createOscillator(); lfo.type='sine'; lfo.frequency.value=0.06+Math.random()*0.04; lfo.start();
    const lg=AC.createGain(); lg.gain.value=drift;
    lfo.connect(lg); lg.connect(o.frequency);
    const g=AC.createGain(); g.gain.value=v; o.connect(g); g.connect(dest); o.start();
  }
}

// Track 3: "The Cavern" — deep resonant rumble + occasional distant groan + sub pulse
function buildTrack3(dest){
  const sub=AC.createOscillator(); sub.type='sine'; sub.frequency.value=21;
  const subG=AC.createGain(); subG.gain.value=0.24;
  const sublfo=AC.createOscillator(); sublfo.type='sine'; sublfo.frequency.value=0.007; sublfo.start();
  const slg=AC.createGain(); slg.gain.value=5; sublfo.connect(slg); slg.connect(sub.frequency);
  sub.connect(subG); subG.connect(dest); sub.start();
  for(const f of [42,63,105]){
    const o=AC.createOscillator(); o.type='triangle'; o.frequency.value=f;
    const flt=AC.createBiquadFilter(); flt.type='peaking'; flt.frequency.value=f; flt.gain.value=14; flt.Q.value=6;
    const g=AC.createGain(); g.gain.value=0.032;
    o.connect(flt); flt.connect(g); g.connect(dest); o.start();
  }
  function doGroan(){
    if(!liminalGain) return;
    const o=AC.createOscillator(); o.type='sawtooth';
    const sf=38+Math.random()*28;
    o.frequency.setValueAtTime(sf,AC.currentTime);
    o.frequency.exponentialRampToValueAtTime(sf*0.55,AC.currentTime+3.5);
    const flt=AC.createBiquadFilter(); flt.type='lowpass'; flt.frequency.value=160;
    const g=AC.createGain();
    g.gain.setValueAtTime(0,AC.currentTime);
    g.gain.linearRampToValueAtTime(0.09,AC.currentTime+0.6);
    g.gain.linearRampToValueAtTime(0,AC.currentTime+3.5);
    o.connect(flt); flt.connect(g); g.connect(dest);
    o.start(); o.stop(AC.currentTime+4);
    setTimeout(doGroan,5500+Math.random()*10000);
  }
  setTimeout(doGroan,2200);
  // slow pulse
  const pulse=AC.createOscillator(); pulse.type='sine'; pulse.frequency.value=0.22; pulse.start();
  const pG=AC.createGain(); pG.gain.value=0.07; pulse.connect(pG); pG.connect(subG.gain);
}

// Track 4: "The Abattoir" — industrial beat + machine hum + grinding noise
function buildTrack4(dest){
  function beat(){
    if(!liminalGain) return;
    const now=AC.currentTime;
    const kick=AC.createOscillator(); kick.type='sine';
    kick.frequency.setValueAtTime(80,now); kick.frequency.exponentialRampToValueAtTime(18,now+0.28);
    const kG=AC.createGain(); kG.gain.setValueAtTime(0.32,now); kG.gain.exponentialRampToValueAtTime(0.001,now+0.28);
    kick.connect(kG); kG.connect(dest); kick.start(now); kick.stop(now+0.32);
    // clank
    const cl=AC.createOscillator(); cl.type='square'; cl.frequency.value=1100+Math.random()*500;
    const cf=AC.createBiquadFilter(); cf.type='highpass'; cf.frequency.value=1800;
    const cG=AC.createGain(); cG.gain.setValueAtTime(0.038,now); cG.gain.exponentialRampToValueAtTime(0.001,now+0.07);
    cl.connect(cf); cf.connect(cG); cG.connect(dest); cl.start(now); cl.stop(now+0.08);
    setTimeout(beat,760+(Math.random()>0.82?820:0));
  }
  setTimeout(beat,500);
  // constant hum
  const hum=AC.createOscillator(); hum.type='sawtooth'; hum.frequency.value=60;
  const hf=AC.createBiquadFilter(); hf.type='lowpass'; hf.frequency.value=190;
  const hg=AC.createGain(); hg.gain.value=0.038;
  hum.connect(hf); hf.connect(hg); hg.connect(dest); hum.start();
  // sub
  const sub=AC.createOscillator(); sub.type='sine'; sub.frequency.value=38;
  const sg=AC.createGain(); sg.gain.value=0.09;
  sub.connect(sg); sg.connect(dest); sub.start();
  // grinding noise burst
  function doGrind(){
    if(!liminalGain) return;
    const len=Math.floor(AC.sampleRate*0.4);
    const buf=AC.createBuffer(1,len,AC.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,0.5);
    const ns=AC.createBufferSource(); ns.buffer=buf;
    const nf=AC.createBiquadFilter(); nf.type='bandpass'; nf.frequency.value=3200; nf.Q.value=2;
    const ng=AC.createGain(); ng.gain.value=0.06;
    ns.connect(nf); nf.connect(ng); ng.connect(dest); ns.start();
    setTimeout(doGrind,2200+Math.random()*4500);
  }
  setTimeout(doGrind,1200);
}

// ══ GEOMETRY HELPERS ══════════════════════════════════
function bx(w,h,d,mat,x,y,z,g){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  m.position.set(x,y,z);m.castShadow=m.receiveShadow=true;(g||scene).add(m);return m;
}
function pl(w,d,mat,x,y,z,rx,g){
  const m=new THREE.Mesh(new THREE.PlaneGeometry(w,d),mat);
  m.rotation.x=rx||0;m.position.set(x,y,z);m.receiveShadow=true;(g||scene).add(m);return m;
}
function ptL(x,z,intensity,range,shadows,g){
  const L=new THREE.PointLight(0xf0ebc2,intensity||1.2,range||16);
  L.position.set(x,WH-0.5,z);
  if(shadows){L.castShadow=true;L.shadow.mapSize.set(256,256);L.shadow.camera.near=0.1;L.shadow.camera.far=range||16;L.shadow.bias=-0.002;}
  (g||scene).add(L);
  const p=new THREE.Mesh(new THREE.PlaneGeometry(1.6,0.5),mPanel);
  p.rotation.x=Math.PI/2;p.position.set(x,WH-0.02,z);(g||scene).add(p);
  return L;
}

function walls(ox,oz,W,D,opts){
  const cx=ox+W/2,cz=oz+D/2,t=0.5,h=WH;
  const gw=GAP;
  function seg(fw,fh,fd,fx,fy,fz){bx(fw,fh,fd,mWall,fx,fy,fz);}
  if(opts.n){
    seg((W-gw)/2,h,t,ox+(W-gw)/4,h/2,oz+t/2);
    seg((W-gw)/2,h,t,ox+W-(W-gw)/4,h/2,oz+t/2);
  }else seg(W,h,t,cx,h/2,oz+t/2);
  if(opts.s){
    seg((W-gw)/2,h,t,ox+(W-gw)/4,h/2,oz+D-t/2);
    seg((W-gw)/2,h,t,ox+W-(W-gw)/4,h/2,oz+D-t/2);
  }else seg(W,h,t,cx,h/2,oz+D-t/2);
  if(opts.w){
    seg(t,h,(D-gw)/2,ox+t/2,h/2,oz+(D-gw)/4);
    seg(t,h,(D-gw)/2,ox+t/2,h/2,oz+D-(D-gw)/4);
  }else seg(t,h,D,ox+t/2,h/2,cz);
  if(opts.e){
    seg(t,h,(D-gw)/2,ox+W-t/2,h/2,oz+(D-gw)/4);
    seg(t,h,(D-gw)/2,ox+W-t/2,h/2,oz+D-(D-gw)/4);
  }else seg(t,h,D,ox+W-t/2,h/2,cz);
}

function floorCeil(ox,oz,W,D){
  pl(W,D,mFloor,ox+W/2,0.01,oz+D/2,-Math.PI/2);
  pl(W,D,mCeil, ox+W/2,WH,  oz+D/2, Math.PI/2);
}

function txt(lines,w,h,col,bg,fs){
  if(typeof lines==='string')lines=[lines];
  const CW2=512,CH2=Math.max(64,Math.round(512*h/w));
  const cv=document.createElement('canvas');cv.width=CW2;cv.height=CH2;
  const cx=cv.getContext('2d');
  if(bg){cx.fillStyle=bg;cx.fillRect(0,0,CW2,CH2);}
  cx.fillStyle=col||'#c8b86a';
  const fz=fs||14;cx.font=`${fz}px "Courier New",monospace`;cx.textAlign='center';
  const lh=fz*1.55,sy=(CH2-lines.length*lh)/2+lh*0.8;
  lines.forEach((l,i)=>cx.fillText(l,CW2/2,sy+i*lh));
  const mat=new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(cv),transparent:true,side:THREE.DoubleSide,depthWrite:false});
  return new THREE.Mesh(new THREE.PlaneGeometry(w,h),mat);
}

function T(lines,w,h,col,bg,fs,x,y,z,ry){
  const m=txt(lines,w,h,col,bg,fs);
  m.position.set(x,y,z);if(ry!==undefined)m.rotation.y=ry;scene.add(m);return m;
}

function addTV(x,z,vidIdx,angle){
  const grp=new THREE.Group();
  const frame=new THREE.Mesh(new THREE.BoxGeometry(2.5,1.45,0.12),mDark);
  frame.position.set(0,2,0);frame.castShadow=true;grp.add(frame);
  const scr=new THREE.Mesh(new THREE.PlaneGeometry(2.2,1.24),new THREE.MeshBasicMaterial({map:fuzzT,side:THREE.DoubleSide}));
  scr.position.set(0,0,0.07);frame.add(scr);
  const gl=new THREE.PointLight(0x557799,0.22,4);gl.position.set(0,2,0.4);grp.add(gl);
  grp.position.set(x,0,z);grp.rotation.y=angle||0;scene.add(grp);

// ══ PROCEDURAL CHUNKS ════════════════════════════════
const SPAWN_KEYS=new Set(['0,0','1,0','-1,0','0,1','1,1','2,1','3,1']);
function ck(cx,cz){return `${cx},${cz}`;}
function cOf(v){return Math.floor(v/CW);}

function initChunks(){
  SPAWN_KEYS.forEach(k=>chunks.set(k,{spawn:true}));
  updateChunks(cOf(cam.position.x),cOf(cam.position.z));
}

function updateChunks(pcx,pcz){
  const R=2,needed=new Set();
  for(let dz=-R;dz<=R;dz++)for(let dx=-R;dx<=R;dx++){
    const cx=pcx+dx,cz=pcz+dz,k=ck(cx,cz);
    needed.add(k);if(!chunks.has(k))genChunk(cx,cz);
  }
  for(const[k,ch]of chunks){
    if(!needed.has(k)&&!ch.spawn){
      scene.remove(ch.grp);
      ch.grp.traverse(o=>{if(o.geometry)o.geometry.dispose();});
      ch.tvs&&ch.tvs.forEach(t=>{const i=tvList.indexOf(t);if(i>=0)tvList.splice(i,1);});
      chunks.delete(k);
    }
  }
}

function srand(seed){
  let s=seed>>>0;
  return()=>{s=Math.imul(s^(s>>>13),1664525)+1013904223|0;return(s>>>0)/0xffffffff;};
}

function genChunk(cx,cz){
  const key=ck(cx,cz);
  const rand=srand(cx*73856093^cz*19349663^0x9e3779b9);
  const cells=Array.from({length:CS},()=>new Array(CS).fill(1));
  function carve(x,z,depth){
    if(depth>200)return;
    cells[z][x]=0;
    const d=[[0,-2],[2,0],[0,2],[-2,0]];
    for(let i=3;i>0;i--){const j=Math.floor(rand()*(i+1));[d[i],d[j]]=[d[j],d[i]];}
    for(const[dz,dx]of d){
      const nx=x+dx,nz=z+dz;
      if(nz>0&&nz<CS-1&&nx>0&&nx<CS-1&&cells[nz][nx]===1){
        cells[z+dz/2][x+dx/2]=0;carve(nx,nz,depth+1);
      }
    }
  }
  carve(1,1,0);
  const m=Math.floor(CS/2);
  cells[0][m]=0;cells[1][m]=0;
  cells[CS-1][m]=0;cells[CS-2][m]=0;
  cells[m][0]=0;cells[m][1]=0;
  cells[m][CS-1]=0;cells[m][CS-2]=0;
  const ox=cx*CW,oz=cz*CW;
  const grp=new THREE.Group();
  const chTVs=[];
  const fg=new THREE.PlaneGeometry(CW,CW);
  const fl=new THREE.Mesh(fg,mFloor);fl.rotation.x=-Math.PI/2;fl.position.set(ox+CW/2,0.01,oz+CW/2);fl.receiveShadow=true;grp.add(fl);
  const cl=new THREE.Mesh(fg.clone(),mCeil);cl.rotation.x=Math.PI/2;cl.position.set(ox+CW/2,WH,oz+CW/2);grp.add(cl);
  const wg=new THREE.BoxGeometry(6,WH,6);
  for(let z=0;z<CS;z++)for(let x=0;x<CS;x++){
    const wx=ox+x*6+3,wz=oz+z*6+3;
    if(cells[z][x]===1){
      const w=new THREE.Mesh(wg,mWall);w.position.set(wx,WH/2,wz);w.castShadow=w.receiveShadow=true;grp.add(w);
    }else{
      if((x+z)%3===0){
        const L=new THREE.PointLight(0xf0ebc2,1.0,13);L.position.set(wx,WH-0.5,wz);grp.add(L);
        const pp=new THREE.Mesh(new THREE.PlaneGeometry(1.4,0.4),mPanel);pp.rotation.x=Math.PI/2;pp.position.set(wx,WH-0.02,wz);grp.add(pp);
      }
      if(rand()<0.11&&tvList.length<50){
        const vIdx=Math.floor(rand()*VIDS.length);
        const ang=Math.floor(rand()*4)*Math.PI/2;
        const tvO=addTVToGroup(wx,wz,vIdx,ang,grp);
        chTVs.push(tvO);
      }
      if(rand()<0.055){
        const st=SCRAWLS[Math.floor(rand()*SCRAWLS.length)];
        const sm=txt([st],3,0.26,'#550000',null,9);
        sm.position.set(wx+(rand()-.5)*2,1.1+rand()*.5,wz+(rand()-.5)*2);
        sm.rotation.y=rand()*Math.PI*2;grp.add(sm);
      }
      // occasional char quote on walls
      if(rand()<0.018){
        const q=CHAR_QUOTES[Math.floor(rand()*CHAR_QUOTES.length)];
        const qm=txt(['"'+q.q+'"','— '+q.who],3.5,0.45,'#c8a060',null,10);
        qm.position.set(wx+(rand()-.5)*1.5,1.6+rand()*0.6,wz+(rand()-.5)*1.5);
        qm.rotation.y=rand()*Math.PI*2;grp.add(qm);
      }
    }
  }
  scene.add(grp);chunks.set(key,{grp,tvs:chTVs});
}

function addTVToGroup(x,z,vidIdx,angle,grp){
  // height reduced to match 16:9
  const frame=new THREE.Mesh(new THREE.BoxGeometry(2.5,1.45,0.12),mDark);
  frame.position.set(x,2,z);frame.rotation.y=angle||0;frame.castShadow=true;grp.add(frame);
  const scr=new THREE.Mesh(new THREE.PlaneGeometry(2.2,1.24),new THREE.MeshBasicMaterial({map:fuzzT,side:THREE.DoubleSide}));
  scr.position.set(0,0,0.07);frame.add(scr);
  const obj={mesh:frame,vidIdx:vidIdx%VIDS.length,wp:new THREE.Vector3(x,2,z)};
  tvList.push(obj);return obj;
}

// ══ DEANUS CARNIVORUS ═════════════════════════════════
function buildDeanus(){
  const g=new THREE.Group();
  const dm=new THREE.MeshBasicMaterial({color:0x020202});
  g.add(new THREE.Mesh(new THREE.BoxGeometry(0.75,1.5,0.38),dm));
  const h=new THREE.Mesh(new THREE.BoxGeometry(0.58,0.58,0.58),dm);h.position.y=1.1;g.add(h);
  g.position.set(0,0.75,-20);scene.add(g);dean=g;
}

function updateDeanus(dt,t){
  if(!dean)return;
  dTimer+=dt;
  const dp=dean.position,cp=cam.position;
  const dist=dp.distanceTo(cp);
  const toD=new THREE.Vector3(dp.x-cp.x,0,dp.z-cp.z).normalize();
  const fwd=new THREE.Vector3(-Math.sin(cam.rotation.y),0,-Math.cos(cam.rotation.y));
  const inSight=dist<14&&fwd.dot(toD)>-0.25;
  if(inSight){
    sanity=Math.max(0,sanity-(dState==='pursuing'?14:7)*dt);
    document.getElementById('flash').style.opacity='0.13';
    // observer whisper
    if(Math.random()<0.004){
      const pool=dist<7?OBSERVER_APPROACH:OBSERVER_WATCHING;
      showWhisper(pool[Math.floor(Math.random()*pool.length)]);
    }
  }else{
    document.getElementById('flash').style.opacity='0';
  }
  if(dState==='lurk'){
    if(dTimer>5||dist>22){
      dTimer=0;
      const a=Math.random()*Math.PI*2,r=16+Math.random()*10;
      dp.set(cp.x+Math.sin(a)*r,0.75,cp.z+Math.cos(a)*r);
    }
    if(dist<9&&Math.random()<0.007)dState='pursuing';
  }else if(dState==='pursuing'){
    const dir=new THREE.Vector3(cp.x-dp.x,0,cp.z-dp.z).normalize();
    dp.addScaledVector(dir,1.85*dt);
    dean.lookAt(cp.x,0.75,cp.z);
    if(dist>22)dState='lurk';
    if(dist<1.5){
      sanity=Math.max(0,sanity-20);dState='lurk';
      const a=cam.rotation.y+Math.PI;
      dp.set(cp.x+Math.sin(a)*20,0.75,cp.z+Math.cos(a)*20);
    }
  }
  dp.y=0.75+Math.sin(t*0.55)*0.04;
  if(sanity<=0)sanity=50;
}

// ══ SHADOW FIGURES ════════════════════════════════════
function buildShads(){
  for(let i=0;i<4;i++){
    const m=new THREE.Mesh(new THREE.PlaneGeometry(0.65,2.3),mShadow);
    m.position.set((Math.random()-.5)*80,1.15,(Math.random()-.5)*80);
    m.visible=false;
    shads.push({mesh:m,timer:12+i*4,spawned:false});scene.add(m);
  }
}

function updateShads(dt){
  shads.forEach(s=>{
    if(!s.spawned){
      s.timer-=dt;
      if(s.timer<=0){
        s.timer=9+Math.random()*14;
        s.mesh.visible=Math.random()<0.11;
        if(s.mesh.visible){
          const a=Math.random()*Math.PI*2,r=9+Math.random()*14;
          s.mesh.position.set(cam.position.x+Math.sin(a)*r,1.15,cam.position.z+Math.cos(a)*r);
        }
      }
    }
    if(s.mesh.visible)s.mesh.lookAt(cam.position.x,1.15,cam.position.z);
  });
}

// ══ POST PROCESSING ════════════════════════════════════
function setupPost(){
  postS=new THREE.Scene();postC=new THREE.OrthographicCamera(-1,1,1,-1,0,1);
  rt=new THREE.WebGLRenderTarget(innerWidth,innerHeight);
  postMat=new THREE.ShaderMaterial({
    uniforms:{tDiffuse:{value:rt.texture},uTime:{value:0},uSan:{value:1}},
    vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=vec4(position,1.);}`,
    fragmentShader:`
      uniform sampler2D tDiffuse;uniform float uTime,uSan;
      varying vec2 vUv;
      float rand(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}
      void main(){
        vec2 uv=vUv;
        float ins=1.-uSan;
        uv.x+=sin(uv.y*36.+uTime*4.)*.0018*ins*3.;
        vec4 c=texture2D(tDiffuse,uv);
        c.rgb+=(rand(vUv+sin(uTime))-.5)*(0.052+ins*.11);
        vec2 vc=vUv-.5;float v=1.-dot(vc,vc)*(1.32+ins*.9);
        c.rgb*=clamp(v,0.,1.);
        c.r+=ins*.13;c.gb*=1.-ins*.09;
        gl_FragColor=c;
      }
    `
  });
  postS.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2),postMat));
}

// ══ CONTROLS ══════════════════════════════════════════
function setupControls(){
  const mob=/Mobi|Android/i.test(navigator.userAgent);
  if(!mob){
    document.getElementById('c').addEventListener('click',()=>{if(started)document.getElementById('c').requestPointerLock();});
    document.addEventListener('mousemove',e=>{
      if(document.pointerLockElement===document.getElementById('c')&&started){
        cam.rotation.y-=e.movementX*.002;
        cam.rotation.x=Math.max(-1.1,Math.min(1.1,cam.rotation.x-e.movementY*.002));
      }
    });
  }
  document.addEventListener('keydown',e=>{
    if(!started&&(e.code==='Space'||e.code==='Enter'))startGame();
    switch(e.code){
      case'KeyW':kW=1;break;case'KeyA':kA=1;break;
      case'KeyS':kS=1;break;case'KeyD':kD=1;break;
      case'KeyE':
        // E opens door if door is shown
        if(doorShown&&document.getElementById('doorm').classList.contains('on')){
          triggerDoor(); return;
        }
        interact();
        break;
    }
  });
  document.addEventListener('keyup',e=>{
    switch(e.code){
      case'KeyW':kW=0;break;case'KeyA':kA=0;break;
      case'KeyS':kS=0;break;case'KeyD':kD=0;break;
    }
  });
}

function setupTouch(){
  function bindJoy(elId,data,knobSel,onStart){
    const el=document.getElementById(elId);
    const kn=el.querySelector(knobSel);
    el.addEventListener('touchstart',e=>{
      const t=e.targetTouches[0];data.a=1;data.sx=t.clientX;data.sy=t.clientY;
      if(onStart)onStart();
    },{passive:true});
    el.addEventListener('touchmove',e=>{
      if(!data.a)return;
      const t=e.targetTouches[0];
      const dx=t.clientX-data.sx,dy=t.clientY-data.sy;
      const r=Math.min(Math.sqrt(dx*dx+dy*dy),38),a=Math.atan2(dy,dx);
      kn.style.transform=`translate(${Math.cos(a)*r}px,${Math.sin(a)*r}px)`;
      data.mx=Math.cos(a)*r/38;data.my=Math.sin(a)*r/38;
    },{passive:true});
    el.addEventListener('touchend',()=>{data.a=0;kn.style.transform='';data.mx=data.my=0;});
  }
  bindJoy('lj',td.l,'.kn',null);
  bindJoy('rj',td.r,'.kn',startGame);
}

// ══ GAME LOGIC ════════════════════════════════════════
function startGame(){
  if(started)return;started=true;
  unlockAudio();
  const ov=document.getElementById('connect');
  ov.classList.add('fade');setTimeout(()=>ov.style.display='none',1700);
  document.getElementById('c').requestPointerLock&&document.getElementById('c').requestPointerLock();
  factTimer=28;
}

function interact(){
  if(!nearTV)return;
  if(nearTV.isYT){window.open('https://www.youtube.com/@EarthlingOfficial','_blank');return;}
  const v=VIDS[nearTV.vidIdx];
  if(!v.url){showFact('SIGNAL LOST\n'+v.lbl);return;}

  currentVidIdx=nearTV.vidIdx;
  doorShown=false;
  hideDoor();
  // reset door overlay opacity
  const dm=document.getElementById('doorm');
  dm.style.background='';dm.style.pointerEvents='';

  document.getElementById('tvl').textContent=v.lbl;
  document.getElementById('tvm').classList.add('on');
  document.getElementById('hint').style.display='none';

  const videoId=v.url.split('/embed/')[1];

  if(ytAPIReady){
    if(ytPlayer&&typeof ytPlayer.loadVideoById==='function'){
      ytPlayer.loadVideoById(videoId);
    }else{
      createYTPlayer(videoId);
    }
  }else{
    // YT API not ready yet: create iframe manually as fallback (no end detection)
    const iframe=document.createElement('iframe');
    iframe.src=v.url+'?autoplay=1&rel=0&modestbranding=1&playsinline=1';
    iframe.style.cssText='width:100%;height:100%;border:none;display:block';
    iframe.setAttribute('allowfullscreen','');
    iframe.setAttribute('allow','autoplay;encrypted-media;picture-in-picture');
    const c=document.getElementById('tvf-container');
    c.innerHTML='';c.appendChild(iframe);
    // retry YT API setup after a moment
    setTimeout(()=>{
      if(ytAPIReady&&!ytPlayer){
        c.innerHTML='';
        createYTPlayer(videoId);
      }
    },3000);
  }

  if(nearTV.isAdmission) admWatched=true;
}

function closeTV(){
  document.getElementById('tvm').classList.remove('on');
  if(ytPlayer&&typeof ytPlayer.stopVideo==='function') ytPlayer.stopVideo();
  hideDoor();
  stopLiminalAudio();
  // reset door overlay
  const dm=document.getElementById('doorm');
  dm.style.background='';dm.style.pointerEvents='';
}

function showFact(text){
  const f=document.getElementById('fact');
  f.textContent=text;f.classList.add('show');
  setTimeout(()=>f.classList.remove('show'),6500);
}

function updateInteract(){
  ray.setFromCamera(sc2,cam);
  const meshes=tvList.map(t=>t.mesh).filter(Boolean);
  const hits=ray.intersectObjects(meshes,true);
  const hint=document.getElementById('hint');
  if(hits.length&&hits[0].distance<5){
    const hm=hits[0].object;
    nearTV=tvList.find(t=>t.mesh===hm||t.mesh?.children?.includes(hm));
    if(nearTV){
      hint.style.display='block';
      hint.textContent=nearTV.isYT?'[ E ] EARTHLING OFFICIAL':'[ E ] PLAY';
    }else hint.style.display='none';
  }else{nearTV=null;hint.style.display='none';}
}

function updateSanityHUD(){
  const sf=document.getElementById('sf');
  sf.style.width=Math.max(0,sanity)+'%';
  sf.style.background=sanity>60?'#c8b86a':sanity>30?'#cc7733':'#cc2222';
  postMat.uniforms.uSan.value=sanity/100;
}

function updateFuzz(){
  const id=fuzzX.createImageData(64,48);
  for(let i=0;i<id.data.length;i+=4){
    const v=Math.random()>.5?150+Math.random()*90:Math.random()*25;
    id.data[i]=v*.78;id.data[i+1]=v*.88;id.data[i+2]=v;id.data[i+3]=255;
  }
  fuzzX.putImageData(id,0,0);fuzzT.needsUpdate=true;
}

function triggerEnding(){
  if(ending)return;ending=true;
  const em=document.getElementById('endm'),et=document.getElementById('endt');
  em.classList.add('on');
  const lines=['Deanus Politicus Carnivorus Paradoxus','','— the paradox remains unresolved —','','','Stage 10: coming.'];
  let i=0,cur='';
  function next(){
    if(i>=lines.length){
      setTimeout(()=>{
        em.classList.remove('on');ending=false;
        cam.position.set(CW/2,2,CW/2+3);cam.rotation.set(0,Math.PI,0);
        sanity=75;et.textContent='';
      },4500);return;
    }
    cur+=(i?'\n':'')+lines[i++];et.textContent=cur;setTimeout(next,1300);
  }
  next();
}

// ══ ANIMATE ═══════════════════════════════════════════
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clk.getDelta(),.05),t=clk.getElapsedTime();

  if(!started){ren.setRenderTarget(null);ren.render(scene,cam);return;}

  postMat.uniforms.uTime.value=t;

  if(td.r.a){
    cam.rotation.y-=td.r.mx*.032;
    cam.rotation.x=Math.max(-1.1,Math.min(1.1,cam.rotation.x-td.r.my*.032));
  }

  vel.x*=Math.max(0,1-dt*11);vel.z*=Math.max(0,1-dt*11);
  const sp=26;
  if(kW)vel.z-=sp*dt;
  if(kS)vel.z+=sp*dt;
  if(kA)vel.x-=sp*dt;
  if(kD)vel.x+=sp*dt;
  if(td.l.a){vel.z+=td.l.my*20*dt;vel.x+=td.l.mx*20*dt;}
  cam.translateX(vel.x*dt);
  cam.translateZ(vel.z*dt);
  cam.position.y=2;

  const pcx=cOf(cam.position.x),pcz=cOf(cam.position.z);
  if(pcx!==lastCX||pcz!==lastCZ){lastCX=pcx;lastCZ=pcz;updateChunks(pcx,pcz);}

  if(++fuzzF%3===0)updateFuzz();

  updateDeanus(dt,t);updateShads(dt);updateInteract();updateSanityHUD();

  // FACT popup
  factTimer-=dt;
  if(factTimer<=0){showFact(FACTS[factIdx++%FACTS.length]);factTimer=20+Math.random()*28;}

  // WHISPER popup (from WHISPER_LINES)
  whisperTimer-=dt;
  if(whisperTimer<=0){
    showWhisper(WHISPER_LINES[whisperIdx++%WHISPER_LINES.length]);
    whisperTimer=35+Math.random()*45;
  }

  if(admWatched&&!ending&&scene.userData.endPos){
    if(cam.position.distanceTo(scene.userData.endPos)<3.5)triggerEnding();
  }

  ren.setRenderTarget(rt);ren.render(scene,cam);
  ren.setRenderTarget(null);ren.render(postS,postC);
}

init();
</script>
