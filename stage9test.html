}

// canvas text plane (lore)
// ── plain txt() — kept for TV labels (small, subtle) ──
function txt(lines,w,h,col,bg,fs){
  if(typeof lines==='string')lines=[lines];
  const CW2=512,CH2=Math.max(64,Math.round(512*h/w));
  const cv=document.createElement('canvas');cv.width=CW2;cv.height=CH2;
  const x=cv.getContext('2d');
  if(bg){x.fillStyle=bg;x.fillRect(0,0,CW2,CH2);}
  x.fillStyle=col||'#c8b86a';
  const fz=fs||14;x.font=fz+'px "Courier New",monospace';x.textAlign='center';
  const lh=fz*1.55,sy=(CH2-lines.length*lh)/2+lh*0.8;
  lines.forEach((l,i)=>x.fillText(l,CW2/2,sy+i*lh));
  const mat=new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(cv),transparent:true,side:THREE.DoubleSide,depthWrite:false});
  return new THREE.Mesh(new THREE.PlaneGeometry(w,h),mat);
}

// ── shape-panel palette ──
const _SP=[
  {s:'circle',  bg:'#cc0066',gl:0xcc0066},
  {s:'triangle',bg:'#6600cc',gl:0x6600cc},
  {s:'diamond', bg:'#0088aa',gl:0x0088aa},
  {s:'hex',     bg:'#007733',gl:0x007733},
  {s:'pill',    bg:'#bb4400',gl:0xbb4400},
  {s:'circle',  bg:'#1144cc',gl:0x1144cc},
  {s:'triangle',bg:'#997700',gl:0x997700},
  {s:'diamond', bg:'#aa0077',gl:0xaa0077},
  {s:'hex',     bg:'#005588',gl:0x005588},
  {s:'pill',    bg:'#558800',gl:0x558800},
];
let _spI=0;
function shapePanelMesh(lines,w,h){
  if(typeof lines==='string')lines=[lines];
  const p=_SP[(_spI++)%_SP.length];
  const W=512,H=Math.max(128,Math.round(512*h/w));
  const c=document.createElement('canvas');c.width=W;c.height=H;
  const x=c.getContext('2d');
  x.clearRect(0,0,W,H);
  // outer glow halo
  x.shadowColor=p.bg;x.shadowBlur=52;
  x.fillStyle=p.bg;
  // draw shape
  const mx=W/2,my=H/2,rr=Math.min(W,H)*0.44;
  if(p.s==='circle'){
    x.beginPath();x.arc(mx,my,rr,0,Math.PI*2);x.fill();
  } else if(p.s==='triangle'){
    x.beginPath();x.moveTo(mx,H*0.04);x.lineTo(W*0.96,H*0.96);x.lineTo(W*0.04,H*0.96);x.closePath();x.fill();
  } else if(p.s==='diamond'){
    x.beginPath();x.moveTo(mx,H*0.03);x.lineTo(W*0.97,my);x.lineTo(mx,H*0.97);x.lineTo(W*0.03,my);x.closePath();x.fill();
  } else if(p.s==='hex'){
    x.beginPath();
    for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6;x.lineTo(mx+rr*Math.cos(a),my+rr*Math.sin(a));}
    x.closePath();x.fill();
  } else { // pill/rect
    const rx=W*0.09,ry2=H*0.09,rw=W*0.88,rh2=H*0.82,rx0=W*0.06,ry0=H*0.09;
    x.beginPath();
    x.moveTo(rx0+rx,ry0);x.lineTo(rx0+rw-rx,ry0);
    x.quadraticCurveTo(rx0+rw,ry0,rx0+rw,ry0+ry2);
    x.lineTo(rx0+rw,ry0+rh2-ry2);
    x.quadraticCurveTo(rx0+rw,ry0+rh2,rx0+rw-rx,ry0+rh2);
    x.lineTo(rx0+rx,ry0+rh2);
    x.quadraticCurveTo(rx0,ry0+rh2,rx0,ry0+rh2-ry2);
    x.lineTo(rx0,ry0+ry2);
    x.quadraticCurveTo(rx0,ry0,rx0+rx,ry0);
    x.closePath();x.fill();
  }
  x.shadowBlur=0;
  // text (white, bold, auto-sizing)
  x.fillStyle='#ffffff';x.textAlign='center';x.textBaseline='middle';
  const maxLen=lines.reduce((m,l)=>Math.max(m,l.length),1);
  const lh=H/(lines.length+0.9);
  const baseY=H/2-(lines.length-1)*lh/2;
  lines.forEach((l,i)=>{
    const fs=Math.min(lh*0.64,W/(maxLen*0.62+1));
    x.font='bold '+Math.max(18,Math.round(fs))+'px "Courier New",monospace';
    x.fillText(l,mx,baseY+i*lh);
  });
  const mat=new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(c),transparent:true,side:THREE.DoubleSide,depthWrite:false});
  return {mesh:new THREE.Mesh(new THREE.PlaneGeometry(w,h),mat),gl:p.gl};
}

// ── T() — place a text panel in world; bg=null → shape panel, bg set → dark story box ──
function T(lines,w,h,col,bg,fs,px,py,pz,ry){
  if(typeof lines==='string')lines=[lines];
  let mesh,glCol;
  if(bg){
    // styled story-box: keep original look, add accent glow
    mesh=txt(lines,w,h,col,bg,fs);
    // pick glow from a warm palette based on position
    glCol=col&&col.startsWith('#c')?0xc8a040:col&&col.startsWith('#a')?0x884422:0x442211;
  } else {
    const r=shapePanelMesh(lines,w,h);mesh=r.mesh;glCol=r.gl;
  }
  mesh.position.set(px,py,pz);
  if(ry!==undefined)mesh.rotation.y=ry;
  scene.add(mesh);
  // glow point-light beside the panel
  const gl=new THREE.PointLight(glCol,0.45,7);
  const off=ry!==undefined?0.5:0.4;
  gl.position.set(px+(ry!==undefined?Math.sin(ry+Math.PI)*off:0), py, pz+(ry!==undefined?Math.cos(ry+Math.PI)*off:off));
  scene.add(gl);
  return mesh;
}

function walls(ox,oz,W,D,o){

function buildVideoObject(){

}
function addTV(x,z,vidIdx,angle,opts){
  opts=opts||{};
  const grp=new THREE.Group();
  const frame=new THREE.Mesh(new THREE.BoxGeometry(2.5,1.7,0.14),matDark);
  frame.position.set(0,2,0);frame.castShadow=true;grp.add(frame);
  const scr=new THREE.Mesh(new THREE.PlaneGeometry(2.2,1.4),
    new THREE.MeshBasicMaterial({map:fuzzTex,side:THREE.DoubleSide}));

  grp.position.set(x,0,z);grp.rotation.y=angle||0;scene.add(grp);

  lbl.position.set(0,1.45,0.05);lbl.rotation.y=0;grp.add(lbl);

  // world position + outward normal of the screen
  const nx=Math.sin(angle||0), nz=Math.cos(angle||0);
  const tv={frame,scr,glow:gl,vidIdx:vidIdx%VIDS.length,grp,
    wp:new THREE.Vector3(x,2,z),nx,nz,angle:angle||0,label:lbl,seen:false,archived:false};

}
function playTV(tv){
  const v=VIDS[tv.vidIdx];
  if(!v.url){ flashFact('SIGNAL LOST\n'+v.lbl); sfxStatic(); return; }
  tv.seen=true; tintSeen(tv);
  if(videoObj){
    // mount the shared iframe onto this screen
    activeTV=tv;
    videoObj.position.set(tv.wp.x+tv.nx*0.09, tv.wp.y, tv.wp.z+tv.nz*0.09);
    videoObj.rotation.set(0,tv.angle,0);
    videoObj.visible=true;
    videoIframe.src=v.url+'?autoplay=1&mute=1&rel=0&modestbranding=1&playsinline=1&enablejsapi=1';
  } else {
    flashFact(v.lbl+'\n(screen offline)');
  }
  // mark seen + archived (hit play = counts)
  if(v.gate && !tv.archived){
    tv.archived=true; archived.add(tv.vidIdx);
    updateArch();
    whisper(WHISPERS[Math.floor(Math.random()*WHISPERS.length)]);
    if(archived.size>=GATE_TOTAL) openSlide();
  }
}
function tintSeen(tv){
  // subtle "seen" green cast on the screen + label
  tv.scr.material.color.setHex(0x224433);
  tv.label.material.color.setHex(0x5a7a5a);
}
function updateArch(){ $('arch').textContent='ARCHIVED '+Math.min(archived.size,GATE_TOTAL)+' / '+GATE_TOTAL; }

// hide/show the active iframe so walls "occlude" it
function updateVideoVisibility(){
  if(!videoObj){return;}
  if(!activeTV){videoObj.visible=false;return;}
  const tv=activeTV;
  const dx=tv.wp.x-camera.position.x, dz=tv.wp.z-camera.position.z;
  const dist=Math.hypot(dx,dz);
  const fwd=new THREE.Vector3();camera.getWorldDirection(fwd);
  const facing=(fwd.x*dx+fwd.z*dz)/Math.max(0.1,dist) > -0.15;
  let occluded=false;
  if(dist>1){
    // march from camera to TV; if a wall AABB sits between, hide
    const steps=Math.min(40,Math.ceil(dist));
    for(let i=1;i<steps;i++){
      const t=i/steps, px=camera.position.x+dx*t, pz=camera.position.z+dz*t;
      if(solidAt(px,pz,0.05)){occluded=true;break;}
    }
  }
  videoObj.visible = dist<16 && facing && !occluded;
}

  const c=document.createElement('canvas'); c.width=128; c.height=256; const x=c.getContext('2d');

  x.fillStyle='rgba(2,2,5,0.95)';
  x.beginPath(); x.ellipse(64,46,16,20,0,0,Math.PI*2); x.fill();
  x.beginPath(); x.moveTo(40,72); x.quadraticCurveTo(64,64,88,72);
  x.quadraticCurveTo(82,140,72,205); x.lineTo(56,205); x.quadraticCurveTo(46,140,40,72); x.closePath(); x.fill();
  x.beginPath(); x.moveTo(42,78); x.quadraticCurveTo(30,130,40,168); x.lineTo(50,150); x.quadraticCurveTo(46,110,52,90); x.closePath(); x.fill();
  x.beginPath(); x.moveTo(86,78); x.quadraticCurveTo(98,130,88,168); x.lineTo(78,150); x.quadraticCurveTo(82,110,76,90); x.closePath(); x.fill();
  x.beginPath(); x.moveTo(56,205); x.quadraticCurveTo(54,230,56,250); x.lineTo(64,250); x.quadraticCurveTo(64,230,64,205); x.closePath(); x.fill();
  x.beginPath(); x.moveTo(72,205); x.quadraticCurveTo(74,230,72,250); x.lineTo(64,250); x.quadraticCurveTo(64,230,64,205); x.closePath(); x.fill();
  x.filter='blur(2px)'; x.fillStyle='rgba(150,170,190,0.4)';
  x.beginPath(); x.arc(58,44,2.4,0,Math.PI*2); x.fill();
  x.beginPath(); x.arc(70,44,2.4,0,Math.PI*2); x.fill();
  x.filter='none';
  const g=x.createLinearGradient(0,0,0,256);
  g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(0.10,'rgba(0,0,0,1)');
  g.addColorStop(0.82,'rgba(0,0,0,1)'); g.addColorStop(1,'rgba(0,0,0,0)');
  x.globalCompositeOperation='destination-in'; x.fillStyle=g; x.fillRect(0,0,128,256);
  x.globalCompositeOperation='source-over';
  return new THREE.CanvasTexture(c);
}

// ── shadowFig — tall wavy one-arm dark sprite (Stage 8 structure) ──
const shadowFig={sprite:null,light:null,frames:null,x:20,z:20,peekCooldown:0};
let shadowGlitchT=0, jumpscareReady=true;
function buildShadowFig(){
  shadowFig.frames=makeShadowFrames();
  const mat=new THREE.SpriteMaterial({map:shadowFig.frames[0],transparent:true,opacity:0,depthWrite:false});
  shadowFig.sprite=new THREE.Sprite(mat); shadowFig.sprite.scale.set(0.95,2.95,1);
  shadowFig.sprite.position.set(shadowFig.x,1.3,shadowFig.z); scene.add(shadowFig.sprite);
  shadowFig.light=new THREE.PointLight(0x200010,0,4,2);
  shadowFig.light.position.set(shadowFig.x,1.4,shadowFig.z); scene.add(shadowFig.light);
}
function placeNear(minD,maxD,behind){
  for(let i=0;i<24;i++){
    let a;
    if(behind){a=camera.rotation.y+Math.PI+(Math.random()-0.5)*1.2;}
    else{a=Math.random()*Math.PI*2;}
    const r=minD+Math.random()*(maxD-minD);
    const px=camera.position.x+Math.sin(a)*r, pz=camera.position.z+Math.cos(a)*r;
    if(isOpen(px,pz))return{x:px,z:pz};
  }
  return null;
}
function updateShadowFig(dt){
  const s=shadowFig; if(!s.sprite)return;
  if(s.frames && s.sprite.material.opacity>0.02){
    shadowGlitchT--;
    if(shadowGlitchT<=0){
      s.sprite.material.map=s.frames[(Math.random()*s.frames.length)|0];
      s.sprite.material.needsUpdate=true;
      shadowGlitchT=3+((Math.random()*5)|0);
    }
    s.sprite.position.x=s.x+(Math.random()*2-1)*0.035;
    s.sprite.position.y=1.3+(Math.random()*2-1)*0.02;
  }
  s.sprite.position.z=s.z;
  const dx=s.x-camera.position.x, dz=s.z-camera.position.z;
  const dist=Math.hypot(dx,dz);
  const fwdX=Math.sin(camera.rotation.y), fwdZ=Math.cos(camera.rotation.y);
  const dot=(dx*fwdX+dz*fwdZ)/Math.max(0.1,dist);
  const looking=dot>0.75&&dist<14;
  const veryClose=dist<2.5;
  s.peekCooldown=Math.max(0,s.peekCooldown-1);
  if(veryClose&&looking&&jumpscareReady&&s.sprite.material.opacity>0.15){
    jumpscareReady=false; strobeOnce(); sfxScare();
    s.sprite.material.opacity=0; if(s.light)s.light.intensity=0;
    sanity=Math.max(0,sanity-12);
    const p=placeNear(14,26,true); if(p){s.x=p.x;s.z=p.z;}
    setTimeout(()=>jumpscareReady=true,14000);
    return;
  }
  if(looking&&dist<12){
    s.sprite.material.opacity=Math.max(0,s.sprite.material.opacity-0.035);
    if(s.sprite.material.opacity<=0){
      if(s.light)s.light.intensity=0;
      if(s.peekCooldown<=0){
        const p=placeNear(8,18,true); if(p){s.x=p.x;s.z=p.z;}
        s.peekCooldown=180+Math.random()*350;
      }
    }
    sanity=Math.max(0,sanity-0.05);
  } else if(!looking&&dist<18&&s.peekCooldown<=0&&dist>4){
    s.sprite.material.opacity=0.55+Math.random()*0.3;
    if(s.light){s.light.color.setHex(0x200010);s.light.intensity=0.5;}
    s.peekCooldown=70+Math.random()*130;
  } else if(dist>18&&Math.random()<0.002&&s.peekCooldown<=0){
    const p=placeNear(8,18,false); if(p&&Math.hypot(p.x-camera.position.x,p.z-camera.position.z)>6){s.x=p.x;s.z=p.z;}
  }
}

// ── blackFig — two-armed black watcher (Stage 8 structure) ──
const blackFig={
  sprite:null, x:10, z:10,
  state:'hidden', vis:0, targetVis:0,
  moveTo(x,z){ this.x=x; this.z=z; if(this.sprite)this.sprite.position.set(x,1.15,z); },
  setVis(v){ this.vis=v; if(this.sprite)this.sprite.material.opacity=v; },
  hide(){ this.state='hidden'; this.targetVis=0; this.setVis(0); },
};
const BLACK_MAX_OPACITY=0.36, STRIKE_RANGE=1.1, STARE_FRAMES=Math.round(3.8*60), BLACK_LULL_FRAMES=45*60;
let blackStrikeReady=true, blackCooldown=0, stareFrames=0;
function buildBlackFig(){
  const mat=new THREE.SpriteMaterial({map:blackFigureTex(),transparent:true,opacity:0,depthWrite:false,depthTest:true});
  blackFig.sprite=new THREE.Sprite(mat); blackFig.sprite.scale.set(0.95,1.95,1);
  blackFig.sprite.position.set(blackFig.x,1.15,blackFig.z); scene.add(blackFig.sprite);
}
function darknessAt(x,z){
  let lit=0;
  for(const f of lights){const d2=(f.x-x)*(f.x-x)+(f.z-z)*(f.z-z);lit+=f.i/(1+d2*0.06);}
  return 1/(1+lit);
}
function blackManifest(){
  let best=null,bestDark=0;
  for(let i=0;i<22;i++){
    const p=placeNear(5,12,false); if(!p)continue;
    const dk=darknessAt(p.x,p.z); if(dk>bestDark){bestDark=dk;best=p;}
  }
  if(best&&bestDark>0.34){
    blackFig.moveTo(best.x,best.z);
    blackFig.state='watching'; blackFig.targetVis=BLACK_MAX_OPACITY; return true;
  }
  return false;
}
function blackStrike(){
  if(!blackStrikeReady||blackCooldown>0)return;
  blackStrikeReady=false; strobeOnce(); sfxScare();
  sanity=Math.max(0,sanity-18);
  blackFig.hide(); stareFrames=0; blackCooldown=BLACK_LULL_FRAMES;
  setTimeout(()=>blackStrikeReady=true,1200);
}
function updateBlackFig(){
  const b=blackFig; if(!b.sprite)return;
  if(blackCooldown>0)blackCooldown--;
  const dx=b.x-camera.position.x, dz=b.z-camera.position.z;
  const dist=Math.hypot(dx,dz);
  const fwdX=Math.sin(camera.rotation.y), fwdZ=Math.cos(camera.rotation.y);
  const dot=(dx*fwdX+dz*fwdZ)/Math.max(0.1,dist);
  const lookingAt=dot>0.86&&dist<16;
  if(b.state==='hidden'){
    stareFrames=0;
    if(blackCooldown<=0){
      const here=darknessAt(camera.position.x,camera.position.z);
      if(Math.random()<0.0016+here*0.002)blackManifest();
    }
    return;
  }
  b.setVis(b.vis+(b.targetVis-b.vis)*0.08);
  if(dist<STRIKE_RANGE){blackStrike();return;}
  if(lookingAt){
    stareFrames++;
    sanity=Math.max(0,sanity-0.5*0.016);
    if(stareFrames>=STARE_FRAMES){
      b.moveTo(camera.position.x+fwdX*0.9, camera.position.z+fwdZ*0.9);
      b.setVis(BLACK_MAX_OPACITY); blackStrike(); return;
    }
  } else {
    stareFrames=Math.max(0,stareFrames-2);
    if(dist>14||darknessAt(b.x,b.z)<0.28){
      b.targetVis=0; if(b.vis<0.03){b.hide();blackCooldown=Math.max(blackCooldown,300);}
    }
  }
}

// ════ COLLISION ════
function solidAt(x,z,extra){
  const r=(extra===undefined?PLAYER_R:extra);
  for(const c of colliders){
    if(x>c.x0-r&&x<c.x1+r&&z>c.z0-r&&z<c.z1+r)return true;
  }
  return false;
}
function isOpen(x,z){
  if(x<-46||x>190||z<2||z>94)return false;
  return !solidAt(x,z,0.5);
}
function tryMove(nx,nz){
  let x=camera.position.x,z=camera.position.z;
  if(!solidAt(nx,z))x=nx;
  if(!solidAt(x,nz))z=nz;
  camera.position.x=x;camera.position.z=z;
}

// ════ POST PROCESSING (grain + vignette + sanity reactive) ════
const ComposerShader={
  vertex:`varying vec2 vUv;void main(){vUv=uv;gl_Position=vec4(position,1.0);}`,
  frag:`uniform sampler2D tDiffuse;uniform float uTime;uniform float uSan;varying vec2 vUv;
    float rnd(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
    void main(){
      float ins=1.0-uSan;
      vec2 uv=vUv;
      uv.x+=sin(uv.y*38.0+uTime*4.0)*0.0016*ins*3.0;
      vec4 c=texture2D(tDiffuse,uv);
      // moving film grain (blueprint base ~0.09, stronger as sanity drops)
      c.rgb+=vec3((rnd(vUv+sin(uTime))-0.5)*(0.09+ins*0.11));
      // vignette falloff (blueprint 1.5, tighter as sanity drops)
      vec2 vc=vUv-0.5;float v=1.0-dot(vc,vc)*(1.5+ins*0.8);
      c.rgb*=clamp(v,0.0,1.0);
      c.r+=ins*0.13;c.gb*=1.0-ins*0.09;
      gl_FragColor=c;
    }`
};
function setupPost(){
  postScene=new THREE.Scene();
  postCamera=new THREE.OrthographicCamera(-1,1,1,-1,0,1);
  renderTarget=new THREE.WebGLRenderTarget(innerWidth,innerHeight);
  postMaterial=new THREE.ShaderMaterial({
    vertexShader:ComposerShader.vertex,fragmentShader:ComposerShader.frag,
    uniforms:{tDiffuse:{value:renderTarget.texture},uTime:{value:0},uSan:{value:1}}
  });
  postScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2),postMaterial));
}

// ════ AUDIO (tiny synth blips) ════
let AC=null;
function ac(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}return AC;}
function blip(freq,dur,type,vol){const a=ac();if(!a)return;const o=a.createOscillator(),g=a.createGain();
  o.type=type||'sine';o.frequency.value=freq;g.gain.value=vol||0.06;o.connect(g);g.connect(a.destination);
  o.start();g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+(dur||0.3));o.stop(a.currentTime+(dur||0.3));}
function strobeOnce(){const s=$('strobe');s.style.opacity='0.7';setTimeout(()=>s.style.opacity='0',120);}
function sfxScare(){blip(70,0.5,'sawtooth',0.18);blip(120,0.4,'square',0.10);}
function sfxStatic(){blip(200,0.15,'square',0.05);}
function sfxOpen(){blip(330,0.6,'sine',0.10);blip(495,0.6,'sine',0.07);}
function sfxUI(){blip(440,0.12,'sine',0.05);}

// ════ UI HELPERS ════
function setObjective(t){$('obj').textContent=t;}
function flashFact(t){const el=$('fact');el.textContent=t;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),5200);}
function whisper(t){const el=$('whisper');el.textContent=t;el.classList.remove('show');void el.offsetWidth;el.classList.add('show');}
function updateSanityHUD(){
  const sf=$('sf');const s=Math.max(0,Math.min(100,sanity));
  sf.style.width=s+'%';
  sf.style.background=s>60?'#c8b86a':s>30?'#cc7733':'#cc2222';
  postMaterial.uniforms.uSan.value=s/100;
  $('flash').style.opacity=s<45?String((45-s)/120):'0';
}

// ════ INTERACT ════
function updateInteract(){
  const hint=$('hint'), ib=$('ibtn');
  let label=null; nearTV=null;
  if(slideOpen && camera.position.distanceTo(slideMouth)<3.2){
    nearTV='SLIDE'; label='STEP IN'; $('xh').classList.add('lock');
  } else {
    $('xh').classList.remove('lock');
    ray.setFromCamera(sc2,camera);
    const meshes=[];tvList.forEach(t=>meshes.push(t.frame));
    const hits=ray.intersectObjects(meshes,true);
    if(hits.length&&hits[0].distance<5.5){
      const hm=hits[0].object;
      const tv=tvList.find(t=>t.frame===hm||(t.frame.children&&t.frame.children.includes(hm)));
      if(tv){ nearTV=tv; label = tv.seen?'REPLAY':'PLAY'; }
    }
  }
  if(label && isMobile){ hint.style.display='none'; ib.textContent=label; ib.style.display='flex'; }
  else if(label){ hint.style.display='block'; hint.textContent='[ E ] '+label; ib.style.display='none'; }
  else { hint.style.display='none'; ib.style.display='none'; }
}
function interact(){
  if(!started||ending)return;
  sfxUI();
  if(nearTV==='SLIDE'){rideSlide();return;}
  if(nearTV)playTV(nearTV);
}
function rideSlide(){
  if(ending)return;ending=true;
  setObjective('');
  $('hint').style.display='none';
  if(videoIframe)videoIframe.src='';
  whisper('down, then. mind the drop.');
  $('fade').classList.add('on');
  setTimeout(()=>{window.location.href='veganbrosstage10.html';},1300);
}

// ════ CONTROLS ════
function setupControls(){
  const desktop=matchMedia('(hover:hover) and (pointer:fine)').matches;
  if(desktop){
    $('c').addEventListener('click',()=>{if(started)document.body.requestPointerLock&&document.body.requestPointerLock();});
    document.addEventListener('mousemove',e=>{
      if(document.pointerLockElement===document.body&&started){
        camera.rotation.y-=e.movementX*0.0024;
        camera.rotation.x=Math.max(-Math.PI/2.4,Math.min(Math.PI/2.4,camera.rotation.x-e.movementY*0.0024));
      }
    });
  }
  addEventListener('keydown',e=>{
    if(!started&&(e.code==='Space'||e.code==='Enter')){startGame();return;}
    switch(e.code){
      case'KeyW':kW=1;break;case'KeyA':kA=1;break;case'KeyS':kS=1;break;case'KeyD':kD=1;break;
      case'KeyE':interact();break;
    }
  });
  addEventListener('keyup',e=>{
    switch(e.code){case'KeyW':kW=0;break;case'KeyA':kA=0;break;case'KeyS':kS=0;break;case'KeyD':kD=0;break;}
  });
}
function setupTouch(){
  function bind(id,data,onStart){
    const el=$(id),kn=el.querySelector('.kn');
    el.addEventListener('touchstart',e=>{const t=e.targetTouches[0];data.a=1;data.sx=t.clientX;data.sy=t.clientY;if(onStart)onStart();},{passive:true});
    el.addEventListener('touchmove',e=>{if(!data.a)return;const t=e.targetTouches[0];
      let dx=t.clientX-data.sx,dy=t.clientY-data.sy;const r=Math.min(Math.hypot(dx,dy),40),a=Math.atan2(dy,dx);
      const kx=Math.cos(a)*r,ky=Math.sin(a)*r;kn.style.transform=`translate(${kx}px,${ky}px)`;data.mx=kx/40;data.my=ky/40;},{passive:true});
    el.addEventListener('touchend',()=>{data.a=0;kn.style.transform='';data.mx=0;data.my=0;});
  }
  bind('lj',td.l,null);bind('rj',td.r,startGame);
}

// ════ GAME ════
function startGame(){
  if(started)return;started=true;ac();
  const ov=$('connect');ov.classList.add('fade');setTimeout(()=>ov.style.display='none',1700);
  if(matchMedia('(hover:hover) and (pointer:fine)').matches)document.body.requestPointerLock&&document.body.requestPointerLock();
  setObjective(isMobile?'Find every screen. Tap WATCH. Archive all five.':'Find every screen. Press [E] to watch. Archive all five.');
}

// ════ ANIMATE ════
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05),t=clock.getElapsedTime();
  postMaterial.uniforms.uTime.value=t;

  if(!started){renderer.setRenderTarget(null);renderer.render(scene,camera);return;}

  // look (touch)
  if(td.r.a){
    camera.rotation.y-=td.r.mx*0.03;
    camera.rotation.x=Math.max(-Math.PI/2.4,Math.min(Math.PI/2.4,camera.rotation.x-td.r.my*0.03));
  }

  // movement with collision
  vel.x-=vel.x*10*dt;vel.z-=vel.z*10*dt;
  const dz=Number(kW)-Number(kS), dxk=Number(kD)-Number(kA);
  if(kW||kS)vel.z+=dz*40*dt;   // W = forward, S = back  (inversion fixed)
  if(kA||kD)vel.x-=dxk*40*dt;  // D = right, A = left
  if(td.l.a){vel.z-=td.l.my*26*dt;vel.x-=td.l.mx*26*dt;}  // stick up = forward
  // resolve in camera space → world delta
  const before=camera.position.clone();
  camera.translateX(-vel.x*dt);camera.translateZ(-vel.z*dt);
  const wantX=camera.position.x, wantZ=camera.position.z;
  camera.position.copy(before);
  tryMove(wantX,wantZ);
  camera.position.y=2;

  // fuzz (every 3rd frame)
  if(++fuzzFrame%3===0)updateFuzz();

  // systems
  updateShadowFig(dt);updateBlackFig();updateInteract();updateVideoVisibility();updateSanityHUD();

  // slow sanity regen when nothing is on you
  if(shadowFig.sprite.material.opacity<0.1 && blackFig.sprite.material.opacity<0.1)
    sanity=Math.min(100,sanity+3*dt);

  // facts
  factTimer-=dt;
  if(factTimer<=0){flashFact(FACTS[factIdx++%FACTS.length]);factTimer=18+Math.random()*22;}
  // whispers
  whisperTimer--;
  if(whisperTimer<=0){whisper(WHISPERS[Math.floor(Math.random()*WHISPERS.length)]);whisperTimer=600+Math.floor(Math.random()*600);}

  // render: scene → RT → grain quad → screen, then CSS3D iframe on top
  renderer.setRenderTarget(renderTarget);renderer.render(scene,camera);
  renderer.setRenderTarget(null);renderer.render(postScene,postCamera);
  if(css3d)css3d.render(scene,camera);
}

function updateFuzz(){
  const id=fuzzCtx.createImageData(64,48);
  for(let i=0;i<id.data.length;i+=4){
    const v=Math.random()>0.5?150+Math.random()*90:Math.random()*25;
    id.data[i]=v*0.78;id.data[i+1]=v*0.88;id.data[i+2]=v;id.data[i+3]=255;
  }
  fuzzCtx.putImageData(id,0,0);fuzzTex.needsUpdate=true;
}

init();
</script>
