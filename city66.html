<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Procedural City Walker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
  #canvas { display: block; width: 100vw; height: 100vh; }
  #ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
  #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; }
  #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(255,255,255,0.8); }
  #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
  #crosshair::after  { height: 2px; width: 100%; top: 50%; transform: translateY(-50%); }
  #hud { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.6); font-size: 12px; text-align: center; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
  #controls-panel { position: absolute; top: 16px; right: 16px; background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; padding: 12px 16px; color: #ccc; font-size: 11px; line-height: 1.9; min-width: 160px; }
  #controls-panel h3 { color: #fff; font-size: 12px; margin-bottom: 6px; letter-spacing: 1px; }
  #controls-panel span { color: #80cfff; }
  #loading { position: fixed; inset: 0; background: #0a0a0f; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: #fff; }
  #loading h1 { font-size: 22px; letter-spacing: 3px; margin-bottom: 24px; color: #adf; }
  #progress-bar { width: 280px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; margin-bottom: 12px; }
  #progress-fill { height: 100%; width: 0%; background: #5af; transition: width 0.2s ease; border-radius: 2px; }
  #loading-text { font-size: 12px; color: #888; letter-spacing: 1px; }
  #start-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 50; color: #fff; cursor: pointer; pointer-events: all; }
  #start-overlay h2 { font-size: 28px; letter-spacing: 4px; margin-bottom: 12px; }
  #start-overlay p  { font-size: 13px; color: #aaa; letter-spacing: 1px; }
  #mobile-controls { display: none; position: fixed; bottom: 0; left: 0; width: 100%; height: 220px; pointer-events: none; z-index: 20; }
  #joystick-zone { position: absolute; left: 30px; bottom: 30px; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.07); border: 2px solid rgba(255,255,255,0.25); pointer-events: all; }
  #joystick-knob { position: absolute; width: 46px; height: 46px; border-radius: 50%; background: rgba(100,200,255,0.55); border: 2px solid rgba(100,200,255,0.9); top: 50%; left: 50%; transform: translate(-50%,-50%); pointer-events: none; transition: none; }
  #btn-jump { position: absolute; right: 30px; bottom: 30px; width: 70px; height: 70px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); color: #fff; font-size: 11px; font-family: 'Courier New', monospace; letter-spacing: 1px; cursor: pointer; pointer-events: all; display: flex; align-items: center; justify-content: center; }
  #look-zone { position: absolute; right: 0; bottom: 0; width: 55%; height: 100%; pointer-events: all; }
  @media (pointer: coarse) { #mobile-controls { display: block; } #controls-panel { display: none; } #hud { bottom: 240px; } }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="loading">
  <h1>CITY WALKER</h1>
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="loading-text">Loading city... 0%</div>
</div>

<div id="start-overlay" onclick="startGame()">
  <h2>ENTER CITY</h2>
  <p>Click to lock mouse &amp; walk</p>
</div>

<div id="ui">
  <div id="crosshair"></div>
  <div id="hud">WASD · MOVE &nbsp;|&nbsp; MOUSE · LOOK &nbsp;|&nbsp; SHIFT · SPRINT &nbsp;|&nbsp; SPACE · JUMP &nbsp;|&nbsp; F · FLY</div>
  <div id="controls-panel">
    <h3>CONTROLS</h3>
    <span>W A S D</span> Move<br>
    <span>MOUSE</span> Look<br>
    <span>SHIFT</span> Sprint<br>
    <span>SPACE</span> Jump<br>
    <span>F</span> Fly toggle<br>
    <span>↑ ↓</span> Speed<br>
  </div>
</div>

<div id="mobile-controls">
  <div id="joystick-zone"><div id="joystick-knob"></div></div>
  <div id="btn-jump">JUMP</div>
  <div id="look-zone"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

const GLB_URL = './procedural_city_66.glb';

// ── Renderer ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputColorSpace = THREE.SRGBColorSpace;
// Fix z-fighting on roads/crosswalks
renderer.setPolygonOffset = true;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d1520);
scene.fog = new THREE.FogExp2(0x0d1520, 0.007);

// ── Camera ────────────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.05, 1200);
camera.position.set(0, 5, 0);

// ── Lighting ──────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x334455, 1.4));
const sun = new THREE.DirectionalLight(0xffd4aa, 2.5);
sun.position.set(80, 120, 60);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 500;
sun.shadow.camera.left = sun.shadow.camera.bottom = -200;
sun.shadow.camera.right = sun.shadow.camera.top = 200;
scene.add(sun);
const fillA = new THREE.DirectionalLight(0x4488ff, 0.5);
fillA.position.set(-60, 40, -80); scene.add(fillA);
const fillB = new THREE.DirectionalLight(0xff6633, 0.25);
fillB.position.set(60, 20, 80); scene.add(fillB);

// Fallback ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(2000, 2000),
  new THREE.MeshLambertMaterial({ color: 0x111118 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.05;
ground.receiveShadow = true;
scene.add(ground);

// ── Collision ─────────────────────────────────────────────────────────────
const collidables = [];
const rayDown = new THREE.Raycaster(new THREE.Vector3(), new THREE.Vector3(0, -1, 0), 0, 6);
const rayFwd  = new THREE.Raycaster(new THREE.Vector3(), new THREE.Vector3(), 0, 0.7);

// ── Load GLB ──────────────────────────────────────────────────────────────
const loadingEl = document.getElementById('loading');
const fillEl    = document.getElementById('progress-fill');
const textEl    = document.getElementById('loading-text');
const startEl   = document.getElementById('start-overlay');

const draco = new DRACOLoader();
draco.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/');
const loader = new GLTFLoader();
loader.setDRACOLoader(draco);

loader.load(
  GLB_URL,
  (gltf) => {
    const model = gltf.scene;

    // Fix z-fighting on flat coplanar surfaces (roads, crosswalks)
    model.traverse(node => {
      if (node.isMesh) {
        node.castShadow = true;
        node.receiveShadow = true;
        // Push overlapping flat surfaces apart
        if (node.material) {
          const mats = Array.isArray(node.material) ? node.material : [node.material];
          mats.forEach(m => {
            m.polygonOffset = true;
            m.polygonOffsetFactor = 1;
            m.polygonOffsetUnits  = 1;
          });
        }
        collidables.push(node);
      }
    });

    scene.add(model);

    // Centre model on XZ
    const box = new THREE.Box3().setFromObject(model);
    const centre = box.getCenter(new THREE.Vector3());
    model.position.x -= centre.x;
    model.position.z -= centre.z;

    // Find actual street level — cast ray down from centre top
    const testOrigin = new THREE.Vector3(0, box.max.y + 10, 0);
    const testRay = new THREE.Raycaster(testOrigin, new THREE.Vector3(0, -1, 0), 0, box.max.y + 20);
    collidables.length = 0;
    model.traverse(node => { if (node.isMesh) collidables.push(node); });
    const hits = testRay.intersectObjects(collidables, false);

    let streetY = box.min.y;
    if (hits.length > 0) streetY = hits[0].point.y;

    // Spawn on street
    camera.position.set(0, streetY + 1.75, 0);
    playerVelocityY = 0;

    loadingEl.style.display = 'none';
    startEl.style.display   = 'flex';
  },
  (xhr) => {
    if (xhr.total) {
      const pct = Math.round((xhr.loaded / xhr.total) * 100);
      fillEl.style.width = pct + '%';
      textEl.textContent = `Loading city... ${pct}%`;
    } else {
      const mb = (xhr.loaded / 1048576).toFixed(1);
      textEl.textContent = `Loading... ${mb} MB`;
      fillEl.style.width = Math.min(90, parseFloat(fillEl.style.width || 0) + 0.4) + '%';
    }
  },
  (err) => {
    textEl.textContent = 'Load error: ' + err.message;
    console.error(err);
  }
);

// ── Player state ──────────────────────────────────────────────────────────
let yaw = 0, pitch = 0;
let playerVelocityY = 0;
let onGround = false;
let flyMode  = false;
let moveSpeed = 6;
const GRAVITY    = -20;
const JUMP_VEL   = 8;
const EYE_HEIGHT = 1.75;

const keys = {};
let jumpQueued = false;

// ── Mouse lock ────────────────────────────────────────────────────────────
let locked = false;
document.addEventListener('pointerlockchange', () => {
  locked = document.pointerLockElement === canvas;
  startEl.style.display = locked ? 'none' : 'flex';
});
document.addEventListener('mousemove', e => {
  if (!locked) return;
  yaw   -= e.movementX * 0.0018;
  pitch -= e.movementY * 0.0018;
  pitch  = Math.max(-Math.PI/2 + 0.05, Math.min(Math.PI/2 - 0.05, pitch));
});

window.startGame = function() { canvas.requestPointerLock(); };

// ── Keyboard ──────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'KeyF') flyMode = !flyMode;
  if (e.code === 'Space') { e.preventDefault(); jumpQueued = true; }
  if (e.code === 'ArrowUp')   moveSpeed = Math.min(moveSpeed + 1, 30);
  if (e.code === 'ArrowDown') moveSpeed = Math.max(moveSpeed - 1, 1);
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ── Mobile joystick ───────────────────────────────────────────────────────
const joystickZone = document.getElementById('joystick-zone');
const joystickKnob = document.getElementById('joystick-knob');
const btnJump      = document.getElementById('btn-jump');
const lookZone     = document.getElementById('look-zone');

const JOYSTICK_RADIUS = 40; // px max travel
let joy = { active: false, id: null, cx: 0, cy: 0, dx: 0, dy: 0, magnitude: 0 };
let lookTouch = { id: null, lastX: 0, lastY: 0 };

joystickZone.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  const r = joystickZone.getBoundingClientRect();
  joy = { active: true, id: t.identifier, cx: r.left + r.width/2, cy: r.top + r.height/2, dx: 0, dy: 0, magnitude: 0 };
}, { passive: false });

lookZone.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  lookTouch = { id: t.identifier, lastX: t.clientX, lastY: t.clientY };
}, { passive: false });

btnJump.addEventListener('touchstart', e => { e.preventDefault(); jumpQueued = true; }, { passive: false });

document.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    // Joystick
    if (t.identifier === joy.id) {
      let dx = t.clientX - joy.cx;
      let dy = t.clientY - joy.cy;
      const len = Math.sqrt(dx*dx + dy*dy);
      joy.magnitude = Math.min(len / JOYSTICK_RADIUS, 1);
      if (len > JOYSTICK_RADIUS) { dx = dx/len*JOYSTICK_RADIUS; dy = dy/len*JOYSTICK_RADIUS; }
      joy.dx = dx / JOYSTICK_RADIUS;
      joy.dy = dy / JOYSTICK_RADIUS;
      joystickKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    }
    // Look
    if (t.identifier === lookTouch.id) {
      yaw   -= (t.clientX - lookTouch.lastX) * 0.005;
      pitch -= (t.clientY - lookTouch.lastY) * 0.005;
      pitch  = Math.max(-Math.PI/2+0.05, Math.min(Math.PI/2-0.05, pitch));
      lookTouch.lastX = t.clientX;
      lookTouch.lastY = t.clientY;
    }
  }
}, { passive: false });

document.addEventListener('touchend', e => {
  for (const t of e.changedTouches) {
    if (t.identifier === joy.id) {
      joy.active = false; joy.dx = 0; joy.dy = 0; joy.magnitude = 0;
      joystickKnob.style.transform = 'translate(-50%,-50%)';
    }
  }
});

// ── Main loop ─────────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  // ── Input → local move vector ──────────────────────────────────────────
  let localX = 0, localZ = 0;

  if (keys['KeyA']) localX -= 1;
  if (keys['KeyD']) localX += 1;
  if (keys['KeyW']) localZ -= 1;
  if (keys['KeyS']) localZ += 1;

  // Joystick: magnitude drives speed (walk at half, run at full)
  if (joy.active) {
    localX += joy.dx;
    localZ += joy.dy;
  }

  // Normalise diagonal
  const inputLen = Math.sqrt(localX*localX + localZ*localZ);
  if (inputLen > 1) { localX /= inputLen; localZ /= inputLen; }

  // Sprint on keyboard shift, or full joystick push (magnitude > 0.75)
  const sprint = keys['ShiftLeft'] || keys['ShiftRight'] || (joy.active && joy.magnitude > 0.75);
  // Speed scales with joystick magnitude on mobile for analogue feel
  const joyScale = joy.active ? Math.max(joy.magnitude, 0.3) : 1;
  const speed = moveSpeed * (sprint ? 2.5 : 1) * (joy.active ? joyScale : 1);

  // ── Rotate local → world using yaw only ───────────────────────────────
  const cosY = Math.cos(yaw), sinY = Math.sin(yaw);
  const worldX = localX * cosY - localZ * sinY;
  const worldZ = localX * sinY + localZ * cosY;

  // ── Apply camera rotation ──────────────────────────────────────────────
  camera.rotation.order = 'YXZ';
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;

  if (flyMode) {
    camera.position.x += worldX * speed * dt;
    camera.position.z += worldZ * speed * dt;
    if (keys['Space'])    camera.position.y += speed * dt;
    if (keys['ControlLeft'] || keys['ControlRight']) camera.position.y -= speed * dt;
  } else {
    // Gravity
    playerVelocityY += GRAVITY * dt;

    // Jump
    if (jumpQueued && onGround) { playerVelocityY = JUMP_VEL; }
    jumpQueued = false;

    // Move horizontal
    camera.position.x += worldX * speed * dt;
    camera.position.z += worldZ * speed * dt;

    // Move vertical
    camera.position.y += playerVelocityY * dt;

    // ── Ground collision ───────────────────────────────────────────────
    onGround = false;
    rayDown.ray.origin.copy(camera.position);
    const groundHits = rayDown.intersectObjects(collidables, false);
    if (groundHits.length > 0) {
      const floorY = groundHits[0].point.y + EYE_HEIGHT;
      if (camera.position.y <= floorY + 0.05) {
        camera.position.y = floorY;
        if (playerVelocityY < 0) playerVelocityY = 0;
        onGround = true;
      }
    }

    // Hard floor fallback
    if (camera.position.y < EYE_HEIGHT) {
      camera.position.y = EYE_HEIGHT;
      if (playerVelocityY < 0) playerVelocityY = 0;
      onGround = true;
    }

    // ── Wall collision ─────────────────────────────────────────────────
    if (worldX !== 0 || worldZ !== 0) {
      const wallDir = new THREE.Vector3(worldX, 0, worldZ).normalize();
      rayFwd.ray.origin.copy(camera.position);
      rayFwd.ray.direction.copy(wallDir);
      const wallHits = rayFwd.intersectObjects(collidables, false);
      if (wallHits.length > 0 && wallHits[0].distance < 0.6) {
        const push = wallDir.multiplyScalar(-(0.6 - wallHits[0].distance));
        camera.position.add(push);
      }
    }
  }

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
