  * { margin: 0; padding: 0; box-sizing: border-box; }

  @media (pointer: coarse) {
    #joystick-left, #joystick-right { display: block; }

  }

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ── YOUTUBE IDs ───────────────────────────────────────────────────────────────
const TV_IDS = {
  T1:'PLACEHOLDER_T1', T2:'PLACEHOLDER_T2', T3:'PLACEHOLDER_T3',
  T4:'PLACEHOLDER_T4', T5:'PLACEHOLDER_T5', T6:'PLACEHOLDER_T6',
  T7:'PLACEHOLDER_T7', T8:'PLACEHOLDER_T8', T9:'PLACEHOLDER_T9',
  T10:'PLACEHOLDER_T10',
  W1a:'PLACEHOLDER_W1a', W1b:'PLACEHOLDER_W1b',
  W2a:'PLACEHOLDER_W2a', W2b:'PLACEHOLDER_W2b',
};

// ── DEVICE & GLB ─────────────────────────────────────────────────────────────
const isMobile = /Mobi|Android|iPhone|iPad|iPod|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;
const GLB_URL = isMobile
  ? 'https://cors.archive.org/cors/backrooms_vr1k/backrooms_vr1k.glb'
  : 'https://cors.archive.org/cors/backrooms_vr/backrooms_vr.glb';

// ── WALL TV DEFINITIONS ───────────────────────────────────────────────────────
const WALL_TVS = [
  { id:'T1',  pos:[ 0,   1.9, -8],   ry: 0          },
  { id:'T2',  pos:[ 0,   1.9, -18],  ry: 0          },
  { id:'T3',  pos:[ 0,   1.9, -30],  ry: 0          },
  { id:'T4',  pos:[ 0,   1.9, -12],  ry: Math.PI    },
  { id:'T5',  pos:[ 0,   1.9, -24],  ry: Math.PI    },
  { id:'T6',  pos:[ 12,  1.9, -5],   ry:-Math.PI/2  },
  { id:'T7',  pos:[ 12,  1.9,  5],   ry:-Math.PI/2  },
  { id:'T8',  pos:[-12,  1.9, -5],   ry: Math.PI/2  },
  { id:'T9',  pos:[ 18,  1.9,  14],  ry:-Math.PI/2  },
  { id:'T10', pos:[ 0,   1.9, -44],  ry: 0          },
];

// W1a: slide left = decrease X (keeping same rotation)
// Was at X:-3.59, sliding left to X:-5.5
const WINDOW_TVS = [
  { id:'W1a', pos:[-5.5, 2.65, 0.18], ry: Math.PI/2, wide:true },
];

// ── LEVEL SYSTEM ─────────────────────────────────────────────────────────────
const EYE_HEIGHT    = 1.72;
const LEVEL_DEPTH   = 30;
const NOCLIP_RADIUS = 0.6;
const CROSS_SIZE    = 0.5;

// Building bounds — raycasting handles actual walls but these keep
// noclip crosses and TV spawns inside the building footprint
const BUILD_BOUNDS = { minX:-22, maxX:25, minZ:-52, maxZ:12 };

let currentLevel    = 0;
let levelFloorY     = 0;
let isFalling       = false;
let isRecovering    = false;
let recoverStart    = 0;
let recoverFrom     = 0;
let tumblePhase     = 0;   // tracks tumble rotation during fall

// Per-level scene groups (for show/hide)
const levelGroups   = [];  // levelGroups[i] = { group, lights }
let glbTemplate     = null;
const noclipZones   = [];

// ── SCREAM AUDIO ──────────────────────────────────────────────────────────────
const screamAudio = new Audio('https://archive.org/download/ScreamSounds/SCREAM_4.mp3');
screamAudio.volume = 0.85;

// ── FIXED NOCLIP POSITIONS FOR LEVEL 0 (must be inside BUILD_BOUNDS) ─────────
const LEVEL0_CROSSES = [
  [ 2.5,  -8.0],
  [-3.0, -16.0],
];

function clampToBounds(x, z) {
  return [
    Math.max(BUILD_BOUNDS.minX + 2, Math.min(BUILD_BOUNDS.maxX - 2, x)),
    Math.max(BUILD_BOUNDS.minZ + 2, Math.min(BUILD_BOUNDS.maxZ - 2, z)),
  ];
}

function randomNoclipPositions(){
  const candidates = [
    [ 3,  -6], [-4, -10], [ 6, -18], [-5, -22],
    [ 2, -30], [-6, -35], [ 8,  -4], [-8,  -8],
    [ 4, -14], [-3, -26],
  ];
  for(let i=candidates.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [candidates[i],candidates[j]]=[candidates[j],candidates[i]];
  }
  return candidates.slice(0,2).map(([x,z]) => clampToBounds(x,z));
}

// ── RENDERER / SCENE / CAMERA ─────────────────────────────────────────────────
const canvas   = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
renderer.toneMapping       = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;
renderer.outputColorSpace  = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.FogExp2(0x1a1208, 0.035);

const camera = new THREE.PerspectiveCamera(80, innerWidth/innerHeight, 0.05, 500);
camera.position.set(0, EYE_HEIGHT, 0);

scene.add(new THREE.AmbientLight(0xfff5cc, 0.4));
const flickerLights = [];

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight), 0.4, 0.5, 0.85));
composer.addPass(new OutputPass());

const controls = new PointerLockControls(camera, document.body);
const overlayEl = document.getElementById('overlay');
const xhairEl   = document.getElementById('xhair');
const hintEl    = document.getElementById('hint');
const popupEl   = document.getElementById('tv-popup');
const tvLinkEl  = document.getElementById('tv-link');
const tvIdLabel = document.getElementById('tv-id-label');
const coordsEl  = document.getElementById('coords');
const barEl     = document.getElementById('bar');
const pctEl     = document.getElementById('pct');
let showCoords  = false;

controls.addEventListener('lock',   ()=>{ overlayEl.style.display='none'; xhairEl.style.display='block'; hintEl.style.display='block'; });
controls.addEventListener('unlock', ()=>{ overlayEl.style.display='flex'; xhairEl.style.display='none';  hintEl.style.display='none';  popupEl.style.display='none'; });
overlayEl.addEventListener('click', ()=>controls.lock());

// ── WALL RAYCASTING COLLISION ──────────────────────────────────────────────────
// 8 horizontal rays per step, checks if movement would penetrate geometry
const wallRaycaster = new THREE.Raycaster();
const wallDirs = [];
for(let i=0;i<8;i++){
  const a = (i/8)*Math.PI*2;
  wallDirs.push(new THREE.Vector3(Math.sin(a), 0, Math.cos(a)));
}
let collisionMeshes = []; // filled after GLB loads
const WALL_SKIN = 0.35;   // minimum distance to keep from walls

function canMoveTo(newPos){
  for(const dir of wallDirs){
    wallRaycaster.set(newPos, dir);
    wallRaycaster.near = 0;
    wallRaycaster.far  = WALL_SKIN;
    const hits = wallRaycaster.intersectObjects(collisionMeshes, false);
    if(hits.length > 0) return false;
  }
  return true;
}

// ── TV LABEL TEXTURE ─────────────────────────────────────────────────────────
function makeLabelTex(id){
  const c = document.createElement('canvas'); c.width=256; c.height=48;
  const ctx = c.getContext('2d');
  ctx.fillStyle='rgba(0,0,0,0)'; ctx.fillRect(0,0,256,48);
  ctx.fillStyle='#8a8060'; ctx.font='bold 22px Courier New';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(id,128,24);
  return new THREE.CanvasTexture(c);
}

// ── W1a VIDEO TEXTURE ─────────────────────────────────────────────────────────
let w1aVideoEl = null;
let w1aVideoTex = null;

function createW1aVideoTex(){
  const vid = document.createElement('video');
  vid.src = 'https://archive.org/download/05.-backrooms-found-footage-4/05.Backrooms%20Found%20Footage%20%234.ia.mp4';
  vid.crossOrigin = 'anonymous';
  vid.loop = true;
  vid.muted = true;
  vid.playsInline = true;
  vid.autoplay = true;
  vid.play().catch(()=>{});
  w1aVideoEl = vid;
  const tex = new THREE.VideoTexture(vid);
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  w1aVideoTex = tex;
  return tex;
}

// ── BUILD A WALL TV ───────────────────────────────────────────────────────────
function buildWallTV(id, pos, ry, levelYOffset=0){
  const g = new THREE.Group();
  const frame = new THREE.Mesh(
    new THREE.BoxGeometry(2.5, 1.7, 0.14),
    new THREE.MeshStandardMaterial({color:0x111111, roughness:.9, metalness:.2})
  );
  frame.castShadow=true; g.add(frame);

  const nc=document.createElement('canvas'); nc.width=128; nc.height=72;
  const nctx=nc.getContext('2d');
  const ntex=new THREE.CanvasTexture(nc); ntex.minFilter=THREE.LinearFilter;

  let screenMat;
  if(id==='W1a'){
    const vtex = createW1aVideoTex();
    screenMat = new THREE.MeshBasicMaterial({map: vtex});
  } else {
    screenMat = new THREE.MeshBasicMaterial({map: ntex});
  }

  const screen=new THREE.Mesh(new THREE.PlaneGeometry(2.2,1.4), screenMat);
  screen.position.set(0,0,0.075); frame.add(screen);

  const glow=new THREE.PointLight(0xaaccff,0.55,5);
  glow.position.set(0,0,0.6); frame.add(glow);

  const labelMesh=new THREE.Mesh(
    new THREE.PlaneGeometry(2.0,0.28),
    new THREE.MeshBasicMaterial({map:makeLabelTex(id),transparent:true,depthWrite:false})
  );
  labelMesh.position.set(0,-1.06,0.08); frame.add(labelMesh);

  g.position.set(pos[0], pos[1]+levelYOffset, pos[2]);
  g.rotation.y=ry;
  return { g, screen, ntex, nctx, id };
}

// ── BUILD A WINDOW TV ─────────────────────────────────────────────────────────
function buildWindowTV(id, pos, ry, levelYOffset=0){
  const g = new THREE.Group();
  const frame=new THREE.Mesh(
    new THREE.BoxGeometry(2.8,1.2,0.10),
    new THREE.MeshStandardMaterial({color:0x0a0a0a, roughness:.95, metalness:.1})
  );
  frame.castShadow=true; g.add(frame);

  const nc=document.createElement('canvas'); nc.width=128; nc.height=72;
  const nctx=nc.getContext('2d');
  const ntex=new THREE.CanvasTexture(nc); ntex.minFilter=THREE.LinearFilter;

  let screenMat;
  if(id==='W1a'){
    const vtex = createW1aVideoTex();
    screenMat = new THREE.MeshBasicMaterial({map: vtex});
  } else {
    screenMat = new THREE.MeshBasicMaterial({map: ntex});
  }

  const screen=new THREE.Mesh(new THREE.PlaneGeometry(2.55,1.0), screenMat);
  screen.position.set(0,0,0.055); frame.add(screen);

  const glow=new THREE.PointLight(0xc8e8ff,0.8,6);
  glow.position.set(0,0,0.7); frame.add(glow);

  const labelMesh=new THREE.Mesh(
    new THREE.PlaneGeometry(1.8,0.22),
    new THREE.MeshBasicMaterial({map:makeLabelTex(id),transparent:true,depthWrite:false})
  );
  labelMesh.position.set(0,-0.72,0.06); frame.add(labelMesh);

  g.position.set(pos[0], pos[1]+levelYOffset, pos[2]);
  g.rotation.y=ry;
  return { g, screen, ntex, nctx, id };
}

// ── ALL TVS FLAT ARRAY (updated per level) ────────────────────────────────────
let allTVs = [];

// ── CREATE ONE LEVEL (group + lights + TVs) ───────────────────────────────────
function createLevelGroup(levelIndex){
  const yOff = -levelIndex * LEVEL_DEPTH;
  const group = new THREE.Group();
  group.visible = false; // hidden until needed

  if(glbTemplate){
    const clone = glbTemplate.clone(true);
    clone.traverse(c => { if(c.isMesh){ c.castShadow=true; c.receiveShadow=true; } });
    group.add(clone);
  }

  const lights = [];
  [[0,2.8,0],[10,2.8,-5],[-10,2.8,8],[20,2.8,5],[-20,2.8,-12],
   [5,2.8,25],[0,2.8,-15],[0,2.8,-30],[0,2.8,-45]].forEach(([x,y,z])=>{
    const l = new THREE.PointLight(0xfff5aa, 1.2, 18);
    l.position.set(x, y, z);
    group.add(l); lights.push(l); flickerLights.push(l);
  });

  group.position.y = yOff;
  scene.add(group);

  // TVs for this level — added to scene directly (not inside group)
  // so we can control them separately if needed
  const levelTVs = [];
  WALL_TVS.forEach(t => {
    const tv = buildWallTV(t.id, t.pos, t.ry, yOff);
    tv.g.visible = false;
    scene.add(tv.g);
    levelTVs.push(tv);
  });
  WINDOW_TVS.forEach(t => {
    const tv = buildWindowTV(t.id, t.pos, t.ry, yOff);
    tv.g.visible = false;
    scene.add(tv.g);
    levelTVs.push(tv);
  });

  // Noclip crosses
  const floorY = levelFloorY + yOff + 0.015;
  const positions = (levelIndex === 0) ? LEVEL0_CROSSES : randomNoclipPositions();
  positions.forEach(([x, z]) => {
    const mat = new THREE.MeshStandardMaterial({
      color:0xffffff, emissive:new THREE.Color(0xffffff),
      emissiveIntensity:1.8, roughness:0.5, metalness:0,
    });
    const g2 = new THREE.Group();
    g2.add(new THREE.Mesh(new THREE.BoxGeometry(CROSS_SIZE*2,0.025,0.07), mat));
    g2.add(new THREE.Mesh(new THREE.BoxGeometry(0.07,0.025,CROSS_SIZE*2), mat));
    g2.position.set(x, floorY, z);
    g2.visible = false;
    scene.add(g2);
    noclipZones.push({ x, z, levelIndex, mesh: g2 });
    group.userData.crosses = group.userData.crosses || [];
    group.userData.crosses.push(g2);
  });

  levelGroups[levelIndex] = { group, lights, tvs: levelTVs };
  return levelGroups[levelIndex];
}

// ── SHOW / HIDE A LEVEL ───────────────────────────────────────────────────────
function showLevel(idx){
  if(!levelGroups[idx]) return;
  const { group, tvs } = levelGroups[idx];
  group.visible = true;
  tvs.forEach(tv => { tv.g.visible = true; });
  (group.userData.crosses||[]).forEach(c => { c.visible = true; });
  // Add this level's TVs to the allTVs pool for raycasting/fuzz
  tvs.forEach(tv => { if(!allTVs.find(t=>t===tv)) allTVs.push(tv); });
}

function hideLevel(idx){
  if(!levelGroups[idx]) return;
  const { group, tvs } = levelGroups[idx];
  group.visible = false;
  tvs.forEach(tv => { tv.g.visible = false; });
  (group.userData.crosses||[]).forEach(c => { c.visible = false; });
}

// ── TRIGGER FALL ─────────────────────────────────────────────────────────────
function triggerFall(){
  if(isFalling || isRecovering) return;
  isFalling    = true;
  tumblePhase  = 0;

  // Play scream
  try { screamAudio.currentTime=0; screamAudio.play().catch(()=>{}); } catch(e){}

  const nextIdx = currentLevel + 1;
  const targetFloorY = levelFloorY - nextIdx * LEVEL_DEPTH;

  window._fallTarget   = targetFloorY + EYE_HEIGHT;
  window._fallVelocity = 0;

  // Hide current level immediately (we're falling away from it)
  hideLevel(currentLevel);

  // Pre-create next level hidden, and the one after silently
  if(!levelGroups[nextIdx]) createLevelGroup(nextIdx);
  if(!levelGroups[nextIdx+1]) createLevelGroup(nextIdx+1);

  // Show destination mid-fall — scheduled
  window._fallNextIdx = nextIdx;
  window._fallShowScheduled = false;

  currentLevel = nextIdx;
}

// ── GLB LOAD ─────────────────────────────────────────────────────────────────
const draco=new DRACOLoader();
draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
const loader=new GLTFLoader(); loader.setDRACOLoader(draco);
loader.load(GLB_URL,
  gltf => {
    glbTemplate = gltf.scene;
    glbTemplate.traverse(c => { if(c.isMesh){ c.castShadow=true; c.receiveShadow=true; } });

    const box = new THREE.Box3().setFromObject(glbTemplate);
    const center = new THREE.Vector3(); box.getCenter(center);
    levelFloorY = box.min.y;
    camera.position.set(center.x, levelFloorY + EYE_HEIGHT, center.z);

    // Collect collision meshes from template
    glbTemplate.traverse(c => { if(c.isMesh) collisionMeshes.push(c); });

    // Create & show level 0
    createLevelGroup(0);
    // Also add the raw GLB to level 0 group (the actual original, not clone)
    levelGroups[0].group.add(glbTemplate);
    showLevel(0);

    // Pre-create level 1 hidden (instant clone, no download)
    setTimeout(()=>{ if(!levelGroups[1]) createLevelGroup(1); }, 3000);

    barEl.style.width='100%'; pctEl.textContent='100%';
    onGLBReady();
  },
  ev => {
    const fakeP=Math.min(95,Math.round((ev.loaded/1048576)/150*100));
    barEl.style.width=fakeP+'%'; pctEl.textContent=fakeP+'%';
  },
  () => enterGame()
);

// ── INPUT ────────────────────────────────────────────────────────────────────
const keys = new Set();
document.addEventListener('keydown', e => {
  keys.add(e.code);
  if(e.code==='Escape') popupEl.style.display='none';
  if(e.code==='Backquote'){ showCoords=!showCoords; coordsEl.style.display=showCoords?'block':'none'; }
});
document.addEventListener('keyup', e => keys.delete(e.code));

// ── MOBILE JOYSTICKS ─────────────────────────────────────────────────────────
const joyL  = { dx:0, dz:0 };
const joyR  = { dx:0, dy:0 };

function setupJoystick(el, knob, isRight){
  let active=false, startX=0, startY=0, id=-1;
  const R=55; // max radius

  function onStart(e){
    e.preventDefault();
    const t=e.changedTouches[0]; id=t.identifier;
    startX=t.clientX; startY=t.clientY; active=true;
  }
  function onMove(e){
    e.preventDefault();
    if(!active) return;
    let t=null;
    for(const touch of e.changedTouches){ if(touch.identifier===id){ t=touch; break; } }
    if(!t) return;
    const dx=Math.max(-R,Math.min(R, t.clientX-startX));
    const dy=Math.max(-R,Math.min(R, t.clientY-startY));
    knob.style.transform=`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    if(isRight){ joyR.dx=dx/R; joyR.dy=dy/R; }
    else        { joyL.dx=dx/R; joyL.dz=dy/R; }
  }
  function onEnd(e){
    for(const t of e.changedTouches){ if(t.identifier===id){ active=false; id=-1; break; } }
    if(!active){
      knob.style.transform='translate(-50%,-50%)';
      if(isRight){ joyR.dx=0; joyR.dy=0; }
      else        { joyL.dx=0; joyL.dz=0; }
    }
  }
  el.addEventListener('touchstart',  onStart, {passive:false});
  el.addEventListener('touchmove',   onMove,  {passive:false});
  el.addEventListener('touchend',    onEnd,   {passive:false});
  el.addEventListener('touchcancel', onEnd,   {passive:false});
}

setupJoystick(document.getElementById('joystick-left'),  document.getElementById('knob-left'),  false);
setupJoystick(document.getElementById('joystick-right'), document.getElementById('knob-right'), true);

// Right joystick applies to camera yaw/pitch when pointer NOT locked
let lastJoyRUpdate = 0;
function applyRightJoystick(dt){
  if(Math.abs(joyR.dx)<0.05 && Math.abs(joyR.dy)<0.05) return;
  // Rotate camera euler directly
  camera.rotation.order='YXZ';
  camera.rotation.y -= joyR.dx * dt * 2.2;
  camera.rotation.x -= joyR.dy * dt * 1.6;
  camera.rotation.x = Math.max(-Math.PI/2+0.05, Math.min(Math.PI/2-0.05, camera.rotation.x));
}

// ── TV CLICK ─────────────────────────────────────────────────────────────────
const ray=new THREE.Raycaster();
document.addEventListener('click',()=>{
  if(!controls.isLocked) return;
  ray.setFromCamera(new THREE.Vector2(0,0), camera);
  const meshes=[];
  allTVs.forEach(tv=>tv.g.traverse(c=>{ if(c.isMesh) meshes.push(c); }));
  const hits=ray.intersectObjects(meshes,true);
  if(hits.length && hits[0].distance<7){
    for(const tv of allTVs){
      let found=false;
      tv.g.traverse(c=>{ if(c===hits[0].object) found=true; });
      if(found){
        const ytId=TV_IDS[tv.id]||'PLACEHOLDER';
        tvIdLabel.textContent=tv.id;
        tvLinkEl.innerHTML=ytId.startsWith('PLACEHOLDER')
          ? `<span style="opacity:.6;font-size:13px">YouTube link not set yet — ${tv.id}</span>`
          : `<a href="https://www.youtube.com/watch?v=${ytId}" target="_blank">▶ Open Video</a>`;
        popupEl.style.display='flex';
        break;
      }
    }
  }
});

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  composer.setSize(innerWidth,innerHeight);
});

// ── ANIMATE ───────────────────────────────────────────────────────────────────
let nf=0, ft=0, prevT=performance.now();

function animate(t){
  requestAnimationFrame(animate);
  const dt=Math.min((t-prevT)/1000,.05); prevT=t;

  // ── FALL ──────────────────────────────────────────────────────────────────
  if(isFalling){
    window._fallVelocity=(window._fallVelocity||0)+28*dt;
    camera.position.y-=window._fallVelocity*dt;

    // Tumble: pitch and roll so player catches glimpses of building
    tumblePhase+=dt;
    camera.rotation.order='YXZ';
    // Pitch forward (see above → see below over ~1.5 sec)
    camera.rotation.x=Math.sin(tumblePhase*1.2)*0.9;
    // Slight roll wobble
    camera.rotation.z=Math.sin(tumblePhase*2.3)*0.25;

    // Show destination level mid-fall (after ~0.5s)
    if(!window._fallShowScheduled && tumblePhase > 0.5){
      window._fallShowScheduled=true;
      showLevel(window._fallNextIdx);
    }

    // Land
    if(camera.position.y<=window._fallTarget){
      camera.position.y=window._fallTarget-(EYE_HEIGHT-0.45);
      isFalling=false; isRecovering=true;
      recoverStart=t; recoverFrom=camera.position.y;
      window._fallVelocity=0;
      camera.rotation.x=0; camera.rotation.z=0;
    }
    composer.render(); return;
  }

  // ── RECOVERY ──────────────────────────────────────────────────────────────
  if(isRecovering){
    const elapsed=(t-recoverStart)/1000;
    const progress=Math.min(elapsed/2.5,1);
    const targetY=levelFloorY-currentLevel*LEVEL_DEPTH+EYE_HEIGHT;
    camera.position.y=recoverFrom+(targetY-recoverFrom)*(1-Math.pow(1-progress,3));
    const wobbleFade=1-progress;
    camera.rotation.z=Math.sin(t*0.012)*0.08*wobbleFade;
    camera.rotation.x+=Math.sin(t*0.009)*0.003*wobbleFade;
    if(progress>=1){ isRecovering=false; camera.rotation.z=0; }
    composer.render(); return;
  }

  // ── NORMAL MOVEMENT ───────────────────────────────────────────────────────
  if(controls.isLocked || (Math.abs(joyL.dx)>0.05 || Math.abs(joyL.dz)>0.05)){
    const spd=(keys.has('ShiftLeft')||keys.has('ShiftRight'))?10:4;

    // Build desired move vector
    const fwd=new THREE.Vector3();
    camera.getWorldDirection(fwd); fwd.y=0; fwd.normalize();
    const right=new THREE.Vector3();
    right.crossVectors(fwd, new THREE.Vector3(0,1,0)).normalize();

    // WASD
    const dFwd = ((keys.has('KeyW')||keys.has('ArrowUp'))?1:0) - ((keys.has('KeyS')||keys.has('ArrowDown'))?1:0);
    const dRight= ((keys.has('KeyD')||keys.has('ArrowRight'))?1:0) - ((keys.has('KeyA')||keys.has('ArrowLeft'))?1:0);

    // Joystick left
    const jFwd = -joyL.dz;
    const jRight= joyL.dx;

    const totalFwd  = dFwd  + jFwd;
    const totalRight= dRight+ jRight;

    if(Math.abs(totalFwd)>0.01 || Math.abs(totalRight)>0.01){
      const move=new THREE.Vector3();
      move.addScaledVector(fwd,   totalFwd  * spd * dt);
      move.addScaledVector(right, totalRight* spd * dt);

      const newPos=camera.position.clone().add(move);
      newPos.y = camera.position.y; // keep at eye height for collision check

      if(canMoveTo(newPos)){
        camera.position.x=newPos.x;
        camera.position.z=newPos.z;
      } else {
        // Try sliding: X only
        const posX=camera.position.clone(); posX.x=newPos.x;
        if(canMoveTo(posX)) camera.position.x=newPos.x;
        // Try sliding: Z only
        const posZ=camera.position.clone(); posZ.z=newPos.z;
        if(canMoveTo(posZ)) camera.position.z=newPos.z;
      }
    }

    // Right joystick look (mobile)
    applyRightJoystick(dt);

    // Smooth vertical to floor
    const targetY=levelFloorY-currentLevel*LEVEL_DEPTH+EYE_HEIGHT;
    camera.position.y+=(targetY-camera.position.y)*Math.min(dt*12,1);

    // Noclip check
    const px=camera.position.x, pz=camera.position.z;
    for(const zone of noclipZones){
      if(zone.levelIndex===currentLevel){
        const dx=px-zone.x, dz=pz-zone.z;
        if(Math.sqrt(dx*dx+dz*dz)<NOCLIP_RADIUS){ triggerFall(); break; }
      }
    }
  }

  // Fuzz TVs
  if(++nf%3===0){
    allTVs.forEach((tv,i)=>{
      if(tv.id==='W1a') return; // video texture — skip fuzz
      if(nf%(3+(i%3))===0){
        const d=tv.nctx.createImageData(128,72);
        for(let j=0;j<d.data.length;j+=4){
          const v=Math.random()*255|0;
          d.data[j]=v; d.data[j+1]=v; d.data[j+2]=v+20|0; d.data[j+3]=255;
        }
        tv.nctx.putImageData(d,0,0);
        tv.ntex.needsUpdate=true;
      }
    });
  }

  // Flicker lights
  ft+=dt;
  if(ft>.08+Math.random()*.12){
    ft=0;
    flickerLights.forEach(l=>{
      if(Math.random()<.08){
        l.intensity=0;
        setTimeout(()=>{ l.intensity=.8+Math.random()*.8; },60+Math.random()*80);
      }
    });
  }

  if(showCoords){
    coordsEl.textContent=`X: ${camera.position.x.toFixed(2)}  Y: ${camera.position.y.toFixed(2)}  Z: ${camera.position.z.toFixed(2)}  LVL: ${currentLevel}`;
  }

  composer.render();
}
animate(0);

window._cam=camera;
console.log('Tip: window._cam.position — Press ~ for coord overlay');

// ── VHS ROLLING LINES ─────────────────────────────────────────────────────────
const vhsCanvas=document.getElementById('vhs-roll');
const vhsCtx=vhsCanvas.getContext('2d');
let vhsRolls=[];
function resizeVHS(){ vhsCanvas.width=window.innerWidth; vhsCanvas.height=window.innerHeight; }
resizeVHS(); window.addEventListener('resize',resizeVHS);
function spawnVHSRoll(n=1){
  for(let i=0;i<n;i++) vhsRolls.push({y:Math.random()*vhsCanvas.height,speed:1.5+Math.random()*2,h:6+Math.random()*10,alpha:0.18+Math.random()*0.22});
}
let vhsActive=false;
function drawVHS(){
  vhsCtx.clearRect(0,0,vhsCanvas.width,vhsCanvas.height);
  if(!vhsActive) return;
  vhsRolls=vhsRolls.filter(r=>r.y<vhsCanvas.height+20);
  vhsRolls.forEach(r=>{ r.y+=r.speed; vhsCtx.fillStyle=`rgba(255,255,220,${r.alpha})`; vhsCtx.fillRect(0,r.y,vhsCanvas.width,r.h); });
  requestAnimationFrame(drawVHS);
}
function startVHS(){ vhsActive=true; drawVHS(); }
function stopVHS(){ vhsActive=false; vhsCtx.clearRect(0,0,vhsCanvas.width,vhsCanvas.height); }

// ── LOADING / TITLE SEQUENCE ─────────────────────────────────────────────────
const line1El=document.getElementById('title-line1');
const line2El=document.getElementById('title-line2');
const skipBtn=document.getElementById('skip-btn');
const listenBtn=document.getElementById('listen-btn');
const playBtn=document.getElementById('play-btn');
const introVideo=document.getElementById('intro-video');
let glbLoaded=false;

function enterGame(){
  const loadEl=document.getElementById('loading');
  loadEl.style.transition='opacity 0.8s';
  loadEl.style.opacity='0';
  setTimeout(()=>{ loadEl.style.display='none'; overlayEl.style.display='flex'; },800);
}

function onGLBReady(){
  glbLoaded=true;
  skipBtn.style.display='block';
  setTimeout(()=>{ skipBtn.style.opacity='1'; },50);
}

skipBtn.addEventListener('click',enterGame);

function toggleMute(){ introVideo.muted=!introVideo.muted; listenBtn.textContent=introVideo.muted?'\ud83d\udd07 LISTEN IN':'\ud83d\udd0a MUTE'; }
listenBtn.addEventListener('click',toggleMute);

function startVideo(){
  introVideo.muted=false;
  introVideo.play().catch(()=>{ introVideo.muted=true; introVideo.play(); });
  playBtn.style.transition='opacity 0.5s'; playBtn.style.opacity='0';
  setTimeout(()=>{ playBtn.style.display='none'; },500);
  listenBtn.style.display='block'; listenBtn.textContent='\ud83d\udd0a MUTE';
  runTitleSequence();
}
playBtn.addEventListener('click',startVideo);
introVideo.addEventListener('ended',enterGame);

function showCard(l1,l2,rolls,delay){
  return new Promise(res=>{
    setTimeout(()=>{
      spawnVHSRoll(rolls);
      line1El.textContent=l1; line2El.textContent=l2||'';
      line1El.style.opacity='1'; line2El.style.opacity=l2?'1':'0';
      setTimeout(()=>{ line1El.style.opacity='0'; line2El.style.opacity='0'; setTimeout(res,1000); },2800);
    },delay);
  });
}

async function runTitleSequence(){
  await new Promise(r=>setTimeout(r,1200));
  startVHS();
  await showCard('Brought to you by','Kaeso Heius Totus',1,0);
  await showCard('and Earthling Official','',0,400);
  await showCard('In association with','Kaeso Heius Totus Films',2,400);
  await showCard('and caricapu9','',1,400);
  await showCard('An Earthling Production','',0,400);
  await showCard('GO DEAN!','',3,400);
  stopVHS();
}
