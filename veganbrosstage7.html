<style>

html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Space Mono',monospace;color:#dfe8f0;}

#topbar{position:absolute;top:0;left:0;right:0;padding:10px 16px;display:flex;justify-content:space-between;align-items:flex-start;

#level-badge{position:absolute;bottom:60px;right:14px;font-family:'Space Mono';font-size:9px;letter-spacing:0.2em;

/* CROSSHAIR */
#crosshair{position:absolute;left:50%;top:50%;width:14px;height:14px;transform:translate(-50%,-50%);opacity:0.4;}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,200,100,0.5);}
#crosshair::before{left:50%;top:0;width:1px;height:100%;transform:translateX(-50%);}
#crosshair::after{top:50%;left:0;height:1px;width:100%;transform:translateY(-50%);}

#jumpscare.flash{animation:jumpFlash 0.35s forwards;}
@keyframes jumpFlash{0%{opacity:0.9;}100%{opacity:0;}}

 background:rgba(255,200,80,0.03);border:1px solid rgba(255,200,80,0.1);pointer-events:all;touch-action:none;}
#joyL{left:16px;}#joyR{right:16px;}
.knob{position:absolute;top:50%;left:50%;width:34px;height:34px;border-radius:50%;
 background:rgba(255,200,80,0.12);transform:translate(-50%,-50%);}
#interact-btn{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);
 width:50px;height:50px;border-radius:50%;background:rgba(200,150,42,0.12);border:1px solid rgba(200,150,42,0.2);
 pointer-events:all;display:flex;align-items:center;justify-content:center;font-size:9px;letter-spacing:0.15em;
 color:rgba(200,150,42,0.5);font-family:'Space Mono';}

/* SANITY DISTORT */
@keyframes sanityShake{0%,100%{transform:none;}25%{transform:translateX(-2px) rotate(-0.3deg);}75%{transform:translateX(2px) rotate(0.3deg);}}

<script type="module">
import * as THREE from 'three';

/* =========================================================
   GO DEAN — STAGE 7: THE ABATTOIR PYRAMID
   Three levels. No way out but through.
   ========================================================= */

// ─── CONTENT ────────────────────────────────────────────
const OPENING = [
  { kicker:"Stage Seven", line:`The pyramid is older than the word for what happens inside it. <span class="em">Dean doesn't know how he got here.</span> Stone. Heat. A smell he recognises but refuses to name.` },
  { kicker:"Stage Seven", line:`The walls are covered in markings. He thinks they are ancient. Then he looks closer. <span class="red">He can almost read them.</span>` },
  { kicker:"Stage Seven", line:`There is a child who posted photographs. <span class="em">Dead animals for reactions.</span> Meat-mojing, they called it. Dead-animal iconography, when I named it honestly. The child laughed.` },
  { kicker:"Stage Seven", line:`The child is somewhere in this pyramid. So is everything they celebrated. <span class="em">Find the seven torches.</span> There is no other light. There is no other way.` },

const ENDING = [
  { kicker:"", line:`The seventh torch. He had to kneel for it. The flame went out in his hand and the pyramid went dark.` },
  { kicker:"", line:`He could hear his own breathing. He could hear something else breathing further away. <span class="em">Neither of them moved.</span>` },
  { kicker:"", line:`He wasn't there yet. He knew that. But something had cracked open inside him and <span class="red">he couldn't close it again.</span>` },
  { kicker:"", line:`<span class="em">He would carry it now. Whether he wanted to or not.</span>` },
  { kicker:"To be continued", line:`<span class="em">Stage Eight awaits.</span>` },
];

// ALL WALL STATEMENTS — every original + new ones
const WALL_TEXTS_L1 = [ // Level 1 — stone/hieroglyph (rendered as hieroglyphs that dissolve)
  "friends not food",
  "I see their eyes watching me, haunting me",

const WALL_TEXTS_L2 = [ // Level 2 — industrial abattoir
  "there's a link between slaughterhouse work and domestic violence",
  "your fish died? so what",
  "the exploitation of animals was used as a blueprint by Davenport, Laughlin and the Nazis — eugenics paperwork came from animal pedigrees first",

  "the cute ones live. who taught you that rule.",

];

const CHAR_QUOTES = [
  { who:"DITCHIUS MAXIMUS GRIFTUS", q:"I'll buy 100kg of meat to let it rot and upset a vegan." },
  { who:"DITCHIUS MAXIMUS GRIFTUS", q:"I'll buy a lamb and slit its throat on live." },
  { who:"DITCHIUS MAXIMUS GRIFTUS", q:"If you're vegan, odds on you're a they/them." },
  { who:"TULLI CONTENTUS", q:"I don't kill animals for clicks. Well — it worked, didn't it." },
  { who:"TULLI CONTENTUS", q:"I missed filming some of the kill. I wanted to ask if he could start again." },
  { who:"WAYNUS COUCHDWELIUS", q:"Plants have a heart and a nervous system. And things." },

  { who:"DEAN WITHERS", q:"I'd do anything for a Hello Fresh sponsorship." },
  { who:"DEAN WITHERS", q:"Vegans are the upper echelon." },
  { who:"DEAN WITHERS", q:"If you don't let me speak I won't go vegan." },
];

const WHISPER_LINES = [
  "I see their eyes watching me",
  "I wanted to live",
  "they call me crazy",
  "I am not crazy",
  "the cute ones live",
  "don't make me do it again",
  "every excuse you have, they had it too",
  "give one of them a name",
  "Please no Meat-mojing",
  "the kid is still in here",
  "you already know",
  "the receipt is the confession",
  "I wanted to live",
  "please",
];

// ─── RENDERER ───────────────────────────────────────────
const canvas = document.getElementById('gl');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: false, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = false;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x1a1008, 0.055);
scene.background = new THREE.Color(0x1a1008);
const camera = new THREE.PerspectiveCamera(78, innerWidth/innerHeight, 0.04, 80);

// ─── AUDIO ──────────────────────────────────────────────
let AC=null, master=null, ambientGain=null, sfxGain=null, audioStarted=false;
function initAudio(){
  if(AC) return;
  try{ AC=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){ return; }
  master=AC.createGain(); master.gain.value=0.82; master.connect(AC.destination);
  ambientGain=AC.createGain(); ambientGain.gain.value=0; ambientGain.connect(master);
  sfxGain=AC.createGain(); sfxGain.gain.value=0.75; sfxGain.connect(master);
}
function unlockAudio(){ if(!AC) initAudio(); if(AC&&AC.state==='suspended') AC.resume(); }

function startAmbient(level){
  if(!AC) return;
  audioStarted=true;
  // Stop old nodes by ramping gain
  ambientGain.gain.cancelScheduledValues(AC.currentTime);
  ambientGain.gain.setValueAtTime(ambientGain.gain.value, AC.currentTime);
  ambientGain.gain.linearRampToValueAtTime(0, AC.currentTime+1.5);

  setTimeout(()=>{
    // New ambient node graph
    const newGain=AC.createGain(); newGain.gain.value=0; newGain.connect(master);

    if(level===1){
      // Stone pyramid: low sub bass, distant wind, reverb-ish pad
      const sub=AC.createOscillator(); sub.type='sine'; sub.frequency.value=28;
      const subG=AC.createGain(); subG.gain.value=0.12;
      sub.connect(subG); subG.connect(newGain); sub.start();

      const wind=AC.createOscillator(); wind.type='sawtooth'; wind.frequency.value=55;
      const wf=AC.createBiquadFilter(); wf.type='lowpass'; wf.frequency.value=120;
      const wg=AC.createGain(); wg.gain.value=0.04;
      wind.connect(wf); wf.connect(wg); wg.connect(newGain); wind.start();

      const pad=AC.createOscillator(); pad.type='triangle'; pad.frequency.value=82;
      const pLFO=AC.createOscillator(); pLFO.frequency.value=0.02;
      const pLG=AC.createGain(); pLG.gain.value=0.03;
      const pG=AC.createGain(); pG.gain.value=0.05;
      pLFO.connect(pLG); pLG.connect(pG.gain); pad.connect(pG); pG.connect(newGain);
      pad.start(); pLFO.start();

    } else if(level===2){
      // Industrial: low mechanical hum, distant metal impacts, higher tension
      const hum=AC.createOscillator(); hum.type='sawtooth'; hum.frequency.value=60;
      const hf=AC.createBiquadFilter(); hf.type='lowpass'; hf.frequency.value=180;
      const hg=AC.createGain(); hg.gain.value=0.025;
      hum.connect(hf); hf.connect(hg); hg.connect(newGain); hum.start();

      const drone=AC.createOscillator(); drone.type='sine'; drone.frequency.value=38;
      const dg=AC.createGain(); dg.gain.value=0.1;
      drone.connect(dg); dg.connect(newGain); drone.start();

      const high=AC.createOscillator(); high.type='triangle'; high.frequency.value=220;
      const highLFO=AC.createOscillator(); highLFO.frequency.value=0.07;
      const highLG=AC.createGain(); highLG.gain.value=0.018;
      const highG=AC.createGain(); highG.gain.value=0.02;
      highLFO.connect(highLG); highLG.connect(highG.gain); high.connect(highG); highG.connect(newGain);
      high.start(); highLFO.start();

    } else {
      // Backrooms: fluorescent buzz, deep drone, unease
      const hum=AC.createOscillator(); hum.type='sawtooth'; hum.frequency.value=60;
      const hf=AC.createBiquadFilter(); hf.type='lowpass'; hf.frequency.value=200;
      const hg=AC.createGain(); hg.gain.value=0.018;
      hum.connect(hf); hf.connect(hg); hg.connect(newGain); hum.start();

      const drone=AC.createOscillator(); drone.type='sine'; drone.frequency.value=48;
      const dg=AC.createGain(); dg.gain.value=0.07;
      drone.connect(dg); dg.connect(newGain); drone.start();

      const choir=AC.createOscillator(); choir.type='triangle'; choir.frequency.value=110;
      const cLFO=AC.createOscillator(); cLFO.frequency.value=0.04;
      const cLG=AC.createGain(); cLG.gain.value=0.04;
      const cG=AC.createGain(); cG.gain.value=0.0;
      cLFO.connect(cLG); cLG.connect(cG.gain); choir.connect(cG); cG.connect(newGain);
      choir.start(); cLFO.start();
    }

    ambientGain=newGain;
    ambientGain.gain.linearRampToValueAtTime(0.85, AC.currentTime+4);
  }, 1600);
}

function tone(f,type,dur,vol,slide=0){
  if(!AC) return;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type; o.frequency.setValueAtTime(f,AC.currentTime);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(1,f+slide),AC.currentTime+dur);
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.connect(g); g.connect(sfxGain); o.start(); o.stop(AC.currentTime+dur);
}
function noise(dur,vol,freq){
  if(!AC) return;
  const len=Math.floor(AC.sampleRate*dur), buf=AC.createBuffer(1,len,AC.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
  const src=AC.createBufferSource(); src.buffer=buf;
  const f=AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=freq||1000;
  const g=AC.createGain(); g.gain.value=vol;
  src.connect(f); f.connect(g); g.connect(sfxGain); src.start();
}
const sfx={
  torch(){ tone(220,'sine',0.6,0.15,80); tone(330,'sine',0.8,0.1,100); noise(0.3,0.06,800); },
  footstep(){ noise(0.08,0.12,250); },
  shadow(){ tone(80,'sine',1.8,0.22,-40); tone(55,'sine',2.2,0.15,-20); noise(0.5,0.12,200); },
  jumpscare(){ noise(0.15,0.9,8000); tone(60,'sawtooth',0.3,0.5); tone(110,'square',0.25,0.4); },
  chain(){ for(let i=0;i<5;i++) setTimeout(()=>{ noise(0.05,0.14,5000); tone(1600+Math.random()*900,'triangle',0.06,0.07); },i*55); },
  stoneStep(){ noise(0.12,0.2,150); tone(40,'sine',0.3,0.12); },
  distant(){ tone(55,'sine',3,0.08,-10); },
  hiero(){ tone(528,'sine',1.2,0.12,50); tone(396,'sine',0.8,0.08,30); noise(0.4,0.04,2000); },
  ui(){ tone(440,'sine',0.08,0.06); },
  end(){ tone(220,'sine',2,0.2,80); tone(330,'sine',2.5,0.14,100); tone(165,'sine',3,0.12,-20); },
  moo(){ tone(100,'sine',1.5,0.15,-40); tone(70,'sine',2,0.1,-25); },
  flick(){ noise(0.05,0.1,2500); tone(60,'square',0.1,0.06); },
};

// ─── MAZE DEFINITIONS ──────────────────────────────────
// Level 1: Ground floor pyramid corridors (stone)  — wide, some extremely long
// Level 2: Mid-level industrial abattoir
// Level 3: Upper level backrooms (yellow wallpaper)
// Each level: 32x32, 1=wall, 0=floor, wide corridors (2-cell wide halls)

const GRID = 32;

function buildPyramidLevel1(){
  const M=new Array(GRID*GRID).fill(1);
  function carve(x,y,w,h){ for(let j=0;j<h;j++) for(let i=0;i<w;i++){ const gx=x+i, gy=y+j; if(gx>0&&gx<GRID-1&&gy>0&&gy<GRID-1) M[gy*GRID+gx]=0; } }
  // Main long corridors (2-wide each, some spanning whole map)
  carve(2,2,28,2);   // Top corridor — full width
  carve(2,28,28,2);  // Bottom corridor — full width
  carve(2,2,2,28);   // Left corridor — full height
  carve(28,2,2,28);  // Right corridor — full height
  // Cross corridors

  carve(14,14,4,4); // center always open

function buildPyramidLevel2(){
  const M=new Array(GRID*GRID).fill(1);
  function carve(x,y,w,h){ for(let j=0;j<h;j++) for(let i=0;i<w;i++){ const gx=x+i, gy=y+j; if(gx>0&&gx<GRID-1&&gy>0&&gy<GRID-1) M[gy*GRID+gx]=0; } }
  // Industrial layout — long drain channels, processing rooms
  carve(2,2,28,3);   // Wide top
  carve(2,27,28,3);  // Wide bottom
  carve(2,2,3,28);   // Wide left
  carve(27,2,3,28);  // Wide right
  // Processing rooms
  carve(6,6,8,6);    carve(18,6,8,6);
  carve(6,20,8,6);   carve(18,20,8,6);
  // Drain corridor (very long, very wide)
  carve(2,14,28,4);  // Long central corridor
  carve(13,2,6,28);  // Long vertical
  // Sub-rooms
  carve(5,10,4,4);   carve(23,10,4,4);
  carve(5,18,4,4);   carve(23,18,4,4);
  carve(10,5,5,4);   carve(10,23,5,4);
  carve(17,5,5,4);   carve(17,23,5,4);
  carve(14,14,4,4);
  return M;
}

function buildPyramidLevel3(){
  const M=new Array(GRID*GRID).fill(1);
  function carve(x,y,w,h){ for(let j=0;j<h;j++) for(let i=0;i<w;i++){ const gx=x+i, gy=y+j; if(gx>0&&gx<GRID-1&&gy>0&&gy<GRID-1) M[gy*GRID+gx]=0; } }
  // Backrooms — endless-feeling corridors, some extremely long
  carve(2,2,28,2);   carve(2,28,28,2);
  carve(2,2,2,28);   carve(28,2,2,28);
  carve(2,9,28,2);   carve(2,18,28,2);
  carve(9,2,2,28);   carve(18,2,2,28);
  // Rooms
  carve(4,4,6,6);    carve(22,4,6,6);
  carve(4,22,6,6);   carve(22,22,6,6);
  carve(11,11,10,10);

  carve(6,13,4,3);   carve(22,13,4,3);

}

// Wall writing texture
function writingTex(text, style, forHiero=false){
  const c=document.createElement('canvas'); c.width=1024; c.height=256; const x=c.getContext('2d');
  x.clearRect(0,0,1024,256);
  if(forHiero){
    // Draw as if carved into stone — gold/amber
    x.font="italic 52px 'Cormorant Garamond', serif";
    x.fillStyle='rgba(200,160,60,0.9)';
    x.shadowColor='rgba(200,150,50,0.5)'; x.shadowBlur=15;
  } else if(style==='glow'){
    x.font="italic 54px 'Cormorant Garamond', serif";
    x.fillStyle='rgba(230,180,80,0.95)';
    x.shadowColor='rgba(220,160,60,1)'; x.shadowBlur=18;
  } else if(style==='scratch'){
    x.font="42px 'Permanent Marker', sans-serif";
    x.fillStyle='rgba(200,30,30,0.92)';
    x.shadowColor='rgba(160,15,15,0.6)'; x.shadowBlur=4;
  } else if(style==='typed'){
    x.font="36px 'Special Elite', monospace";
    x.fillStyle='rgba(35,25,12,0.9)';
  } else {
    x.font="46px 'Special Elite', monospace";
    x.fillStyle='rgba(70,25,12,0.88)';
    x.shadowColor='rgba(35,8,3,0.7)'; x.shadowBlur=7;
  }
  x.textAlign='center'; x.textBaseline='middle';
  const words=text.split(' '); const lines=[]; let line='';
  for(const w of words){ const t=line?line+' '+w:w; if(x.measureText(t).width>940&&line){lines.push(line);line=w;}else line=t; }
  if(line) lines.push(line);
  const lh=forHiero?60:50;
  const start=128-(lines.length-1)*lh/2;
  lines.forEach((l,i)=> x.fillText(l,512,start+i*lh));
  const t=new THREE.CanvasTexture(c); return t;
}

// Hieroglyph texture — abstract carved symbols
function hieroglyphTex(seed){
  const c=document.createElement('canvas'); c.width=512; c.height=256; const x=c.getContext('2d');
  x.fillStyle='rgba(45,32,15,0.92)'; x.fillRect(0,0,512,256);
  // border
  x.strokeStyle='rgba(180,140,60,0.4)'; x.lineWidth=2; x.strokeRect(4,4,504,248);
  // procedural symbols based on seed
  const rng=(n)=>{ let s=seed+n; s=Math.sin(s)*43758.5453; return s-Math.floor(s); };
  const symbols=['|','—','△','○','□','⊕','⊗','☥','𓂀','𓆣','𓏏','𓅓'];
  x.fillStyle='rgba(190,145,55,0.75)'; x.font='26px serif'; x.textAlign='center'; x.textBaseline='middle';
  let px=40;
  for(let i=0;i<10;i++){
    const sym=symbols[Math.floor(rng(i*7)*symbols.length)];
    x.fillText(sym, px, 80+(rng(i*3)-0.5)*40); px+=42+rng(i*5)*20;
    // small sub-symbol
    x.font='16px serif'; x.fillText(symbols[Math.floor(rng(i*11)*symbols.length)], px-20, 140+rng(i*9)*30);
    x.font='26px serif';
  }
  const t=new THREE.CanvasTexture(c); return t;
}

  // Instanced wall rendering for performance
  let wallCount=0;
  for(let i=0;i<map.length;i++) if(map[i]===1) wallCount++;
  const wallMesh = new THREE.InstancedMesh(wallGeo, cfg.wallMat, wallCount);
  wallMesh.receiveShadow=false; wallMesh.castShadow=false;
  const dummy = new THREE.Object3D();
  let wi=0;
  for(let z=0;z<GRID;z++) for(let x=0;x<GRID;x++){
    if(map[z*GRID+x]===1){
      dummy.position.set(x+0.5, ceilH/2, z+0.5);
      dummy.updateMatrix(); wallMesh.setMatrixAt(wi++,dummy.matrix);
      // Record wall face positions for decals
      [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dx,dz])=>{
        if(cellAt(map,x+dx,z+dz)===0) wallPositions.push({wx:x+0.5,wz:z+0.5,dx,dz});
      });
    }
  }
  wallMesh.instanceMatrix.needsUpdate=true;
  grp.add(wallMesh);

  // Floor & Ceiling
  const floor=new THREE.Mesh(new THREE.PlaneGeometry(GRID,GRID),cfg.floorMat);
  floor.rotation.x=-Math.PI/2; floor.position.set(GRID/2,0,GRID/2); grp.add(floor);
  const ceil=new THREE.Mesh(new THREE.PlaneGeometry(GRID,GRID),cfg.ceilMat);
  ceil.rotation.x=Math.PI/2; ceil.position.set(GRID/2,ceilH,GRID/2); grp.add(ceil);

  // Ambient light for level
  const ambient=new THREE.AmbientLight(cfg.ambientColor, cfg.ambientInt);
  grp.add(ambient);

  // Lights
  const lightData=[];
  function placeLight(x,z,lv){
    let lightColor, lightInt, lightDist;
    if(lv===1){ lightColor=0xd08020; lightInt=1.6; lightDist=9; }
    else if(lv===2){ lightColor=0xff2200; lightInt=0.9; lightDist=7; }
    else { lightColor=0xffe2a0; lightInt=1.2; lightDist=7; }
    const light=new THREE.PointLight(lightColor, lightInt, lightDist, 1.8);
    light.position.set(x, ceilH-0.4, z); grp.add(light);

    if(lv===3){
      // Fluorescent strip mesh
      const m=new THREE.Mesh(new THREE.BoxGeometry(0.85,0.05,0.16),
        new THREE.MeshStandardMaterial({color:0xffeec8,emissive:0xffe2a0,emissiveIntensity:1.4,roughness:0.4}));
      m.position.set(x,ceilH-0.03,z); grp.add(m);
      lightData.push({light,mesh:m,baseI:lightInt,baseEm:1.4,state:'on',t:Math.random()*200,dead:Math.random()<0.06,isFluorescent:true});
    } else if(lv===1){
      // Torch bracket mesh
      const torchM=new THREE.Sprite(new THREE.SpriteMaterial({map:torchTex(),transparent:true,depthWrite:false}));
      torchM.scale.set(0.25,0.75,1); torchM.position.set(x,ceilH-1,z); grp.add(torchM);
      lightData.push({light,mesh:torchM,baseI:lightInt,state:'on',t:Math.random()*100,flicker:true,isFluorescent:false});
    } else {
      // Industrial red lamp
      const lampM=new THREE.Mesh(new THREE.SphereGeometry(0.08,8,6),
        new THREE.MeshStandardMaterial({color:0xff2200,emissive:0xff1100,emissiveIntensity:2,roughness:0.4}));
      lampM.position.set(x,ceilH-0.1,z); grp.add(lampM);
      lightData.push({light,mesh:lampM,baseI:lightInt,state:'on',t:Math.random()*80,flicker:true,isFluorescent:false});
    }
  }
  const spacing = lv===3 ? 4 : lv===2 ? 5 : 6;
  for(let z=2;z<GRID-1;z+=spacing) for(let x=2;x<GRID-1;x+=spacing){
    if(cellAt(map,x+0.5,z+0.5)===0) placeLight(x+0.5,z+0.5,lv);
  }

  // Wall decals
  function placeWallDecal(tex, opts={}){
    if(wallPositions.length===0) return null;
    // Try multiple spots until we find one in a wide-open corridor
    for(let attempt=0;attempt<15;attempt++){
      const wp=wallPositions[Math.floor(Math.random()*wallPositions.length)];
      // Check corridor width — ensure at least 2 cells clear perpendicular
      const perpX=wp.dz, perpZ=wp.dx;
      const clearA=!solidAt(map,wp.wx-wp.dx*1+perpX, wp.wz-wp.dz*1+perpZ);
      const clearB=!solidAt(map,wp.wx-wp.dx*1-perpX, wp.wz-wp.dz*1-perpZ);
      if(!clearA&&!clearB) continue;
      const w=opts.w||1.4, h=opts.h||0.32;
      const geo=new THREE.PlaneGeometry(w,h);
      const mat=new THREE.MeshBasicMaterial({map:tex,transparent:true,depthWrite:false,opacity:opts.opacity||0.92});
      const m=new THREE.Mesh(geo,mat);
      const offset=0.501;
      m.position.set(
        wp.wx-wp.dx*offset+wp.dx*0.001, opts.y||1.5,
        wp.wz-wp.dz*offset+wp.dz*0.001
      );
      if(wp.dx===1) m.rotation.y=-Math.PI/2;
      else if(wp.dx===-1) m.rotation.y=Math.PI/2;
      else if(wp.dz===-1) m.rotation.y=Math.PI;
      grp.add(m);
      return m;
    }
    return null;
  }

  // Hiero panels (level 1) or wall writing
  const hieroData=[]; // { mesh, revealTex, revealed, pos }
  if(cfg.isHiero){
    cfg.wallTexts.forEach((text,i)=>{
      const htex=hieroglyphTex(i*7+lv*13);
      const revealTex=writingTex(text,'glow',true);
      const w=text.length>50?2.6:(text.length>28?2.0:1.5);
      const m=placeWallDecal(htex,{w,h:w*0.22,y:1.4+(Math.random()-0.5)*0.5,opacity:0.88});
      if(m){ hieroData.push({mesh:m,revealTex,revealed:false,pos:m.position.clone(),origText:text}); }
    });
  } else {
    cfg.wallTexts.forEach((text,i)=>{
      const style=['glow','scratch','typed','smeared'][i%4];
      const tex=writingTex(text,style);
      const w=text.length>60?2.6:(text.length>30?2.0:1.5);
      placeWallDecal(tex,{w,h:w*0.22,y:1.3+(Math.random()-0.5)*0.5,opacity:style==='glow'?0.98:0.88});
    });
  }

  // Character quotes
  CHAR_QUOTES.forEach((q,i)=>{
    const c=document.createElement('canvas'); c.width=1024; c.height=384; const x=c.getContext('2d');
    x.clearRect(0,0,1024,384);
    x.fillStyle='rgba(220,170,70,0.95)'; x.shadowColor='rgba(200,150,50,1)'; x.shadowBlur=14;
    x.font="italic 42px 'Cormorant Garamond', serif"; x.textAlign='center'; x.textBaseline='middle';
    const words=q.q.split(' '); const lines=[]; let line='';
    for(const w of words){ const t=line?line+' '+w:w; if(x.measureText(t).width>940&&line){lines.push(line);line=w;}else line=t; }
    if(line) lines.push(line);
    const lh=52, start=145-(lines.length-1)*lh/2;
    lines.forEach((l,k)=> x.fillText('"'+l+'"',512,start+k*lh));
    x.shadowBlur=0; x.font="bold 20px 'Space Mono',monospace"; x.fillStyle='rgba(180,140,60,0.82)';
    x.fillText('— '+q.who,512,318);
    const tex=new THREE.CanvasTexture(c);
    placeWallDecal(tex,{w:2.8,h:1.1,y:1.6,opacity:0.95});
  });

  // Iconography photos
  for(let i=0;i<12;i++) placeWallDecal(iconographyTex(i),{w:0.65,h:0.65,y:1.4+(Math.random()-0.5)*0.4,opacity:0.88});

  // Stains on floor (L2 only — blood pools)
  if(lv===2){
    const stainMat=new THREE.MeshBasicMaterial({color:0x3a0000,transparent:true,opacity:0.7,depthWrite:false});
    const openCells=[];
    for(let z=1;z<GRID-1;z++) for(let x=1;x<GRID-1;x++) if(map[z*GRID+x]===0) openCells.push([x,z]);
    for(let i=0;i<80;i++){
      const c=openCells[Math.floor(Math.random()*openCells.length)]; if(!c) continue;
      const geo=new THREE.CircleGeometry(0.1+Math.random()*0.3,8);
      const m=new THREE.Mesh(geo,stainMat); m.rotation.x=-Math.PI/2;
      m.position.set(c[0]+0.5+(Math.random()-0.5)*0.8,0.01,c[1]+0.5+(Math.random()-0.5)*0.8);
      grp.add(m);
    }
  }

  // Staircase arrows (visual markers)
  if(lv===1||lv===2){
    // Down stair marker in center
    const arrowGeo=new THREE.ConeGeometry(0.15,0.4,6);
    const arrowMat=new THREE.MeshStandardMaterial({color:0xffa020,emissive:0xff8000,emissiveIntensity:1.2});
    const arrow=new THREE.Mesh(arrowGeo,arrowMat);
    arrow.rotation.x=Math.PI; arrow.position.set(GRID/2+0.5,0.4,GRID/2+0.5); grp.add(arrow);
    grp.add(new THREE.PointLight(0xff8020,1.5,3,2));
    levelGroups[lv].children[levelGroups[lv].children.length-1].position.set(GRID/2+0.5,1,GRID/2+0.5);
  }

  // Collect open cells for torches and shadow figure
  const openCells=[];
  for(let z=2;z<GRID-2;z++) for(let x=2;x<GRID-2;x++) if(map[z*GRID+x]===0) openCells.push([x,z]);

  levelData[lv]={ map, cfg, ceilH, lightData, hieroData, wallPositions, openCells, grp };
}

// ─── TORCHES (7 to find, spread across all levels) ───────
let torchesCollected=0;
const allTorches=[];
function placeTorches(){
  // Place torches: 2 on L1, 2 on L2, 3 on L3
  const dist=[{lv:1,n:2},{lv:2,n:2},{lv:3,n:3}];
  dist.forEach(({lv,n})=>{
    const map=MAPS[lv-1];
    const ceilH=CEIL_H[lv];
    const grp=levelGroups[lv];
    // Gather far cells
    const cands=[];
    for(let z=4;z<GRID-4;z++) for(let x=4;x<GRID-4;x++){
      if(map[z*GRID+x]===0){
        const d=Math.hypot(x-16,z-16); if(d>5) cands.push([x,z,d]);
      }
    }
    cands.sort((a,b)=>(b[2]+Math.random())-(a[2]+Math.random()));
    const placed=[];
    for(const c of cands){
      if(placed.length>=n) break;
      if(placed.every(p=>Math.hypot(p[0]-c[0],p[1]-c[1])>5)) placed.push(c);
    }
    placed.forEach(([x,z])=>{
      const mat=new THREE.SpriteMaterial({map:torchTex(),transparent:true,depthWrite:false});
      const sprite=new THREE.Sprite(mat);
      sprite.scale.set(0.35,1.0,1); sprite.position.set(x+0.5,1.2,z+0.5);
      grp.add(sprite);
      const light=new THREE.PointLight(0xff9020,2.0,5,1.8);
      light.position.set(x+0.5,1.5,z+0.5); grp.add(light);
      const halo=new THREE.Mesh(
        new THREE.SphereGeometry(0.4,12,8),
        new THREE.MeshBasicMaterial({color:0xff8010,transparent:true,opacity:0.12,depthWrite:false})
      );
      halo.position.set(x+0.5,1.3,z+0.5); grp.add(halo);
      allTorches.push({sprite,light,halo,collected:false,baseY:1.2,phase:Math.random()*7,lv,x:x+0.5,z:z+0.5});
    });
  });
}

function runStory(seq, after){

  $('hud').classList.remove('on'); $('touch').classList.remove('on');
  $('story').classList.add('on'); showFrame();

function showFrame(){
  const f=storyQ[storyP];
  const k=$('storyKicker'), l=$('storyLine'), a=$('storyAttrib'), p=$('storyPrompt');
  k.style.opacity=l.style.opacity=a.style.opacity=p.style.opacity=0;
  k.className='kicker'; l.className='line'; a.className='attrib';
  k.innerHTML=f.kicker||''; l.innerHTML=f.line||''; a.innerHTML=f.attrib||'';
  void k.offsetWidth;
  if(f.kicker) k.classList.add('fadein');
  l.classList.add('fadein-slow');
  if(f.attrib) a.classList.add('fadein');

// ─── LEVEL TRANSITION ───────────────────────────────────
function setLevel(lv){
  // Hide all
  for(let i=1;i<=3;i++) if(levelGroups[i]) levelGroups[i].visible=false;
  currentLevel=lv;
  // Ensure built
  buildLevel(lv);
  levelGroups[lv].visible=true;
  const cfg=getLevelConfig(lv);
  scene.fog=new THREE.FogExp2(cfg.fogColor, cfg.fogDensity);
  scene.background=new THREE.Color(cfg.fogColor);
  $('levelBadge').textContent=cfg.name;
  // Move player to center of level
  cam.x=GRID/2+0.5; cam.z=GRID/2+0.5;
  // Move shadow figure to this level
  if(shadowFig.sprite){
    const ld=levelData[lv];
    if(ld){
      const c=ld.openCells[Math.floor(Math.random()*ld.openCells.length)];
      if(c){ shadowFig.x=c[0]+0.5; shadowFig.z=c[1]+0.5; }
    }
    // Reparent shadow to new group
    if(shadowFig.grp) { shadowFig.grp.remove(shadowFig.sprite); shadowFig.grp.remove(shadowFig.light); }
    levelGroups[lv].add(shadowFig.sprite); levelGroups[lv].add(shadowFig.light);
    shadowFig.grp=levelGroups[lv]; shadowFig.lv=lv;
    shadowFig.moveTo(shadowFig.x, shadowFig.z);
    shadowFig.hide();
  }
  startAmbient(lv);
}

function tryDescend(){
  if(currentLevel<3){
    phase='transitioning';
    $('flicker').style.opacity='1';
    setTimeout(()=>{
      setLevel(currentLevel+1);
      $('flicker').style.opacity='0';
      phase='play';
      setObjective(`Deeper. Find the torches. ${7-torchesCollected} remain.`);
    },800);
  }
}
function tryAscend(){
  if(currentLevel>1){
    phase='transitioning';
    $('flicker').style.opacity='1';
    setTimeout(()=>{
      setLevel(currentLevel-1);
      $('flicker').style.opacity='0';
      phase='play';
    },800);
  }
}

// Joysticks
function joystick(el,knob,state){
  let id=-1,cx=0,cy=0; const MAX=40;
  el.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];id=t.identifier;const r=el.getBoundingClientRect();cx=r.left+r.width/2;cy=r.top+r.height/2;},{passive:false});
  el.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches){if(t.identifier===id){let dx=t.clientX-cx,dy=t.clientY-cy,d=Math.hypot(dx,dy);if(d>MAX){dx=dx/d*MAX;dy=dy/d*MAX;}knob.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;state.x=dx/MAX;state.y=dy/MAX;}}},{passive:false});
  function end(e){for(const t of e.changedTouches){if(t.identifier===id){knob.style.transform='translate(-50%,-50%)';state.x=0;state.y=0;id=-1;}}}
  el.addEventListener('touchend',end);el.addEventListener('touchcancel',end);
}
const jl={x:0,y:0},jr={x:0,y:0};

// ─── INTERACT ───────────────────────────────────────────
function handleInteract(){
  if(hieroNear){
    // Reveal hieroglyph
    hieroNear.mesh.material.map=hieroNear.revealTex;
    hieroNear.mesh.material.needsUpdate=true;
    hieroNear.revealed=true;
    sfx.hiero();
    $('hiero-reveal').textContent=''; // clear any old
    $('hiero-reveal').classList.remove('show');
    setTimeout(()=>{
      const txt=hieroNear.origText||'';
      if(txt){ $('hiero-reveal').textContent=txt; $('hiero-reveal').classList.add('show'); }
      setTimeout(()=>{ $('hiero-reveal').classList.remove('show'); },5000);
    },200);
    return;
  }
  // Check staircase
  const cd=Math.hypot(cam.x-(GRID/2+0.5), cam.z-(GRID/2+0.5));
  if(cd<2.5){
    if(currentLevel<3) tryDescend();
    else if(currentLevel>1) tryAscend();
  }
}

// ─── MOVEMENT ───────────────────────────────────────────
let velX=0,velZ=0;
function move(){
  if(phase!=='play') return;
  const map=MAPS[currentLevel-1];
  let fwd=0,str=0,turn=0;
  if(keys.w||keys.ArrowUp) fwd+=1;
  if(keys.s||keys.ArrowDown) fwd-=1;
  if(keys.a) str-=1;
  if(keys.d) str+=1;
  if(keys.ArrowLeft) turn-=1;
  if(keys.ArrowRight) turn+=1;
  fwd-=jl.y; str+=jl.x; turn+=jr.x;
  cam.angle-=turn*0.038;
  cam.pitch-=jr.y*0.025; cam.pitch=Math.max(-MAX_PITCH,Math.min(MAX_PITCH,cam.pitch));
  const sp=0.082; // faster movement
  const targetVX=(Math.sin(cam.angle)*fwd-Math.cos(cam.angle)*str)*sp;
  const targetVZ=(Math.cos(cam.angle)*fwd+Math.sin(cam.angle)*str)*sp;
  // Smooth acceleration
  velX+=(targetVX-velX)*0.25;
  velZ+=(targetVZ-velZ)*0.25;
  const margin=0.32;
  if(!solidAt(map,cam.x+velX+Math.sign(velX)*margin,cam.z)) cam.x+=velX;
  else velX=0;
  if(!solidAt(map,cam.x,cam.z+velZ+Math.sign(velZ)*margin)) cam.z+=velZ;
  else velZ=0;
  // Head bob
  const speed=Math.hypot(velX,velZ);
  if(speed>0.005){
    cam.y=1.65+Math.sin(performance.now()*0.008)*0.028*Math.min(1,speed/0.06);
    footstepTimer--;
    if(footstepTimer<=0){
      if(currentLevel===2) sfx.chain(); else if(currentLevel===1) sfx.stoneStep(); else sfx.footstep();
      footstepTimer=22+Math.floor(Math.random()*10);
    }
  }
}

// ─── ORB / TORCH COLLECTION ─────────────────────────────
function checkTorches(){
  for(const t of allTorches){
    if(t.collected||t.lv!==currentLevel) continue;
    const d=Math.hypot(t.x-cam.x,t.z-cam.z);
    if(d<0.85){
      t.collected=true; torchesCollected++;
      t.sprite.visible=false; t.light.intensity=0; t.halo.visible=false;
      sfx.torch(); updateHUD();
      if(torchesCollected===1) whisperLine("the first torch. the darkness doesn't care.");
      else if(torchesCollected===7){ setTimeout(endGame,1400); return; }
      else setObjective(`${7-torchesCollected} torches remain. Keep descending.`);
    }
  }
}

// ─── SHADOW FIGURE LOGIC ────────────────────────────────
function updateShadow(){
  if(!shadowFig.sprite||shadowFig.lv!==currentLevel) return;
  const dx=shadowFig.x-cam.x, dz=shadowFig.z-cam.z;
  const dist=Math.hypot(dx,dz);
  const fwdX=Math.sin(cam.angle), fwdZ=Math.cos(cam.angle);
  const dot=(dx*fwdX+dz*fwdZ)/Math.max(0.1,dist);
  const looking=dot>0.75&&dist<14;
  const veryClose=dist<2.5;
  shadowPeekCooldown=Math.max(0,shadowPeekCooldown-1);

  if(veryClose&&looking&&jumpscareReady){
    // JUMPSCARE
    jumpscareReady=false;
    sfx.jumpscare();
    $('jumpscare').classList.remove('flash');
    void $('jumpscare').offsetWidth;
    $('jumpscare').classList.add('flash');
    sanity=Math.max(0,sanity-18);
    hp=Math.max(0,hp-8);
    updateHUD();
    shadowFig.hide();
    // Teleport shadow far away
    const ld=levelData[currentLevel];
    if(ld){
      const c=ld.openCells[Math.floor(Math.random()*ld.openCells.length)];
      if(c) shadowFig.moveTo(c[0]+0.5,c[1]+0.5);
    }
    setTimeout(()=>{ jumpscareReady=true; },12000);
    return;
  }

  if(looking&&dist<12){
    // Looking at it — it slowly retreats around corner
    shadowFig.sprite.material.opacity=Math.max(0,shadowFig.sprite.material.opacity-0.04);
    if(shadowFig.sprite.material.opacity<=0){
      shadowFig.hide();
      // Reappear behind player
      const ld=levelData[currentLevel];
      if(ld&&shadowPeekCooldown<=0){
        const map=MAPS[currentLevel-1];
        // Find cell behind player
        const bx=cam.x-Math.sin(cam.angle)*8, bz=cam.z-Math.cos(cam.angle)*8;
        const c=ld.openCells.reduce((best,cc)=>{
          const d=Math.hypot(cc[0]-bx,cc[1]-bz); return d<best.d?{c:cc,d}:best;
        },{c:null,d:9999});
        if(c.c) shadowFig.moveTo(c.c[0]+0.5,c.c[1]+0.5);
        shadowPeekCooldown=200+Math.random()*400;
      }
    }
    sanity=Math.max(0,sanity-0.06);
  } else if(!looking&&dist<18&&shadowPeekCooldown<=0){
    // Not looking — peek
    if(dist>5){
      shadowFig.show(0.6+Math.random()*0.25);
      sfx.shadow();
      shadowPeekCooldown=80+Math.random()*120;
    }
  } else if(dist>18||looking){
    // Far or seen — wander
    if(Math.random()<0.002&&shadowPeekCooldown<=0){
      const ld=levelData[currentLevel];
      if(ld){
        const c=ld.openCells[Math.floor(Math.random()*ld.openCells.length)];
        if(c&&Math.hypot(c[0]+0.5-cam.x,c[1]+0.5-cam.z)>6) shadowFig.moveTo(c[0]+0.5,c[1]+0.5);
      }
    }
  }
  nearShadow=dist<4;
}

// ─── HIEROGLYPH PROXIMITY ───────────────────────────────
function checkHiero(){
  const ld=levelData[currentLevel];
  if(!ld||!ld.hieroData||ld.hieroData.length===0){ hieroNear=null; $('interact').classList.remove('show'); return; }
  let closest=null, closestD=2.2;
  for(const h of ld.hieroData){
    if(h.revealed) continue;
    const d=Math.hypot(h.pos.x-cam.x,h.pos.z-cam.z);
    if(d<closestD){ closestD=d; closest=h; }
  }
  if(closest!==hieroNear){
    hieroNear=closest;
    if(closest){ $('interact').classList.add('show'); interactReady=true; }
    else { $('interact').classList.remove('show'); interactReady=false; }
  }
  // Check staircase proximity
  const cd=Math.hypot(cam.x-(GRID/2+0.5),cam.z-(GRID/2+0.5));
  if(cd<2.5&&currentLevel<3){ $('interact').classList.add('show'); $('interact').textContent='[ E ] Descend'; interactReady=true; }
  else if(cd<2.5&&currentLevel>1){ $('interact').classList.add('show'); $('interact').textContent='[ E ] Ascend'; interactReady=true; }
  else if(!closest){ $('interact').textContent='[ E ] Examine'; }
}

// ─── WHISPER ────────────────────────────────────────────
function whisperLine(text,attrib){
  const el=$('whisper');
  el.innerHTML=text+(attrib?`<span class="attr">— ${attrib}</span>`:'');
  el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
}

// ─── LIGHT FLICKER ──────────────────────────────────────
function updateLights(){
  const ld=levelData[currentLevel];
  if(!ld) return;
  for(const f of ld.lightData){
    if(!f.isFluorescent){
      // Torch / lamp flicker — subtle
      f.t--;
      if(f.t<=0){
        const r=Math.random();
        f.light.intensity=f.baseI*(0.75+r*0.5);
        f.t=5+Math.floor(Math.random()*20);
      }
    } else {
      // Fluorescent
      f.t--;
      if(f.t<=0){
        if(f.dead){ f.light.intensity=0; f.mesh.material.emissiveIntensity=0.04; continue; }
        if(f.state==='on'&&Math.random()<0.15){ f.state='flicker'; f.t=3+Math.floor(Math.random()*10); sfx.flick(); }
        else if(f.state==='flicker'){ f.state='on'; f.t=100+Math.floor(Math.random()*200); }
        else { f.t=100; }
      }
      if(f.state==='flicker'){
        const on=Math.random()<0.45;
        f.light.intensity=on?f.baseI*1.4:0;
        f.mesh.material.emissiveIntensity=on?f.baseEm*1.5:0.08;
      } else {
        f.light.intensity=f.baseI;
        f.mesh.material.emissiveIntensity=f.baseEm||1.4;
      }
    }
  }
}

// ─── TORCH ANIMATION ────────────────────────────────────
function updateTorches(t){
  for(const o of allTorches){
    if(o.collected||o.lv!==currentLevel) continue;
    o.phase+=0.05;
    o.sprite.position.y=o.baseY+Math.sin(o.phase)*0.06;
    o.light.intensity=1.8+Math.sin(o.phase*1.4)*0.6;
    o.halo.material.opacity=0.1+Math.sin(o.phase*1.4)*0.04;
  }
}

// ─── SANITY EFFECTS ─────────────────────────────────────
function updateSanity(){
  sanity=Math.max(0,sanity-0.004);
  if(nearShadow) sanity=Math.max(0,sanity-0.08);
  const bv=$('blood-vignette');
  if(sanity<40){
    const r=Math.floor((40-sanity)*2.5);
    bv.style.background=`radial-gradient(ellipse at center,transparent 40%,rgba(${r},0,0,${(40-sanity)/200}) 100%)`;
    if(sanity<20&&Math.random()<0.001){
      camera.fov=78+(20-sanity)*0.2+Math.sin(performance.now()/180)*2;
      camera.updateProjectionMatrix();
    }
  } else {
    bv.style.background='radial-gradient(ellipse at center,transparent 40%,rgba(120,0,0,0.0) 100%)';
    camera.fov=78; camera.updateProjectionMatrix();
  }
}

// ─── MAIN LOOP ───────────────────────────────────────────

let last=performance.now();
function loop(){
  requestAnimationFrame(loop);
  const now=performance.now(); const dt=Math.min(40,now-last); last=now;

  if(phase==='play'){
    move(); checkTorches(); updateShadow(); checkHiero();
    updateTorches(now); updateLights(); updateSanity();

    // Ambient audio events
    nextMoo--; if(nextMoo<=0){ sfx.moo(); nextMoo=1400+Math.random()*2000; }
    nextChain--; if(nextChain<=0){ sfx.chain(); nextChain=2200+Math.random()*3000; }
    nextDistant--; if(nextDistant<=0){ sfx.distant(); nextDistant=800+Math.random()*1200; }

    // Whispers
    whisperTimer--; if(whisperTimer<=0){
      whisperLine(WHISPER_LINES[Math.floor(Math.random()*WHISPER_LINES.length)]);
      whisperTimer=450+Math.floor(Math.random()*650);
    }

    // Global screen flicker
    if(Math.random()<0.002){
      const f=$('flicker'); f.style.opacity=String(0.5+Math.random()*0.3);
      setTimeout(()=>f.style.opacity='0', 40+Math.random()*100);
    }
  }

  // Camera
  camera.position.set(cam.x,cam.y,cam.z);
  const ld2=Math.cos(cam.pitch);
  camera.lookAt(cam.x+Math.sin(cam.angle)*ld2, cam.y+Math.sin(cam.pitch), cam.z+Math.cos(cam.angle)*ld2);
  renderer.render(scene,camera);
}
loop();

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
