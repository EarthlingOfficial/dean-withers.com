// ─── RENDERER ───────────────────────────────────────────

// ─── AUDIO ──────────────────────────────────────────────
let AC=null, master=null, ambientNode=null, sfxGain=null, audioStarted=false;
function initAudio(){
  if(AC) return;
  try{ AC=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){ return; }
  master=AC.createGain(); master.gain.value=0.82; master.connect(AC.destination);
  sfxGain=AC.createGain(); sfxGain.gain.value=0.75; sfxGain.connect(master);
}
function unlockAudio(){ if(!AC) initAudio(); if(AC&&AC.state==='suspended') AC.resume(); }

let currentAmbientGain=null;
function startAmbient(level){
  if(!AC) return;
  // Fade out old ambient
  if(currentAmbientGain){
    const g=currentAmbientGain;
    g.gain.cancelScheduledValues(AC.currentTime);
    g.gain.setValueAtTime(g.gain.value,AC.currentTime);
    g.gain.linearRampToValueAtTime(0,AC.currentTime+1.2);
  }
  const newGain=AC.createGain(); newGain.gain.value=0; newGain.connect(master);
  currentAmbientGain=newGain;

  const makeOsc=(type,freq,vol,dest)=>{
    const o=AC.createOscillator(),g=AC.createGain();
    o.type=type; o.frequency.value=freq; g.gain.value=vol;
    o.connect(g); g.connect(dest); o.start(); return o;
  };
  const makeFilt=(type,freq,src,dest)=>{
    const f=AC.createBiquadFilter(); f.type=type; f.frequency.value=freq;
    src.connect(f); f.connect(dest); return f;
  };

  if(level===1){
    // Stone pyramid: low sub + warm wind pad
    const sub=makeOsc('sine',28,0,newGain); sub.frequency.value=28;
    const sg=AC.createGain(); sg.gain.value=0.11; sub.connect(sg); sg.connect(newGain);
    const pad=makeOsc('triangle',82,0.05,newGain);
    const lfo=makeOsc('sine',0.018,0,null);
    const lg=AC.createGain(); lg.gain.value=0.032;
    lfo.connect(lg); lg.connect(AC.createGain()); // just run the lfo
    makeOsc('sawtooth',55,0,null); // wind tone through filter

    const wf=AC.createBiquadFilter(); wf.type='lowpass'; wf.frequency.value=110;
    const wg=AC.createGain(); wg.gain.value=0.035;
    wOsc.connect(wf); wf.connect(wg); wg.connect(newGain);
  } else if(level===2){

    const hg=AC.createGain(); hg.gain.value=0.022;

    const cLFO=AC.createOscillator(); cLFO.frequency.value=0.04; cLFO.start();

    cLFO.connect(cLG); cLG.connect(cG.gain); choir.connect(cG); cG.connect(newGain); choir.start();
  }

function tone(f,type,dur,vol,slide=0){
  if(!AC) return;
  const o=AC.createOscillator(),g=AC.createGain();
  o.type=type; o.frequency.setValueAtTime(f,AC.currentTime);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(1,f+slide),AC.currentTime+dur);
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.connect(g); g.connect(sfxGain); o.start(); o.stop(AC.currentTime+dur);
}
function noise(dur,vol,freq){
  if(!AC) return;
  const len=Math.floor(AC.sampleRate*dur),buf=AC.createBuffer(1,len,AC.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
  const src=AC.createBufferSource(); src.buffer=buf;
  const f=AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=freq||1000;
  const g=AC.createGain(); g.gain.value=vol;
  src.connect(f); f.connect(g); g.connect(sfxGain); src.start();
}

function cellAt(map,x,z){ const gx=Math.floor(x),gz=Math.floor(z); if(gx<0||gx>=GRID||gz<0||gz>=GRID) return 1; return map[gz*GRID+gx]; }

// Writing texture — auto-sizes height to text length so decal can stay narrow
function writingTex(text,style,forHiero=false){
  // pre-measure to decide canvas aspect
  const isShort = text.length<=24;
  const isMedium = text.length<=60;
  const cw = 512;
  const ch = isShort ? 256 : isMedium ? 384 : 512;
  const c=document.createElement('canvas'); c.width=cw; c.height=ch; const x=c.getContext('2d');
  x.clearRect(0,0,cw,ch);
  if(forHiero||style==='glow'){ x.font="italic 44px 'Cormorant Garamond',serif"; x.fillStyle='rgba(210,170,70,0.96)'; x.shadowColor='rgba(200,150,50,0.6)'; x.shadowBlur=14; }
  else if(style==='scratch'){ x.font="38px 'Permanent Marker',sans-serif"; x.fillStyle='rgba(210,40,40,0.94)'; x.shadowColor='rgba(160,15,15,0.55)'; x.shadowBlur=4; }
  else if(style==='typed'){ x.font="30px 'Special Elite',monospace"; x.fillStyle='rgba(40,28,14,0.92)'; }
  else { x.font="36px 'Special Elite',monospace"; x.fillStyle='rgba(85,30,15,0.9)'; x.shadowColor='rgba(35,8,3,0.65)'; x.shadowBlur=6; }
  x.textAlign='center'; x.textBaseline='middle';
  const maxW = cw - 40;
  const words=text.split(' '); const lines=[]; let line='';
  for(const w of words){ const t=line?line+' '+w:w; if(x.measureText(t).width>maxW&&line){lines.push(line);line=w;}else line=t; }
  if(line) lines.push(line);
  const lh = parseInt(x.font, 10) * 1.15;
  const start = ch/2 - (lines.length-1)*lh/2;
  lines.forEach((l,i)=> x.fillText(l, cw/2, start+i*lh));
  return new THREE.CanvasTexture(c);
}

function hieroglyphTex(seed){
  const c=document.createElement('canvas'); c.width=512; c.height=256; const x=c.getContext('2d');
  x.fillStyle='rgba(45,32,15,0.9)'; x.fillRect(0,0,512,256);
  x.strokeStyle='rgba(180,140,60,0.4)'; x.lineWidth=2; x.strokeRect(4,4,504,248);
  const rng=(n)=>{ let s=seed+n; s=Math.sin(s)*43758.5453; return s-Math.floor(s); };
  const symbols=['|','—','△','○','□','⊕','⊗','☥','𓂀','𓆣','𓏏','𓅓'];
  x.fillStyle='rgba(190,145,55,0.75)'; x.font='26px serif'; x.textAlign='center'; x.textBaseline='middle';
  let px=40;
  for(let i=0;i<10;i++){
    const sym=symbols[Math.floor(rng(i*7)*symbols.length)];
    x.fillText(sym,px,80+(rng(i*3)-0.5)*40); px+=42+rng(i*5)*20;
    x.font='16px serif'; x.fillText(symbols[Math.floor(rng(i*11)*symbols.length)],px-20,140+rng(i*9)*30);
    x.font='26px serif';
  }
  return new THREE.CanvasTexture(c);
}

// Blood-smeared obscured texture for L2 — looks like writing but illegible
function smearedTex(seed){
  const c=document.createElement('canvas'); c.width=512; c.height=512; const x=c.getContext('2d');
  x.fillStyle='rgba(20,4,4,0.85)'; x.fillRect(0,0,512,512);
  const rng=(n)=>{ let s=seed+n*13; s=Math.sin(s)*43758.5453; return s-Math.floor(s); };
  // streaks
  for(let i=0;i<8;i++){
    const sy=80+i*50+rng(i)*15;
    const grd=x.createLinearGradient(40,sy,470,sy);
    grd.addColorStop(0,'rgba(140,20,20,0)');
    grd.addColorStop(0.3,`rgba(${100+rng(i+1)*60},${15+rng(i+2)*15},15,${0.5+rng(i+3)*0.3})`);
    grd.addColorStop(0.8,`rgba(${80+rng(i+4)*40},10,10,${0.4+rng(i+5)*0.3})`);
    grd.addColorStop(1,'rgba(60,5,5,0)');
    x.fillStyle=grd;
    x.fillRect(40,sy-12,430,18+rng(i+6)*8);
  }
  // smudges suggesting words
  for(let i=0;i<40;i++){
    x.fillStyle=`rgba(${150+rng(i*7)*50},${20+rng(i*9)*20},20,${0.4+rng(i*11)*0.4})`;
    const cx=60+rng(i*3)*400, cy=70+rng(i*5)*380, w=8+rng(i*13)*20, h=4+rng(i*17)*6;
    x.fillRect(cx,cy,w,h);
  }
  // drips
  for(let i=0;i<12;i++){
    const dx=60+rng(i*23)*420, dy=60+rng(i*29)*100;
    x.fillStyle='rgba(80,10,10,0.6)';
    x.fillRect(dx,dy,3,40+rng(i*31)*60);
  }
  return new THREE.CanvasTexture(c);
}

// Faded wallpaper text for L3 — looks like writing barely visible through grime
function fadedTex(seed){
  const c=document.createElement('canvas'); c.width=512; c.height=512; const x=c.getContext('2d');
  x.fillStyle='rgba(140,108,50,0.45)'; x.fillRect(0,0,512,512);
  const rng=(n)=>{ let s=seed+n*17; s=Math.sin(s)*43758.5453; return s-Math.floor(s); };
  // suggestion of scratched/faded writing — illegible shapes
  for(let i=0;i<10;i++){
    const sy=80+i*40+rng(i)*15;
    x.strokeStyle=`rgba(60,40,15,${0.3+rng(i+1)*0.25})`;
    x.lineWidth=2+rng(i+2)*2;
    x.beginPath();
    let px2=50+rng(i+3)*20;
    x.moveTo(px2,sy);
    for(let j=0;j<8;j++){
      px2+=30+rng(i*10+j)*40;
      const yj=sy+(rng(i*20+j)-0.5)*12;
      x.lineTo(px2,yj);

    x.stroke();
  }
  // grime on top
  for(let i=0;i<60;i++){
    x.fillStyle=`rgba(${40+rng(i*3)*30},${25+rng(i*5)*20},10,${0.2+rng(i*7)*0.3})`;

  }
  return new THREE.CanvasTexture(c);
}

  x.fillStyle='rgba(180,160,120,0.4)'; x.font='bold 10px monospace'; x.textAlign='right'; x.fillText(`@meat_${95+idx*11}`,242,242);
  x.fillStyle='rgba(200,180,140,0.35)'; x.font='9px monospace'; x.textAlign='left'; x.fillText('❤ 2.1k  💬 63',14,242);
  return new THREE.CanvasTexture(c);
}

function buildLevel(lv){
  if(levelGroups[lv]) return;
  const cfg=getLevelCfg(lv);
  const map=MAPS[lv-1];
  const ceilH=cfg.ceilH;
  const grp=new THREE.Group();
  scene.add(grp);
  grp.visible=false;
  levelGroups[lv]=grp;

  // Instanced walls
  let wallCount=0;
  const wallPositions=[];
  for(let i=0;i<map.length;i++) if(map[i]===1) wallCount++;
  const wallGeo=new THREE.BoxGeometry(1,ceilH,1);
  const wallMesh=new THREE.InstancedMesh(wallGeo,cfg.wallMat,wallCount);
  const dummy=new THREE.Object3D();
  let wi=0;
  for(let z=0;z<GRID;z++) for(let x=0;x<GRID;x++){
    if(map[z*GRID+x]===1){
      dummy.position.set(x+0.5,ceilH/2,z+0.5);
      dummy.updateMatrix(); wallMesh.setMatrixAt(wi++,dummy.matrix);
      [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dx,dz])=>{
        if(cellAt(map,x+dx,z+dz)===0) wallPositions.push({wx:x+0.5,wz:z+0.5,dx,dz});
      });
    }
  }
  wallMesh.instanceMatrix.needsUpdate=true;
  grp.add(wallMesh);

  // Floor & Ceiling
  const floor=new THREE.Mesh(new THREE.PlaneGeometry(GRID,GRID),cfg.floorMat);
  floor.rotation.x=-Math.PI/2; floor.position.set(GRID/2,0,GRID/2); grp.add(floor);
  const ceil=new THREE.Mesh(new THREE.PlaneGeometry(GRID,GRID),cfg.ceilMat);
  ceil.rotation.x=Math.PI/2; ceil.position.set(GRID/2,ceilH,GRID/2); grp.add(ceil);

  // Ambient
  const ambient=new THREE.AmbientLight(cfg.ambientColor,cfg.ambientInt); grp.add(ambient);

  // Lights — ceiling mounted, no wall brackets
  const lightData=[];
  const spacing=lv===3?4:lv===2?5:6;
  for(let z=2;z<GRID-1;z+=spacing) for(let x=2;x<GRID-1;x+=spacing){
    if(cellAt(map,x+0.5,z+0.5)===0){
      const light=new THREE.PointLight(cfg.lightColor,cfg.lightInt,cfg.lightDist,1.8);
      light.position.set(x+0.5,ceilH-0.35,z+0.5); grp.add(light);

      if(lv===1){
        // L1: ceiling ember — small glowing disc, no wall brackets
        const emberMat=new THREE.MeshStandardMaterial({color:0xff9020,emissive:0xff7010,emissiveIntensity:2.0,roughness:0.4});
        const ember=new THREE.Mesh(new THREE.CircleGeometry(0.06,8),emberMat);
        ember.rotation.x=Math.PI/2; ember.position.set(x+0.5,ceilH-0.02,z+0.5); grp.add(ember);
        // Small flame sprite hanging from ceiling
        const flameMat=new THREE.SpriteMaterial({map:torchFlameSprite(),transparent:true,depthWrite:false});
        const flame=new THREE.Sprite(flameMat); flame.scale.set(0.2,0.55,1);
        flame.position.set(x+0.5,ceilH-0.6,z+0.5); grp.add(flame);
        lightData.push({light,mesh:ember,flame,baseI:cfg.lightInt,t:Math.floor(Math.random()*15),flicker:true,isFluorescent:false});
      } else if(lv===2){
        // L2: industrial red lamp
        const lampMat=new THREE.MeshStandardMaterial({color:0xff2200,emissive:0xff1100,emissiveIntensity:2.2,roughness:0.4});
        const lamp=new THREE.Mesh(new THREE.SphereGeometry(0.07,8,6),lampMat);
        lamp.position.set(x+0.5,ceilH-0.1,z+0.5); grp.add(lamp);
        lightData.push({light,mesh:lamp,baseI:cfg.lightInt,t:Math.floor(Math.random()*20),flicker:true,isFluorescent:false});
      } else {
        // L3: fluorescent strip — CLAUDE's flicker state machine
        const stripMat=new THREE.MeshStandardMaterial({color:0xffeec8,emissive:0xffe2a0,emissiveIntensity:1.4,roughness:0.4});
        const strip=new THREE.Mesh(new THREE.BoxGeometry(0.85,0.05,0.16),stripMat);
        strip.position.set(x+0.5,ceilH-0.03,z+0.5); grp.add(strip);
        const dead=Math.random()<0.07;
        lightData.push({light,mesh:strip,baseI:cfg.lightInt,baseEm:1.4,state:'on',t:100+Math.floor(Math.random()*200),dead,isFluorescent:true});
      }
    }
  }

  // Blood stains on L2 floor
  if(lv===2){
    const stainMat=new THREE.MeshBasicMaterial({color:0x3a0000,transparent:true,opacity:0.7,depthWrite:false});
    const openCells=[];
    for(let z=1;z<GRID-1;z++) for(let x=1;x<GRID-1;x++) if(map[z*GRID+x]===0) openCells.push([x,z]);
    for(let i=0;i<80;i++){
      const c=openCells[Math.floor(Math.random()*openCells.length)]; if(!c) continue;
      const geo=new THREE.CircleGeometry(0.1+Math.random()*0.3,8);
      const m=new THREE.Mesh(geo,stainMat); m.rotation.x=-Math.PI/2;
      m.position.set(c[0]+0.5+(Math.random()-0.5)*0.8,0.01,c[1]+0.5+(Math.random()-0.5)*0.8);
      grp.add(m);
    }
  }

  // Staircase arrow marker
  if(lv<3){
    const arrowMat=new THREE.MeshStandardMaterial({color:0xffa020,emissive:0xff8000,emissiveIntensity:1.2});
    const arrow=new THREE.Mesh(new THREE.ConeGeometry(0.15,0.4,6),arrowMat);
    arrow.rotation.x=Math.PI; arrow.position.set(GRID/2+0.5,0.4,GRID/2+0.5); grp.add(arrow);
    const stairLight=new THREE.PointLight(0xff8020,1.5,4,2);
    stairLight.position.set(GRID/2+0.5,1.2,GRID/2+0.5); grp.add(stairLight);
  }

  // Wall decals — FIXED: cap width to 0.9 (one wall cell), scale height by text length
  const hieroData=[];
  function placeDecal(tex,opts={}){
    if(!wallPositions.length) return null;
    for(let attempt=0;attempt<25;attempt++){
      const wp=wallPositions[Math.floor(Math.random()*wallPositions.length)];
      // Verify front face is in open corridor (not against another wall)
      const frontClear=!solidAt(map,wp.wx-wp.dx*2,wp.wz-wp.dz*2);
      if(!frontClear) continue;
      const w=Math.min(0.9, opts.w||0.85), h=opts.h||0.4;
      const geo=new THREE.PlaneGeometry(w,h);
      const mat=new THREE.MeshBasicMaterial({map:tex,transparent:true,depthWrite:false,opacity:opts.opacity||0.92});
      const m=new THREE.Mesh(geo,mat);
      m.position.set(
        wp.wx-wp.dx*0.502, opts.y||1.5,
        wp.wz-wp.dz*0.502
      );
      if(wp.dx===1) m.rotation.y=-Math.PI/2;
      else if(wp.dx===-1) m.rotation.y=Math.PI/2;
      else if(wp.dz===-1) m.rotation.y=Math.PI;
      grp.add(m);
      return {mesh:m,pos:m.position.clone()};
    }
    return null;
  }
  // Compute decal height from text length (longer text → taller decal, narrow width)
  function decalSizeFor(text, baseW){
    const len = text.length;
    const w = baseW || 0.88;
    let h;
    if(len <= 24) h = w * 0.45;
    else if(len <= 60) h = w * 0.65;
    else if(len <= 120) h = w * 0.95;
    else h = w * 1.25;
    return {w, h};
  }
  // Random subset selector — different walls each playthrough
  function pickSubset(arr, n){
    const copy = arr.slice();
    for(let i=copy.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [copy[i],copy[j]]=[copy[j],copy[i]]; }
    return copy.slice(0, Math.min(n, copy.length));
  }

  if(cfg.isHiero){
    // L1: pick 10 random hieroglyphs from pool
    const picked = pickSubset(cfg.wallTexts, 10);
    picked.forEach((text,i)=>{
      const htex=hieroglyphTex(i*7+lv*13);
      const revealTex=writingTex(text,'glow',true);
      const sz=decalSizeFor(text);
      const result=placeDecal(htex,{w:sz.w, h:sz.h, y:1.4+(Math.random()-0.5)*0.4, opacity:0.9});
      if(result) hieroData.push({mesh:result.mesh,revealTex,revealed:false,pos:result.pos,origText:text});
    });
  } else if(lv===2){
    // L2: 10 blood-smeared readables — press E to read
    const picked = pickSubset(cfg.wallTexts, 10);
    picked.forEach((text,i)=>{
      const smearTex=smearedTex(i*11+lv*23);
      const revealTex=writingTex(text,'scratch');
      const sz=decalSizeFor(text);
      const result=placeDecal(smearTex,{w:sz.w, h:sz.h, y:1.3+(Math.random()-0.5)*0.45, opacity:0.92});
      if(result) hieroData.push({mesh:result.mesh,revealTex,revealed:false,pos:result.pos,origText:text});
    });
  } else {
    // L3: 10 faded-wallpaper readables — press E to read
    const picked = pickSubset(cfg.wallTexts, 10);
    picked.forEach((text,i)=>{
      const fade=fadedTex(i*13+lv*29);
      const style=['glow','typed','smeared'][i%3];
      const revealTex=writingTex(text,style);
      const sz=decalSizeFor(text);
      const result=placeDecal(fade,{w:sz.w, h:sz.h, y:1.3+(Math.random()-0.5)*0.45, opacity:0.88});
      if(result) hieroData.push({mesh:result.mesh,revealTex,revealed:false,pos:result.pos,origText:text});
    });
  }

  // Character quotes — pick 5 random from pool of 10 per level visit
  const pickedQuotes = pickSubset(CHAR_QUOTES, 5);
  pickedQuotes.forEach((q)=>{
    const c=document.createElement('canvas'); c.width=512; c.height=512; const x=c.getContext('2d');
    x.clearRect(0,0,512,512);
    x.fillStyle='rgba(220,170,70,0.96)'; x.shadowColor='rgba(200,150,50,1)'; x.shadowBlur=12;
    x.font="italic 30px 'Cormorant Garamond',serif"; x.textAlign='center'; x.textBaseline='middle';
    const maxW = 460;
    const words=q.q.split(' '); const lines=[]; let line='';
    for(const w of words){ const t=line?line+' '+w:w; if(x.measureText(t).width>maxW&&line){lines.push(line);line=w;}else line=t; }
    if(line) lines.push(line);
    const lh=38, start=200-(lines.length-1)*lh/2;
    lines.forEach((l,k)=> x.fillText('"'+l+'"',256,start+k*lh));
    x.shadowBlur=0; x.font="bold 16px 'Space Mono',monospace"; x.fillStyle='rgba(180,140,60,0.85)';
    x.fillText('— '+q.who,256,440);
    const tex=new THREE.CanvasTexture(c);
    placeDecal(tex,{w:0.88, h:0.88, y:1.55, opacity:0.95});
  });

  // Iconography photos
  for(let i=0;i<12;i++) placeDecal(iconographyTex(i),{w:0.55,h:0.55,y:1.4+(Math.random()-0.5)*0.4,opacity:0.88});

  // Open cells cache
  const openCells=[];
  for(let z=2;z<GRID-2;z++) for(let x=2;x<GRID-2;x++) if(map[z*GRID+x]===0) openCells.push([x,z]);

  levelData[lv]={map,cfg,ceilH,lightData,hieroData,wallPositions,openCells,grp};
}

// ─── TORCHES (7 across all levels) ───────────────────────
let torchesCollected=0;
const allTorches=[];
function placeTorches(){
  const dist=[{lv:1,n:2},{lv:2,n:2},{lv:3,n:3}];
  dist.forEach(({lv,n})=>{
    const map=MAPS[lv-1];
    const grp=levelGroups[lv];
    const cands=[];
    for(let z=4;z<GRID-4;z++) for(let x=4;x<GRID-4;x++){
      if(map[z*GRID+x]===0){ const d=Math.hypot(x-16,z-16); if(d>5) cands.push([x,z,d]); }
    }
    cands.sort((a,b)=>(b[2]+Math.random()*3)-(a[2]+Math.random()*3));
    const placed=[];
    for(const c of cands){
      if(placed.length>=n) break;
      if(placed.every(p=>Math.hypot(p[0]-c[0],p[1]-c[1])>5)) placed.push(c);
    }
    placed.forEach(([x,z])=>{
      const flameMat=new THREE.SpriteMaterial({map:torchFlameSprite(),transparent:true,depthWrite:false,opacity:0});
      const sprite=new THREE.Sprite(flameMat); sprite.scale.set(0.35,0.9,1);
      sprite.position.set(x+0.5,1.1,z+0.5); sprite.visible=false; grp.add(sprite);
      const light=new THREE.PointLight(0xff9020,0,5.5,1.8);
      light.position.set(x+0.5,1.4,z+0.5); grp.add(light);
      const halo=new THREE.Mesh(new THREE.SphereGeometry(0.45,12,8),
        new THREE.MeshBasicMaterial({color:0xff8010,transparent:true,opacity:0,depthWrite:false}));
      halo.position.set(x+0.5,1.2,z+0.5); halo.visible=false; grp.add(halo);
      allTorches.push({sprite,light,halo,collected:false,unlocked:false,baseY:1.1,phase:Math.random()*7,lv,x:x+0.5,z:z+0.5});
    });
  });
}

// ─── SHADOW FIGURE ──────────────────────────────────────
const shadowFig={
  sprite:null,light:null,grp:null,
  lv:1,x:5,z:5,
  state:'lurking',peekTimer:0,peekCooldown:0,
  show(op=0.7){ if(this.sprite) this.sprite.material.opacity=op; if(this.light) this.light.intensity=0.5; },
  hide(){ if(this.sprite) this.sprite.material.opacity=0; if(this.light) this.light.intensity=0; },
  moveTo(x,z){ this.x=x; this.z=z; if(this.sprite) this.sprite.position.set(x,1.3,z); if(this.light) this.light.position.set(x,1.4,z); },
  init(grp){
    const mat=new THREE.SpriteMaterial({map:shadowFigureTex(),transparent:true,opacity:0,depthWrite:false});
    this.sprite=new THREE.Sprite(mat); this.sprite.scale.set(1.1,2.8,1);
    this.sprite.position.set(this.x,1.3,this.z); grp.add(this.sprite);
    this.light=new THREE.PointLight(0x200010,0,4,2);
    this.light.position.set(this.x,1.4,this.z); grp.add(this.light);
    this.grp=grp;
  },
  reparent(newGrp){
    if(this.grp&&this.sprite){ this.grp.remove(this.sprite); this.grp.remove(this.light); }
    newGrp.add(this.sprite); newGrp.add(this.light);
    this.grp=newGrp;
  },
};

let nextStrobe=1200+Math.random()*2000;
let strobeActive=false;
const strobeEl=document.getElementById('strobe');
function doStrobe(){
  if(currentLevel!==3) return;
  sfx.strobeHit();
  let flashes=0;
  const maxFlashes=3+Math.floor(Math.random()*5);
  function flash(){
    if(flashes>=maxFlashes){ strobeEl.style.opacity='0'; strobeActive=false; return; }
    strobeEl.style.opacity=String(0.5+Math.random()*0.4);
    setTimeout(()=>{
      strobeEl.style.opacity='0';
      flashes++;
      setTimeout(flash,40+Math.random()*120);
    },30+Math.random()*60);
  }
  strobeActive=true; flash();
  nextStrobe=1500+Math.random()*3000;
}

function runStory(seq,after){

  $('story').classList.add('on'); showFrame();

function showFrame(){
  const f=storyQ[storyP];
  const k=$('storyKicker'),l=$('storyLine'),a=$('storyAttrib'),p=$('storyPrompt');
  k.style.opacity=l.style.opacity=a.style.opacity=p.style.opacity=0;
  k.className='kicker'; l.className='line'; a.className='attrib';
  k.innerHTML=f.kicker||''; l.innerHTML=f.line||''; a.innerHTML=f.attrib||'';
  void k.offsetWidth;
  if(f.kicker) k.classList.add('fadein');
  l.classList.add('fadein-slow');
  if(f.attrib) a.classList.add('fadein');
  setTimeout(()=>{ p.style.opacity=0.55; },1600);
}
function advanceStory(){
  storyP++;

  else showFrame();
}

// ─── LEVEL TRANSITION ────────────────────────────────────
function setLevel(lv){
  for(let i=1;i<=3;i++) if(levelGroups[i]) levelGroups[i].visible=false;
  currentLevel=lv;
  buildLevel(lv); // lazy — only builds if not already built
  levelGroups[lv].visible=true;
  const cfg=getLevelCfg(lv);
  scene.fog=new THREE.FogExp2(cfg.fogColor,cfg.fogDensity);
  scene.background=new THREE.Color(cfg.fogColor);
  $('level-badge').textContent=cfg.name;
  cam.x=GRID/2+0.5; cam.z=GRID/2+0.5;
  // Reparent shadow figure
  if(shadowFig.sprite){
    shadowFig.reparent(levelGroups[lv]);
    const ld=levelData[lv];
    if(ld&&ld.openCells.length){
      const c=ld.openCells[Math.floor(Math.random()*ld.openCells.length)];
      shadowFig.moveTo(c[0]+0.5,c[1]+0.5);
    }
    shadowFig.lv=lv; shadowFig.hide();
  }
  startAmbient(lv);
}

function tryDescend(){
  if(descending) return;
  if(currentLevel>=3){ setObjective("This is as deep as it goes."); return; }
  descending=true;
  const fl=$('flicker');
  fl.style.transition='opacity 0.4s'; fl.style.opacity='1';
  setTimeout(()=>{
    setLevel(currentLevel+1);
    // After descent, spawn away from new level's staircase
    cam.x = 6; cam.z = 6; cam.angle = Math.PI*0.25;
    fl.style.opacity='0';
    setTimeout(()=>{ fl.style.transition='opacity 0.05s'; descending=false; phase='play'; inputGraceUntil = performance.now() + 800; setObjective(`Read the walls. ${7-torchesCollected} torches still to find.`); },500);
  },600);
}

  cam.x=6; cam.z=6; cam.angle=Math.PI*0.25; // facing toward centre

  if(isTouch) $('touch').classList.add('on');
  updateHUD();
  setObjective("Read the walls. Reading reveals torches. Collect all seven.");
  startAmbient(1);
}
function endGame(){
  phase='end'; sfx.end();
  runStory(ENDING,()=>{ window.location.href='veganbrosstage8.html'; });
}

// ─── INTERACT ───────────────────────────────────────────
function handleInteract(){
  if(phase!=='play') return;
  // Wall text reveal — works for hieroglyphs (L1), smeared (L2), faded (L3)
  if(hieroNear&&!hieroNear.revealed){
    hieroNear.mesh.material.map=hieroNear.revealTex;
    hieroNear.mesh.material.needsUpdate=true;
    hieroNear.revealed=true; sfx.hiero();
    const hr=$('hiero-reveal');
    hr.classList.remove('show'); void hr.offsetWidth;
    hr.textContent=hieroNear.origText;
    hr.classList.add('show');
    setTimeout(()=>hr.classList.remove('show'),5500);
    // Reading reveals a torch — only if any are still locked on this level
    setTimeout(()=> unlockTorchOnLevel(currentLevel), 800);
    return;
  }
  // Staircase descent
  const cd=Math.hypot(cam.x-(GRID/2+0.5),cam.z-(GRID/2+0.5));
  if(cd<2.8&&currentLevel<3){ tryDescend(); return; }
}

// ─── INPUT ──────────────────────────────────────────────
$('startBtn').addEventListener('click',()=>{ unlockAudio(); sfx.ui(); startGame(); });
window.addEventListener('mousedown',(e)=>{
  if(phase==='story'){ advanceStory(); return; }
  if(phase==='play'){
    if(performance.now() < inputGraceUntil) return; // ignore leftover taps from story screen
    if(document.pointerLockElement!==canvas) canvas.requestPointerLock?.();
    if(interactReady) handleInteract();
  }
});
window.addEventListener('touchstart',(e)=>{
  if(phase==='story'){ advanceStory(); return; }
  if(phase==='play' && performance.now() < inputGraceUntil){ e.preventDefault?.(); return; }
},{passive:false});
$('interact-btn')&&$('interact-btn').addEventListener('touchstart',(e)=>{ e.preventDefault(); if(phase==='play' && performance.now() < inputGraceUntil) return; handleInteract(); },{passive:false});
document.addEventListener('mousemove',(e)=>{
  if(document.pointerLockElement===canvas&&phase==='play'){
    cam.angle-=e.movementX*0.002; cam.pitch-=e.movementY*0.002;
    cam.pitch=Math.max(-MAX_PITCH,Math.min(MAX_PITCH,cam.pitch));
  }
});
addEventListener('keydown',e=>{
  const k=e.key;
  if(phase==='story'&&(k===' '||k==='Enter')){ advanceStory(); return; }
  if((k==='e'||k==='E')&&phase==='play'){ if(performance.now() < inputGraceUntil) return; handleInteract(); return; }
  if(k==='w'||k==='W'||k==='ArrowUp') keys.w=true;
  if(k==='s'||k==='S'||k==='ArrowDown') keys.s=true;
  if(k==='a'||k==='A') keys.a=true;
  if(k==='d'||k==='D') keys.d=true;
  if(k==='ArrowLeft') keys.ArrowLeft=true;
  if(k==='ArrowRight') keys.ArrowRight=true;
});
addEventListener('keyup',e=>{
  const k=e.key;
  if(k==='w'||k==='W'||k==='ArrowUp') keys.w=false;
  if(k==='s'||k==='S'||k==='ArrowDown') keys.s=false;
  if(k==='a'||k==='A') keys.a=false;
  if(k==='d'||k==='D') keys.d=false;
  if(k==='ArrowLeft') keys.ArrowLeft=false;
  if(k==='ArrowRight') keys.ArrowRight=false;
});

function joystick(el,knob,state){
  let id=-1,cx=0,cy=0; const MAX=42;
  el.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];id=t.identifier;const r=el.getBoundingClientRect();cx=r.left+r.width/2;cy=r.top+r.height/2;},{passive:false});
  el.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches){if(t.identifier===id){let dx=t.clientX-cx,dy=t.clientY-cy,d=Math.hypot(dx,dy);if(d>MAX){dx=dx/d*MAX;dy=dy/d*MAX;}knob.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;state.x=dx/MAX;state.y=dy/MAX;}}},{passive:false});
  function end(e){for(const t of e.changedTouches){if(t.identifier===id){knob.style.transform='translate(-50%,-50%)';state.x=0;state.y=0;id=-1;}}}
  el.addEventListener('touchend',end);el.addEventListener('touchcancel',end);
}
const jl={x:0,y:0},jr={x:0,y:0};
joystick($('joyL'),$('knobL'),jl);
joystick($('joyR'),$('knobR'),jr);

// ─── MOVEMENT ───────────────────────────────────────────
function move(){
  if(phase!=='play') return;
  const map=MAPS[currentLevel-1];
  let fwd=0,str=0,turn=0;
  if(keys.w) fwd+=1; if(keys.s) fwd-=1;
  if(keys.a) str-=1; if(keys.d) str+=1;
  if(keys.ArrowLeft) turn-=1; if(keys.ArrowRight) turn+=1;
  fwd-=jl.y; str+=jl.x; turn+=jr.x;
  cam.angle-=turn*0.038;
  cam.pitch-=jr.y*0.025; cam.pitch=Math.max(-MAX_PITCH,Math.min(MAX_PITCH,cam.pitch));
  const sp=0.072;
  const tVX=(Math.sin(cam.angle)*fwd-Math.cos(cam.angle)*str)*sp;
  const tVZ=(Math.cos(cam.angle)*fwd+Math.sin(cam.angle)*str)*sp;
  velX+=(tVX-velX)*0.22; velZ+=(tVZ-velZ)*0.22;
  const margin=0.3;
  if(!solidAt(map,cam.x+velX+Math.sign(velX)*margin,cam.z)) cam.x+=velX; else velX=0;
  if(!solidAt(map,cam.x,cam.z+velZ+Math.sign(velZ)*margin)) cam.z+=velZ; else velZ=0;
  const speed=Math.hypot(velX,velZ);
  if(speed>0.005){
    cam.y=1.65+Math.sin(performance.now()*0.008)*0.025*Math.min(1,speed/0.06);
    footstepTimer--;
    if(footstepTimer<=0){
      if(currentLevel===1) sfx.stoneStep();
      else if(currentLevel===2) sfx.metalStep();
      else sfx.footstep();
      footstepTimer=20+Math.floor(Math.random()*10);
    }
  }
}

// ─── TORCH COLLECTION ────────────────────────────────────
function checkTorches(){
  for(const t of allTorches){
    if(t.collected||t.lv!==currentLevel||!t.unlocked) continue;
    const d=Math.hypot(t.x-cam.x,t.z-cam.z);
    if(d<0.85){
      t.collected=true; torchesCollected++;
      t.sprite.visible=false; t.light.intensity=0; t.halo.visible=false;
      sfx.torch(); updateHUD();
      if(torchesCollected===1) whisperLine("the first torch. the darkness doesn't care.");
      else if(torchesCollected===7){ setTimeout(endGame,1400); return; }
      else setObjective(`${7-torchesCollected} torches remain. Keep reading.`);
    }
  }
}

// ─── SHADOW FIGURE ──────────────────────────────────────
function updateShadow(){
  if(!shadowFig.sprite||shadowFig.lv!==currentLevel) return;
  const dx=shadowFig.x-cam.x,dz=shadowFig.z-cam.z;
  const dist=Math.hypot(dx,dz);
  const fwdX=Math.sin(cam.angle),fwdZ=Math.cos(cam.angle);
  const dot=(dx*fwdX+dz*fwdZ)/Math.max(0.1,dist);
  const looking=dot>0.75&&dist<14;
  const veryClose=dist<2.5;
  shadowFig.peekCooldown=Math.max(0,shadowFig.peekCooldown-1);

  if(veryClose&&looking&&jumpscareReady){
    jumpscareReady=false;
    sfx.jumpscare();
    const js=$('jumpscare'); js.classList.remove('flash'); void js.offsetWidth; js.classList.add('flash');
    sanity=Math.max(0,sanity-20); hp=Math.max(0,hp-8); updateHUD();
    shadowFig.hide();
    const ld=levelData[currentLevel];
    if(ld){ const c=ld.openCells[Math.floor(Math.random()*ld.openCells.length)]; if(c) shadowFig.moveTo(c[0]+0.5,c[1]+0.5); }
    setTimeout(()=>{ jumpscareReady=true; },14000);
    return;
  }

  if(looking&&dist<12){
    shadowFig.sprite.material.opacity=Math.max(0,shadowFig.sprite.material.opacity-0.035);
    if(shadowFig.sprite.material.opacity<=0){
      shadowFig.hide();
      if(shadowFig.peekCooldown<=0){
        const ld=levelData[currentLevel];
        if(ld){
          const bx=cam.x-Math.sin(cam.angle)*8,bz=cam.z-Math.cos(cam.angle)*8;
          const best=ld.openCells.reduce((b,cc)=>{ const d=Math.hypot(cc[0]-bx,cc[1]-bz); return d<b.d?{c:cc,d}:b; },{c:null,d:9999});
          if(best.c) shadowFig.moveTo(best.c[0]+0.5,best.c[1]+0.5);
        }
        shadowFig.peekCooldown=180+Math.random()*350;
      }
    }
    sanity=Math.max(0,sanity-0.05);
  } else if(!looking&&dist<18&&shadowFig.peekCooldown<=0&&dist>4){
    shadowFig.show(0.55+Math.random()*0.3); sfx.shadow();
    shadowFig.peekCooldown=70+Math.random()*130;
  } else if(dist>18&&Math.random()<0.002&&shadowFig.peekCooldown<=0){
    const ld=levelData[currentLevel];
    if(ld){ const c=ld.openCells[Math.floor(Math.random()*ld.openCells.length)]; if(c&&Math.hypot(c[0]+0.5-cam.x,c[1]+0.5-cam.z)>6) shadowFig.moveTo(c[0]+0.5,c[1]+0.5); }
  }
  nearShadow=dist<5;
}

// ─── HIEROGLYPH PROXIMITY ────────────────────────────────
function checkHiero(){
  const ld=levelData[currentLevel]; if(!ld) return;
  const interactEl=$('interact');
  let closest=null,closestD=2.5;
  if(ld.hieroData){
    for(const h of ld.hieroData){
      if(h.revealed) continue;
      const d=Math.hypot(h.pos.x-cam.x,h.pos.z-cam.z);
      if(d<closestD){ closestD=d; closest=h; }
    }
  }
  hieroNear=closest;
  const cd=Math.hypot(cam.x-(GRID/2+0.5),cam.z-(GRID/2+0.5));
  const nearStair=cd<2.8&&currentLevel<3;
  if(closest){ interactEl.textContent='[ E ] Read'; interactEl.classList.add('show'); interactReady=true; }
  else if(nearStair){ interactEl.textContent='[ E ] Descend'; interactEl.classList.add('show'); interactReady=true; }
  else { interactEl.classList.remove('show'); interactReady=false; }
}

// ─── WHISPER ────────────────────────────────────────────
function whisperLine(text,attrib){
  const el=$('whisper');
  el.innerHTML=text+(attrib?`<span class="attr">— ${attrib}</span>`:'');
  el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
}

// ─── LIGHT FLICKER (Claude's state machine) ──────────────
function updateLights(){
  const ld=levelData[currentLevel]; if(!ld) return;
  for(const f of ld.lightData){
    if(f.isFluorescent){
      // Claude's fluorescent state machine — the good one
      if(f.dead){ f.light.intensity=0; f.mesh.material.emissiveIntensity=0.04; continue; }
      f.t--;
      if(f.t<=0){
        if(f.state==='on'&&Math.random()<0.18){ f.state='flicker'; f.t=4+Math.floor(Math.random()*12); sfx.flick(); }
        else if(f.state==='flicker'){ f.state='on'; f.t=120+Math.floor(Math.random()*240); }
        else f.t=120;
      }
      if(f.state==='flicker'){
        const on=Math.random()<0.45;
        f.light.intensity=on?f.baseI*1.4:0;
        f.mesh.material.emissiveIntensity=on?f.baseEm*1.6:0.1;
      } else {
        f.light.intensity=f.baseI;
        f.mesh.material.emissiveIntensity=f.baseEm;
      }
    } else {
      // Torch/lamp: organic flicker
      f.t--;
      if(f.t<=0){
        f.light.intensity=f.baseI*(0.72+Math.random()*0.55);
        f.t=4+Math.floor(Math.random()*18);
        if(f.flame){
          f.flame.material.opacity=0.8+Math.random()*0.2;
          f.flame.scale.set(0.16+Math.random()*0.08,(0.48+Math.random()*0.18),1);
        }
      }
    }
  }
}

// ─── TORCH ANIMATION ────────────────────────────────────
function updateTorches(){
  for(const o of allTorches){
    if(o.collected||o.lv!==currentLevel||!o.unlocked) continue;
    o.phase+=0.05;
    o.sprite.position.y=o.baseY+Math.sin(o.phase)*0.065;
    o.light.intensity=1.9+Math.sin(o.phase*1.4)*0.65;
    o.halo.material.opacity=0.09+Math.sin(o.phase*1.4)*0.04;
  }
}

// ─── SANITY ─────────────────────────────────────────────
function updateSanity(){
  sanity=Math.max(0,sanity-0.004);
  if(nearShadow) sanity=Math.max(0,sanity-0.07);
  const bv=$('blood-vignette');
  if(sanity<40){
    const r=Math.floor((40-sanity)*2.8);
    bv.style.background=`radial-gradient(ellipse at center,transparent 38%,rgba(${r},0,0,${(40-sanity)/180}) 100%)`;
    if(sanity<20&&Math.random()<0.001){
      camera.fov=76+(20-sanity)*0.2+Math.sin(performance.now()/180)*2;
      camera.updateProjectionMatrix();
    }
  } else {
    bv.style.background='';
    camera.fov=76; camera.updateProjectionMatrix();
  }
}

// ─── TORCHES FOR LAZY LEVELS ────────────────────────────
// When L2 or L3 is first built, torches need to be placed if buildLevel was called after placeTorches
// So we do a lazy-place on first visit
const torchesByLevel={1:false,2:false,3:false};
function ensureTorchesForLevel(lv){
  if(torchesByLevel[lv]) return;
  torchesByLevel[lv]=true;
  const map=MAPS[lv-1];
  const grp=levelGroups[lv]; if(!grp) return;
  const n=lv===1?2:lv===2?2:3;
  const cands=[];
  for(let z=4;z<GRID-4;z++) for(let x=4;x<GRID-4;x++){
    if(map[z*GRID+x]===0){ const d=Math.hypot(x-16,z-16); if(d>5) cands.push([x,z,d]); }
  }
  cands.sort((a,b)=>(b[2]+Math.random()*3)-(a[2]+Math.random()*3));
  const placed=[];
  for(const c of cands){
    if(placed.length>=n) break;
    if(placed.every(p=>Math.hypot(p[0]-c[0],p[1]-c[1])>5)) placed.push(c);
  }
  placed.forEach(([x,z])=>{
    const flameMat=new THREE.SpriteMaterial({map:torchFlameSprite(),transparent:true,depthWrite:false,opacity:0});
    const sprite=new THREE.Sprite(flameMat); sprite.scale.set(0.35,0.9,1);
    sprite.position.set(x+0.5,1.1,z+0.5); sprite.visible=false; grp.add(sprite);
    const light=new THREE.PointLight(0xff9020,0,5.5,1.8);
    light.position.set(x+0.5,1.4,z+0.5); grp.add(light);
    const halo=new THREE.Mesh(new THREE.SphereGeometry(0.45,12,8),
      new THREE.MeshBasicMaterial({color:0xff8010,transparent:true,opacity:0,depthWrite:false}));
    halo.position.set(x+0.5,1.2,z+0.5); halo.visible=false; grp.add(halo);
    allTorches.push({sprite,light,halo,collected:false,unlocked:false,baseY:1.1,phase:Math.random()*7,lv,x:x+0.5,z:z+0.5});
  });
}

// Reveal one hidden torch on the current level (called when player reads a wall text)
function unlockTorchOnLevel(lv){
  const hidden = allTorches.filter(t=> t.lv===lv && !t.unlocked && !t.collected);
  if(hidden.length===0) return false;
  const t = hidden[Math.floor(Math.random()*hidden.length)];
  t.unlocked = true;
  t.sprite.visible = true;
  t.sprite.material.opacity = 1;
  t.halo.visible = true;
  t.light.intensity = 2.2;
  whisperLine("a torch has appeared in the dark");
  return true;
}

// ─── MAIN LOOP ──────────────────────────────────────────
let last=performance.now();
function loop(){
  requestAnimationFrame(loop);
  const now=performance.now(); const dt=Math.min(40,now-last); last=now;

  if(phase==='play'){
    move(); checkTorches(); updateShadow(); checkHiero();
    updateTorches(); updateLights(); updateSanity();

    // Ambient sound events
    nextMoo--; if(nextMoo<=0){ sfx.moo(); nextMoo=1400+Math.random()*2000; }
    nextChain--; if(nextChain<=0){ sfx.chain(); nextChain=2000+Math.random()*3000; }
    nextDistant--; if(nextDistant<=0){ sfx.distant(); nextDistant=800+Math.random()*1400; }

    // Whispers
    whisperTimer--; if(whisperTimer<=0){
      whisperLine(WHISPER_LINES[Math.floor(Math.random()*WHISPER_LINES.length)]);
      whisperTimer=450+Math.floor(Math.random()*650);
    }

    // Strobe (L3 only)
    if(currentLevel===3&&!strobeActive){ nextStrobe--; if(nextStrobe<=0) doStrobe(); }

    // Global screen flicker
    if(Math.random()<0.002){
      const fl=$('flicker'); fl.style.opacity=String(0.45+Math.random()*0.3);
      setTimeout(()=>fl.style.opacity='0',40+Math.random()*100);
    }

    // Ensure torches placed for current level
    ensureTorchesForLevel(currentLevel);
  }

  // Camera
  camera.position.set(cam.x,cam.y,cam.z);
  const ld2=Math.cos(cam.pitch);
  camera.lookAt(cam.x+Math.sin(cam.angle)*ld2,cam.y+Math.sin(cam.pitch),cam.z+Math.cos(cam.angle)*ld2);
  renderer.render(scene,camera);
}
loop();
addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });
</script>
