<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wildlife Archive | Deanus Politicus</title>
    
    <link rel="canonical" href="https://dean-withers.com/" />

    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #000; color: #fff; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        .video-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .video-background iframe { width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 0; }
        .content { position: relative; z-index: 10; padding: 20px; max-width: 800px; width: 100%; }
        
        .watcher-text {
            position: fixed;
            top: 20px;
            left: 0;
            width: 100%;
            font-family: 'Georgia', serif;
            font-style: italic;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
            z-index: 20;
            pointer-events: none;
            text-align: center;
        }

        .production-header { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 4px; color: #fff; margin-bottom: 5px; font-weight: bold; }
        .disclaimer { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: #ff3e3e; margin-bottom: 15px; font-weight: bold; }
        h1 { font-size: 2.5rem; margin-bottom: 5px; font-style: italic; color: #f0f0f0; }
        .species { font-size: 1.1rem; color: #aaa; margin-bottom: 20px; letter-spacing: 1px; }
        
        .enter-button { display: inline-block; padding: 12px 30px; background: transparent; border: 2px solid #fff; color: #fff; text-decoration: none; font-weight: bold; text-transform: uppercase; transition: all 0.3s ease; cursor: pointer; margin-bottom: 10px; width: 100%; max-width: 350px; font-size: 0.9rem; }
        .enter-button:hover { background: #fff; color: #000; }
        
        .safe-btn-main {
            border: 2px solid #00f2ea;
            color: #00f2ea;
            box-shadow: 0 0 10px rgba(0, 242, 234, 0.2);
            margin-bottom: 20px;
        }
        .safe-btn-main:hover {
            background: #00f2ea;
            color: #000;
            box-shadow: 0 0 20px #00f2ea;
        }

        .legal-btn { 
            display: inline-block; 
            margin-top: 15px; 
            padding: 8px 16px; 
            font-size: 0.65rem; 
            color: rgba(255, 255, 255, 0.5); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            text-decoration: none; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }

        .anxiety-note { font-family: 'Courier New', monospace; font-size: 0.75rem; color: #ff3e3e; margin-bottom: 20px; }
        .music-label { font-size: 0.8rem; color: #f0f0f0; margin-top: 10px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        
        .socials { display: flex; justify-content: center; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .btn-pro { text-decoration: none; font-weight: bold; font-size: 0.75rem; text-transform: uppercase; padding: 8px 15px; border-radius: 5px; display: flex; align-items: center; gap: 5px; }

        .btn-yt { background-color: #FF0000; color: #fff; }
        .btn-tt { background-color: #000; color: #fff; border: 1px solid #fff; box-shadow: -2px 0 0 #ff0050, 2px 0 0 #00f2ea; }

        #scribble-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
    </style>
</head>
<body>

    <div id="watcher" class="watcher-text"></div>

    <div class="video-background">
        <iframe src="https://www.youtube.com/embed/H724ZGObr4g?autoplay=1&mute=1&controls=0&loop=1&playlist=H724ZGObr4g&rel=0&showinfo=0&iv_load_policy=3" frameborder="0" allow="autoplay; encrypted-media"></iframe>
    </div>

    <div class="overlay"></div>
    <div id="scribble-container"></div>

    <div class="content">
        <p class="production-header">AN EARTHLING PRODUCTION</p>
        <p class="disclaimer">Official Disclaimer: Not affiliated with Dean Withers.</p>
        
        <h1>Wildlife Archive</h1>
        <p class="species">Species: <em>Deanus Politicus</em></p>
        
        <!-- Standard lowercase link -->
        <a href="keepdeansafe.html" class="enter-button safe-btn-main">Click here to keep Dean safe</a>

        <br>

        <a href="#" class="enter-button">Enter the Pen Here</a>
        <p class="anxiety-note">(Not an anxiety pen)</p>

        <p class="music-label">Caskey | Prod. Taysty & Boss Beats</p>
        <button id="musicBtn" class="enter-button">Play Music</button>

        <audio id="bgMusic" loop>
            <source src="170-sober-off-life-boss-beats-x-taysty-beats_TK10970402.mp3(1).mp3" type="audio/mpeg">
        </audio>

        <div class="socials">
            <a href="https://youtube.com/@earthling_official" target="_blank" class="btn-pro btn-yt">YouTube</a>
            <a href="https://www.tiktok.com/@earthling_official" target="_blank" class="btn-pro btn-tt">TikTok</a>
        </div>

        <a href="legal.html" class="legal-btn">Legal Compliance</a>
    </div>

    <script>
        const musicBtn = document.getElementById('musicBtn');
        const audio = document.getElementById('bgMusic');

        musicBtn.onclick = function() {
            if (audio.paused) {
                audio.play();
                musicBtn.innerHTML = "Stop Music";
                musicBtn.style.color = "#ff3e3e";
            } else {
                audio.pause();
                musicBtn.innerHTML = "Play Music";
                musicBtn.style.color = "#fff";
            }
        };

        const watcher = document.getElementById('watcher');
        const watchPhrases = ["watch as the Dean withers", "watch as the truth withers"];
        let phraseIndex = 0;

        function cycleWatcher() {
            watcher.style.opacity = 0;
            setTimeout(() => {
                watcher.innerHTML = watchPhrases[phraseIndex];
                watcher.style.opacity = 1;
                phraseIndex = (phraseIndex + 1) % watchPhrases.length;
            }, 2000);
        }

        setInterval(cycleWatcher, 8000);
        cycleWatcher(); 

        const quotes = ["Vegans are threatening my life.", "I have nothing in my head.", "It's an anxiety pen.", "Parker, have you debated Earthling?"];
        function createScribble() {
            const container = document.getElementById('scribble-container');
            const quote = quotes[Math.floor(Math.random() * quotes.length)];
            const el = document.createElement('div');
            el.style.position = 'absolute';
            el.style.left = (Math.random() * 50 + 10) + '%';
            el.style.top = (Math.random() * 50 + 10) + '%';
            el.style.fontFamily = "'Permanent Marker', cursive";
            el.style.color = 'rgba(255, 255, 255, 0.3)';
            container.appendChild(el);

            let i = 0;
            function write() {
                if (i < quote.length) {
                    el.innerHTML += quote.charAt(i);
                    i++;
                    setTimeout(write, 50);
                } else {
                    setTimeout(() => el.remove(), 3000);
                }
            }
            write();
        }
        setInterval(createScribble, 7000);
    </script>
</body>
</html>
