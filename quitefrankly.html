<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GO DEAN! Stage 12 — Quite Frankly</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }
canvas#c { display:block; position:fixed; top:0; left:0; width:100%; height:100%; }
.scanlines {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.22) 2px,rgba(0,0,0,0.22) 4px);
  pointer-events:none; z-index:300;
}
#titleScreen {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:#000; display:flex; flex-direction:column;
  justify-content:center; align-items:center; z-index:200; gap:14px;
}
.vhs-badge { font-size:0.7rem; letter-spacing:6px; color:rgba(255,255,255,0.45); text-transform:uppercase; }
.vhs-stage { font-size:0.95rem; letter-spacing:8px; color:#bf7fff; text-shadow:2px 0 #ff000055,-2px 0 #00ffff44; text-transform:uppercase; }
.vhs-title {
  font-size:clamp(3.5rem,12vw,8rem); font-weight:900; color:#e8d5ff; letter-spacing:4px;
  text-shadow:5px 0 #ff000099,-4px 0 #00ffff77,0 0 40px #bf7fff,0 0 80px #6a0dad55;
  text-transform:uppercase; animation:glitch 5s infinite;
}
.vhs-sub {
  font-size:clamp(1.1rem,3.5vw,2.2rem); color:#00ff88; letter-spacing:6px;
  text-shadow:2px 0 #ff000044,0 0 20px #00ff88; text-transform:uppercase;
  animation:flicker 3s infinite;
}
.vhs-prompt { margin-top:28px; font-size:0.85rem; color:rgba(255,255,255,0.55); letter-spacing:3px; animation:blink 1.2s step-end infinite; }
.vhs-warn { position:absolute; bottom:24px; font-size:0.6rem; color:rgba(255,100,100,0.55); letter-spacing:2px; text-align:center; }
@keyframes glitch {
  0%,90%,100%{text-shadow:5px 0 #ff000099,-4px 0 #00ffff77,0 0 40px #bf7fff;transform:none;}
  91%{text-shadow:-5px 0 #ff0000,5px 0 #00ffff,0 0 40px #fff;transform:translateX(4px);}
  92%{text-shadow:5px 0 #ff0000,-5px 0 #00ffff;transform:translateX(-3px) skewX(2deg);}
  93%{transform:none;}
}
@keyframes flicker{0%,100%{opacity:1;}92%{opacity:1;}93%{opacity:0.2;}94%{opacity:1;}96%{opacity:0.5;}97%{opacity:1;}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

#goFlash {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:#cc0000; display:none; z-index:250;
  justify-content:center; align-items:center;
}
#goFlash span {
  font-size:25vw; font-weight:900; color:#fff;
  text-shadow:6px 6px 0 #000; animation:goScale 0.5s ease-out;
}
@keyframes goScale{from{transform:scale(3);opacity:0;}to{transform:scale(1);opacity:1;}}

#hud { position:fixed; top:16px; left:20px; z-index:100; color:rgba(255,255,255,0.65); font-size:0.7rem; letter-spacing:2px; display:none; }
#surviveTimer { position:fixed; top:16px; right:20px; z-index:100; color:#00ff88; font-size:0.7rem; letter-spacing:2px; display:none; }
#crosshair { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); color:rgba(255,255,255,0.65); font-size:18px; z-index:100; display:none; pointer-events:none; }
#clickPrompt { position:fixed; bottom:28px; left:50%; transform:translateX(-50%); color:rgba(255,255,255,0.55); font-size:0.7rem; letter-spacing:2px; z-index:100; display:none; text-align:center; animation:blink 2s step-end infinite; }

#deathScreen {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(160,0,0,0.97); display:none; z-index:200;
  flex-direction:column; justify-content:center; align-items:center; gap:18px;
}
#deathScreen .d-title { font-size:clamp(2rem,9vw,5.5rem); color:#fff; font-weight:900; text-shadow:4px 0 #ff000088,-4px 0 #00ffff44; letter-spacing:4px; text-transform:uppercase; }
#deathScreen .d-sub { font-size:0.95rem; color:rgba(255,255,255,0.65); letter-spacing:3px; }
#deathScreen .d-time { font-size:0.8rem; color:#ffcc00; letter-spacing:2px; }
#deathScreen button { margin-top:16px; padding:13px 38px; background:transparent; border:2px solid #fff; color:#fff; font-family:'Courier New',monospace; font-size:0.95rem; letter-spacing:3px; text-transform:uppercase; cursor:pointer; transition:all 0.2s; }
#deathScreen button:hover { background:#fff; color:#cc0000; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="scanlines"></div>

<div id="titleScreen">
  <div class="vhs-badge">📼 Earthling Official · Stage 12</div>
  <div class="vhs-title">GO DEAN!</div>
  <div class="vhs-sub">Quite Frankly</div>
  <div class="vhs-prompt">[ PRESS ENTER OR CLICK TO START ]</div>
  <div class="vhs-warn">WASD to move &nbsp;·&nbsp; MOUSE to look &nbsp;·&nbsp; SURVIVE<br>They multiply. They never stop.</div>
</div>

<div id="goFlash"><span>GO!</span></div>

<div id="hud">GO DEAN! &nbsp;|&nbsp; STAGE 12 &nbsp;|&nbsp; QUITE FRANKLY</div>
<div id="surviveTimer">00:00</div>
<div id="crosshair">+</div>
<div id="clickPrompt">CLICK TO LOOK</div>

<div id="deathScreen">
  <div class="d-title">QUITE FRANKLY</div>
  <div class="d-sub">YOU HAVE BEEN CAUGHT</div>
  <div class="d-time" id="deathTime"></div>
  <button onclick="restartGame()">TRY AGAIN</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const MAZE_W=18,MAZE_H=18,CELL=5,WALL_H=3.2,WALL_T=0.25;
const PLAYER_R=0.35,PLAYER_H=1.6,PLAYER_SPEED=5.0;
const HEAD_URL='https://raw.githubusercontent.com/EarthlingOfficial/dean-withers.com/main/dean_head.png';
const AUDIO_URL='https://raw.githubusercontent.com/EarthlingOfficial/dean-withers.com/main/quite_frankly.MP3';
const INITIAL_ENEMIES=5;
const SPAWN_INTERVAL=25; // seconds between spawns
const SPAWN_COUNT=2;
const MAX_ENEMIES=20;
const DEATH_TOUCH=1.2;
const DEATH_SURROUND_DIST=2.2;
const DEATH_SURROUND_N=3;

let scene,camera,renderer,maze;
let wallBoxes=[],enemies=[],lights=[];
let yaw=0,pitch=0,playerPos={x:CELL*0.5+0.5,z:CELL*0.5+0.5};
let keys={},mouseLocked=false,gameActive=false;
let audioCtx=null,quiteBuffer=null;
let footTimer=0,isMoving=false;
let lastTime=0,surviveTime=0,nextSpawnAt=SPAWN_INTERVAL;
let headTex=null;

// ── MAZE ──────────────────────────────────────────────────────────────────────
function generateMaze(w,h){
  const g=Array.from({length:h},()=>Array.from({length:w},()=>({v:false,N:true,E:true,S:true,W:true})));
  function carve(x,y){
    g[y][x].v=true;
    const d=[{dx:0,dy:-1,a:'N',b:'S'},{dx:1,dy:0,a:'E',b:'W'},{dx:0,dy:1,a:'S',b:'N'},{dx:-1,dy:0,a:'W',b:'E'}];
    for(let i=d.length-1;i>0;i--){const j=0|Math.random()*(i+1);[d[i],d[j]]=[d[j],d[i]];}
    for(const{dx,dy,a,b}of d){const nx=x+dx,ny=y+dy;if(nx>=0&&nx<w&&ny>=0&&ny<h&&!g[ny][nx].v){g[y][x][a]=false;g[ny][nx][b]=false;carve(nx,ny);}}
  }
  carve(0,0);return g;
}

// ── TEXTURES ──────────────────────────────────────────────────────────────────
function mkTex(fn){
  const cv=document.createElement('canvas');cv.width=cv.height=256;fn(cv.getContext('2d'));
  const t=new THREE.CanvasTexture(cv);t.wrapS=t.wrapT=THREE.RepeatWrapping;return t;
}
const wallTex=mkTex(c=>{
  c.fillStyle='#e8c84a';c.fillRect(0,0,256,256);
  for(let i=0;i<40;i++){c.fillStyle=`rgba(${160+Math.random()*40|0},${100+Math.random()*30|0},10,${(Math.random()*0.22).toFixed(2)})`;c.beginPath();c.arc(Math.random()*256,Math.random()*256,Math.random()*25+3,0,Math.PI*2);c.fill();}
  c.strokeStyle='rgba(200,160,25,0.35)';c.lineWidth=1;
  for(let y=0;y<=256;y+=24){c.beginPath();c.moveTo(0,y);c.lineTo(256,y);c.stroke();}
  for(let x=0;x<=256;x+=48){c.beginPath();c.moveTo(x,0);c.lineTo(x,256);c.stroke();}
});
const floorTex=mkTex(c=>{
  c.fillStyle='#a07840';c.fillRect(0,0,256,256);
  for(let i=0;i<2000;i++){c.fillStyle=`rgba(${60+Math.random()*60|0},${40+Math.random()*40|0},15,0.18)`;c.fillRect(Math.random()*256,Math.random()*256,2,2);}
  c.strokeStyle='rgba(0,0,0,0.28)';c.lineWidth=2;
  for(let i=0;i<=256;i+=64){c.beginPath();c.moveTo(i,0);c.lineTo(i,256);c.stroke();c.beginPath();c.moveTo(0,i);c.lineTo(256,i);c.stroke();}
});
const ceilTex=mkTex(c=>{
  c.fillStyle='#cdc8b8';c.fillRect(0,0,256,256);
  c.strokeStyle='rgba(150,140,120,0.55)';c.lineWidth=1.5;
  for(let i=0;i<=256;i+=32){c.beginPath();c.moveTo(i,0);c.lineTo(i,256);c.stroke();c.beginPath();c.moveTo(0,i);c.lineTo(256,i);c.stroke();}
});
wallTex.repeat.set(1,1);floorTex.repeat.set(4,4);ceilTex.repeat.set(4,4);

// ── SCENE ─────────────────────────────────────────────────────────────────────
function initScene(){
  scene=new THREE.Scene();
  scene.fog=new THREE.Fog(0x120e00,8,32);
  camera=new THREE.PerspectiveCamera(80,innerWidth/innerHeight,0.1,100);
  renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:false});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,1.5));
  scene.add(new THREE.AmbientLight(0xffeeaa,0.32));
  headTex=new THREE.TextureLoader().load(HEAD_URL);
  headTex.magFilter=THREE.LinearFilter;
  maze=generateMaze(MAZE_W,MAZE_H);
  buildMaze();
  spawnInitialEnemies();
  updateCamera();
}

// ── MAZE BUILD ────────────────────────────────────────────────────────────────
function addWall(x,y,z,w,h,d){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshLambertMaterial({map:wallTex}));
  m.position.set(x,y,z);scene.add(m);
  wallBoxes.push({minX:x-w/2,maxX:x+w/2,minZ:z-d/2,maxZ:z+d/2});
}
function addLight(x,z){
  const pl=new THREE.PointLight(0xffffc0,1.15,13);
  pl.position.set(x,WALL_H-0.15,z);
  pl.userData={fi:Math.random()>0.6,ft:Math.random()*8,bi:1.15};
  scene.add(pl);lights.push(pl);
  const p=new THREE.Mesh(new THREE.PlaneGeometry(0.7,1.8),new THREE.MeshBasicMaterial({color:0xffffdd}));
  p.rotation.x=Math.PI/2;p.position.set(x,WALL_H-0.04,z);scene.add(p);
}
function buildMaze(){
  wallBoxes=[];lights=[];
  const wm=new THREE.MeshLambertMaterial({map:wallTex});
  const fm=new THREE.MeshLambertMaterial({map:floorTex});
  const cm=new THREE.MeshLambertMaterial({map:ceilTex,color:0xddddcc});
  const fw=MAZE_W*CELL,fh=MAZE_H*CELL;
  const fl=new THREE.Mesh(new THREE.PlaneGeometry(fw,fh),fm);
  fl.rotation.x=-Math.PI/2;fl.position.set(fw/2,0,fh/2);scene.add(fl);
  const cl=new THREE.Mesh(new THREE.PlaneGeometry(fw,fh),cm);
  cl.rotation.x=Math.PI/2;cl.position.set(fw/2,WALL_H,fh/2);scene.add(cl);
  // Boundary
  addWall(fw/2,WALL_H/2,-WALL_T/2,fw+WALL_T*2,WALL_H,WALL_T);
  addWall(fw/2,WALL_H/2,fh+WALL_T/2,fw+WALL_T*2,WALL_H,WALL_T);
  addWall(-WALL_T/2,WALL_H/2,fh/2,WALL_T,WALL_H,fh);
  addWall(fw+WALL_T/2,WALL_H/2,fh/2,WALL_T,WALL_H,fh);
  for(let cy=0;cy<MAZE_H;cy++){
    for(let cx=0;cx<MAZE_W;cx++){
      const cell=maze[cy][cx],ox=cx*CELL,oz=cy*CELL;
      if(cell.S&&cy<MAZE_H-1) addWall(ox+CELL/2,WALL_H/2,oz+CELL,CELL+WALL_T,WALL_H,WALL_T);
      if(cell.E&&cx<MAZE_W-1) addWall(ox+CELL,WALL_H/2,oz+CELL/2,WALL_T,WALL_H,CELL+WALL_T);
      if((cx+cy)%3===0) addLight(ox+CELL/2,oz+CELL/2);
    }
  }
}

// ── COLLISION ─────────────────────────────────────────────────────────────────
function circleBox(px,pz,r,b){
  const cx=Math.max(b.minX,Math.min(px,b.maxX)),cz=Math.max(b.minZ,Math.min(pz,b.maxZ));
  return (px-cx)**2+(pz-cz)**2<r*r;
}
function canStep(nx,nz){for(const b of wallBoxes)if(circleBox(nx,nz,PLAYER_R,b))return false;return true;}

// ── ENEMIES ───────────────────────────────────────────────────────────────────
function makeEnemy(){
  let ex,ez,tries=0;
  do{
    ex=(1+Math.floor(Math.random()*(MAZE_W-1)))*CELL+CELL/2;
    ez=(1+Math.floor(Math.random()*(MAZE_H-1)))*CELL+CELL/2;
    tries++;
  }while(dist2d(ex,ez,playerPos.x,playerPos.z)<CELL*3&&tries<30);
  const mat=new THREE.SpriteMaterial({map:headTex,transparent:true,depthTest:true});
  const sprite=new THREE.Sprite(mat);
  sprite.scale.set(2.3,2.9,1);
  sprite.position.set(ex,WALL_H/2+0.3,ez);
  scene.add(sprite);
  const e={sprite,x:ex,z:ez,speed:1.8+Math.random()*0.8,gain:null,source:null,panner:null};
  startEnemyAudio(e);
  return e;
}
function spawnInitialEnemies(){
  enemies=[];
  for(let i=0;i<INITIAL_ENEMIES;i++) enemies.push(makeEnemy());
}
function spawnMoreEnemies(){
  const count=Math.min(SPAWN_COUNT,MAX_ENEMIES-enemies.length);
  for(let i=0;i<count;i++) enemies.push(makeEnemy());
}
function dist2d(ax,az,bx,bz){return Math.sqrt((ax-bx)**2+(az-bz)**2);}
function updateEnemies(dt){
  for(const e of enemies){
    const dx=playerPos.x-e.x,dz=playerPos.z-e.z;
    const len=Math.sqrt(dx*dx+dz*dz);
    if(len>0.01){
      const nx=e.x+(dx/len)*e.speed*dt;
      const nz=e.z+(dz/len)*e.speed*dt;
      if(canStep(nx,nz)){e.x=nx;e.z=nz;}
      else{if(canStep(nx,e.z))e.x=nx;else if(canStep(e.x,nz))e.z=nz;}
    }
    e.sprite.position.set(e.x,WALL_H/2+0.3,e.z);
    updateEnemyAudio(e,len);
  }
}
function checkDeath(){
  let close=0;
  for(const e of enemies){
    const d=dist2d(e.x,e.z,playerPos.x,playerPos.z);
    if(d<DEATH_TOUCH)return true;
    if(d<DEATH_SURROUND_DIST)close++;
  }
  return close>=DEATH_SURROUND_N;
}

// ── AUDIO ─────────────────────────────────────────────────────────────────────
async function initAudio(){
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const r=await fetch(AUDIO_URL);
    const b=await r.arrayBuffer();
    quiteBuffer=await audioCtx.decodeAudioData(b);
    for(const e of enemies)startEnemyAudio(e);
  }catch(err){console.warn('Audio:',err);}
}
function startEnemyAudio(e){
  if(!audioCtx||!quiteBuffer){return;}
  try{
    const src=audioCtx.createBufferSource();src.buffer=quiteBuffer;src.loop=true;
    const g=audioCtx.createGain();g.gain.value=0;
    const pan=audioCtx.createStereoPanner();
    src.connect(g);g.connect(pan);pan.connect(audioCtx.destination);
    src.start(audioCtx.currentTime+Math.random()*1.5);
    e.source=src;e.gain=g;e.panner=pan;
  }catch(err){}
}
function updateEnemyAudio(e,dist){
  if(!e.gain||!audioCtx)return;
  const maxD=20,t=Math.max(0,1-dist/maxD);
  e.gain.gain.setTargetAtTime(t*0.9,audioCtx.currentTime,0.12);
  e.source.playbackRate.setTargetAtTime(1+t*2.4,audioCtx.currentTime,0.12);
  const ang=Math.atan2(e.x-playerPos.x,e.z-playerPos.z)-yaw;
  e.panner.pan.setTargetAtTime(Math.max(-1,Math.min(1,Math.sin(ang)*0.85)),audioCtx.currentTime,0.1);
}
function playFootstep(){
  if(!audioCtx)return;
  const b=audioCtx.createBuffer(1,Math.floor(audioCtx.sampleRate*0.07),audioCtx.sampleRate);
  const d=b.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(audioCtx.sampleRate*0.022));
  const s=audioCtx.createBufferSource();s.buffer=b;
  const g=audioCtx.createGain();g.gain.value=0.28;
  s.connect(g);g.connect(audioCtx.destination);s.start();
}

// ── PLAYER ────────────────────────────────────────────────────────────────────
function updateCamera(){
  camera.position.set(playerPos.x,PLAYER_H,playerPos.z);
  camera.rotation.order='YXZ';camera.rotation.y=yaw;camera.rotation.x=pitch;
}
function updatePlayer(dt){
  const fwd={x:Math.sin(yaw),z:Math.cos(yaw)};
  const rgt={x:Math.cos(yaw),z:-Math.sin(yaw)};
  let mx=0,mz=0;
  if(keys['KeyW']||keys['ArrowUp']){mx+=fwd.x;mz+=fwd.z;}
  if(keys['KeyS']||keys['ArrowDown']){mx-=fwd.x;mz-=fwd.z;}
  if(keys['KeyA']||keys['ArrowLeft']){mx-=rgt.x;mz-=rgt.z;}
  if(keys['KeyD']||keys['ArrowRight']){mx+=rgt.x;mz+=rgt.z;}
  const len=Math.sqrt(mx*mx+mz*mz);
  isMoving=len>0.01;
  if(isMoving){
    mx/=len;mz/=len;
    const spd=PLAYER_SPEED*dt;
    const nx=playerPos.x+mx*spd,nz=playerPos.z+mz*spd;
    if(canStep(nx,playerPos.z))playerPos.x=nx;
    if(canStep(playerPos.x,nz))playerPos.z=nz;
  }
  if(isMoving&&audioCtx){footTimer-=dt;if(footTimer<=0){playFootstep();footTimer=0.36;}}
}
function updateLights(dt){
  for(const l of lights){
    if(!l.userData.fi)continue;
    l.userData.ft-=dt;
    if(l.userData.ft<=0){l.intensity=Math.random()>0.12?l.userData.bi:0.04;l.userData.ft=Math.random()*(Math.random()>0.9?0.07:5)+0.01;}
  }
}

// ── HUD ───────────────────────────────────────────────────────────────────────
function fmtTime(s){const m=0|s/60;const sec=0|s%60;return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;}

// ── GAME LOOP ─────────────────────────────────────────────────────────────────
function loop(ts){
  if(!gameActive)return;
  requestAnimationFrame(loop);
  const dt=Math.min((ts-lastTime)/1000,0.05);lastTime=ts;
  surviveTime+=dt;
  document.getElementById('surviveTimer').textContent=fmtTime(surviveTime)+' | HEADS: '+enemies.length;
  if(surviveTime>=nextSpawnAt&&enemies.length<MAX_ENEMIES){
    spawnMoreEnemies();
    nextSpawnAt+=SPAWN_INTERVAL;
  }
  updatePlayer(dt);updateEnemies(dt);updateLights(dt);updateCamera();
  if(checkDeath()){triggerDeath();return;}
  renderer.render(scene,camera);
}

// ── UI ────────────────────────────────────────────────────────────────────────
function showGame(){
  document.getElementById('hud').style.display='block';
  document.getElementById('surviveTimer').style.display='block';
  document.getElementById('crosshair').style.display='block';
  document.getElementById('clickPrompt').style.display='block';
}
function hideGame(){
  document.getElementById('hud').style.display='none';
  document.getElementById('surviveTimer').style.display='none';
  document.getElementById('crosshair').style.display='none';
  document.getElementById('clickPrompt').style.display='none';
}

function startGame(){
  document.getElementById('titleScreen').style.display='none';
  const go=document.getElementById('goFlash');
  go.style.display='flex';
  setTimeout(()=>{
    go.style.display='none';
    showGame();
    surviveTime=0;nextSpawnAt=SPAWN_INTERVAL;
    gameActive=true;lastTime=performance.now();
    requestAnimationFrame(loop);
    initAudio();
  },700);
}

function triggerDeath(){
  gameActive=false;
  if(audioCtx)for(const e of enemies){try{e.source&&e.source.stop();}catch(err){}}
  hideGame();
  document.getElementById('deathTime').textContent='SURVIVED: '+fmtTime(surviveTime)+' | '+enemies.length+' HEADS SPAWNED';
  document.getElementById('deathScreen').style.display='flex';
  if(document.pointerLockElement)document.exitPointerLock();
}

function restartGame(){
  while(scene.children.length)scene.remove(scene.children[0]);
  wallBoxes=[];enemies=[];lights=[];
  yaw=0;pitch=0;playerPos={x:CELL*0.5+0.5,z:CELL*0.5+0.5};
  if(audioCtx){try{audioCtx.close();}catch(e){}audioCtx=null;quiteBuffer=null;}
  document.getElementById('deathScreen').style.display='none';
  maze=generateMaze(MAZE_W,MAZE_H);
  scene.add(new THREE.AmbientLight(0xffeeaa,0.32));
  buildMaze();spawnInitialEnemies();updateCamera();
  showGame();
  surviveTime=0;nextSpawnAt=SPAWN_INTERVAL;
  gameActive=true;lastTime=performance.now();
  requestAnimationFrame(loop);
  initAudio();
}

// ── INPUT ─────────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(!gameActive&&(e.code==='Enter'||e.code==='Space'))startGame();
  e.preventDefault && ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code) && e.preventDefault();
});
document.addEventListener('keyup',e=>keys[e.code]=false);
document.addEventListener('mousemove',e=>{
  if(!mouseLocked)return;
  yaw-=e.movementX*0.002;
  pitch-=e.movementY*0.002;
  pitch=Math.max(-Math.PI/3,Math.min(Math.PI/3,pitch));
});
document.addEventListener('pointerlockchange',()=>{
  mouseLocked=!!document.pointerLockElement;
  document.getElementById('clickPrompt').style.display=mouseLocked?'none':(gameActive?'block':'none');
});
document.getElementById('c').addEventListener('click',()=>{
  if(!gameActive)startGame();
  else document.getElementById('c').requestPointerLock();
});
window.addEventListener('resize',()=>{
  if(!renderer)return;
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

initScene();
</script>
</body>
</html>
